<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fantasy War Room</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fantasy War Room">
    <meta name="theme-color" content="#D4AF37">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #B8941E;
            --black: #0A0A0A;
            --off-black: #1A1A1A;
            --charcoal: #2A2A2A;
            --silver: #D0D0D0;
            --white: #FFFFFF;
            --win-green: #2ECC71;
            --loss-red: #E74C3C;
        }

    .fwpm-career-row{display:grid;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);gap:3px;font-size:13px}
    .fwpm-career-row:last-child{border-bottom:none}
    .fwpm-career-hdr{font-size:13px;font-weight:700;color:#7d8291;text-transform:uppercase}

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

        body {
        font-family: 'Oswald', sans-serif;
        background: var(--black);
        color: var(--white);
        overflow-x: hidden;
        overflow-y: auto;
        min-height: 100vh;
        position: relative;
        -webkit-overflow-scrolling: touch;
        font-size: 14px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
    }

    /* Subdued logo background */
    body::before {
        content: '';
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: clamp(400px, 60vw, 1000px);
        height: clamp(400px, 60vw, 1000px);
        background-image: url('icon-192.png');
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
        opacity: 0.05;
        z-index: 0;
        pointer-events: none;
        filter: brightness(1.2);
    }

    .app-container {
        position: relative;
        z-index: 1;
        max-width: 100%;
        margin: 0 auto;
    }

    /* Header */
    .header {
        background: linear-gradient(135deg, var(--black) 0%, var(--off-black) 100%);
        padding: 1rem;
        border-bottom: 3px solid var(--gold);
        box-shadow: 0 4px 20px rgba(212, 175, 55, 0.2);
    }

    .header-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1rem;
        text-align: center;
        color: var(--gold);
        letter-spacing: 0.15em;
        margin-bottom: 0.5rem;
    }

    .owner-name {
        font-family: 'Bebas Neue', sans-serif;
        font-size: clamp(1.5rem, 5vw, 2.5rem);
        text-align: center;
        background: linear-gradient(135deg, var(--gold) 0%, var(--white) 50%, var(--gold) 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 0.1em;
        animation: shimmer 3s linear infinite;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
    }

    .owner-logo-small {
        width: clamp(70px, 12vw, 100px);
        height: clamp(70px, 12vw, 100px);
        flex-shrink: 0;
        filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
    }

    @keyframes shimmer {
        0% { background-position: 0% center; }
        100% { background-position: 200% center; }
    }

    .quote {
        text-align: center;
        margin-top: 0.75rem;
        padding: 0.75rem;
        font-family: 'Crimson Text', serif;
        font-style: italic;
        font-size: clamp(0.8rem, 2vw, 1rem);
        color: var(--silver);
        border-top: 1px solid rgba(212, 175, 55, 0.2);
    }

    .quote-author {
        font-size: 0.75rem;
        color: var(--gold);
        margin-top: 0.25rem;
        font-style: normal;
    }

    .settings-icon {
        position: absolute;
        top: 1rem;
        right: 1rem;
        width: 24px;
        height: 24px;
        cursor: pointer;
        opacity: 0.7;
        transition: all 0.3s ease;
    }

    .settings-icon:hover {
        opacity: 1;
        transform: rotate(90deg);
    }

    /* Main Layout */
    .main-layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
        padding: 1rem;
        padding-bottom: 50px;
        min-height: calc(100vh - 200px);
    }

    /* Desktop/Tablet 2-column layout (leagues + sidebar) */
    @media (min-width: 768px) {
        .main-layout {
            grid-template-columns: 1fr auto;
            gap: 1.5rem;
            padding: 1.5rem;
        }
    }

    @media (min-width: 1200px) {
        .main-layout {
            grid-template-columns: 1fr auto;
            padding: 2rem;
            max-width: 1600px;
            margin: 0 auto;
        }
    }

    .left-column, .center-column {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        overflow-x: hidden;
    }

   @media (min-width: 768px) {
        .left-column, .center-column {
            max-height: calc(100vh - 220px);
            overflow-y: auto;
            overflow-x: hidden;
            overscroll-behavior: contain;
            scroll-behavior: smooth;
        }

        .right-column {
            box-sizing: content-box;
            max-height: calc(100vh - 180px);
            overflow-y: auto;
            overflow-x: hidden;
            align-self: start;
            overscroll-behavior: contain;
            scroll-behavior: smooth;
            padding-bottom: 2rem;
        }

        .left-column::-webkit-scrollbar,
        .center-column::-webkit-scrollbar,
        .right-column::-webkit-scrollbar {
            width: 6px;
        }
        .left-column::-webkit-scrollbar-track,
        .center-column::-webkit-scrollbar-track,
        .right-column::-webkit-scrollbar-track {
            background: rgba(212, 175, 55, 0.1);
            border-radius: 3px;
        }
        .left-column::-webkit-scrollbar-thumb,
        .center-column::-webkit-scrollbar-thumb,
        .right-column::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 3px;
        }
    }

    .league-window {
        background: var(--black);
        border: 2px solid rgba(212, 175, 55, 0.2);
        border-radius: 12px;
        padding: 1rem;
        overflow-x: hidden;
        animation: fadeInLeft 0.6s ease both;
    }

    @media (min-width: 768px) {
        .league-window {
            max-height: 400px;
            display: flex;
            flex-direction: column;
        }
    }

    @keyframes fadeInLeft {
        from {
            opacity: 0;
            transform: translateX(-20px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    .league-window-scroll {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        min-height: 0;
        touch-action: pan-y;
    }

    .league-window-scroll::-webkit-scrollbar {
        width: 6px;
    }

    .league-window-scroll::-webkit-scrollbar-track {
        background: rgba(212, 175, 55, 0.1);
        border-radius: 3px;
    }

    .league-window-scroll::-webkit-scrollbar-thumb {
        background: var(--gold);
        border-radius: 3px;
    }

    .league-window-header {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.2rem;
        color: var(--gold);
        margin-bottom: 0.75rem;
        letter-spacing: 0.1em;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        flex-shrink: 0;
    }

    .league-item {
        padding: 0.75rem;
        margin-bottom: 0.5rem;
        background: rgba(212, 175, 55, 0.05);
        border-left: 3px solid transparent;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .league-item:hover, .league-item.active {
        background: rgba(212, 175, 55, 0.15);
        border-left-color: var(--gold);
    }

    .league-item-name {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--white);
        margin-bottom: 0.25rem;
    }

    .league-item-record {
        font-size: 0.75rem;
        color: var(--silver);
    }



    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Key Events */
    .key-events {
        background: var(--black);
        border: 2px solid rgba(212, 175, 55, 0.2);
        border-radius: 12px;
        padding: 1.5rem;
        overflow-x: hidden;
        animation: fadeInUp 0.6s ease 0.4s both;
    }

    @media (min-width: 768px) {
        .key-events {
            max-height: 600px;
            display: flex;
            flex-direction: column;
        }
    }

    .key-events-scroll {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        min-height: 0;
        touch-action: pan-y;
    }

    .key-events-scroll::-webkit-scrollbar {
        width: 6px;
    }

    .key-events-scroll::-webkit-scrollbar-track {
        background: rgba(212, 175, 55, 0.1);
        border-radius: 3px;
    }

    .key-events-scroll::-webkit-scrollbar-thumb {
        background: var(--gold);
        border-radius: 3px;
    }

    .key-events-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.3rem;
        color: var(--gold);
        margin-bottom: 1rem;
        letter-spacing: 0.15em;
        flex-shrink: 0;
    }

    .event-item {
        background: rgba(212, 175, 55, 0.05);
        border-left: 3px solid var(--gold);
        padding: 1rem;
        margin-bottom: 0.75rem;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .event-item:hover {
        background: rgba(212, 175, 55, 0.15);
        box-shadow: -4px 4px 12px rgba(212, 175, 55, 0.2);
    }

    .event-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.5rem;
    }

    .event-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--white);
    }

    .event-date {
        font-size: 0.85rem;
        color: var(--gold);
        font-weight: 600;
    }

    .event-league {
        font-size: 0.75rem;
        color: var(--silver);
        opacity: 0.8;
    }

    /* Right Column - Icon Buttons */
    .right-column {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        animation: fadeInRight 0.6s ease 0.5s both;
    }

    @keyframes fadeInRight {
        from {
            opacity: 0;
            transform: translateX(20px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    @keyframes dhqSpin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    .icon-button {
        background: var(--black);
        border: 2px solid var(--gold);
        border-radius: 6px;
        padding: 0.75rem 0.5rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow:
            0 0 0 1px rgba(212, 175, 55, 0.3),
            0 3px 9px rgba(0, 0, 0, 0.5),
            inset 0 1px 0 rgba(212, 175, 55, 0.2);
        min-height: 71px;
        flex-shrink: 0;
        position: relative;
        overflow: visible;
    }

    /* Ornate corner decorations */
    .icon-button::before,
    .icon-button::after {
        content: '';
        position: absolute;
        width: 9px;
        height: 9px;
        border: 2px solid var(--gold);
        opacity: 0.6;
    }

    .icon-button::before {
        top: -2px;
        left: -2px;
        border-right: none;
        border-bottom: none;
    }

    .icon-button::after {
        bottom: -2px;
        right: -2px;
        border-left: none;
        border-top: none;
    }

    .icon-button:hover {
        transform: translateY(-4px);
        border-color: var(--white);
        box-shadow: 
            0 0 0 1px var(--gold),
            0 0 20px rgba(212, 175, 55, 0.4),
            0 8px 24px rgba(0, 0, 0, 0.6),
            inset 0 1px 0 rgba(212, 175, 55, 0.4);
    }

    .icon-button:hover::before,
    .icon-button:hover::after {
        border-color: var(--white);
        opacity: 1;
    }

    .icon-button:active {
        transform: translateY(-2px);
    }

    .icon-button-icon-container {
        width: 32px;
        height: 32px;
        background: linear-gradient(135deg, var(--gold) 0%, var(--dark-gold) 100%);
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 
            0 2px 8px rgba(212, 175, 55, 0.3),
            inset 0 1px 0 rgba(255, 255, 255, 0.2);
        position: relative;
    }

    .icon-button-icon-container::before {
        content: '';
        position: absolute;
        inset: 2px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, transparent 100%);
        border-radius: 4px;
        pointer-events: none;
    }

    .icon-button-icon {
        width: 18px;
        height: 18px;
        color: var(--black);
        position: relative;
        z-index: 1;
    }

    .icon-button-label {
        font-size: 0.49rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--white);
        text-align: center;
        line-height: 1.3;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }

    /* Mobile 3-column layout (iPhone) */
    @media (max-width: 767px) {
        .main-layout {
            display: grid;
            grid-template-columns: 120px 1fr 70px;
            grid-template-rows: calc(100vh - 200px);
            gap: 0.4rem;
            padding: 0.45rem;
            overflow: hidden;
        }

        .left-column,
        .center-column {
            overflow-y: hidden;
            overflow-x: hidden;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .right-column {
            overflow-y: scroll;
            overflow-x: hidden;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
            height: 100%;
            position: static;
            flex-direction: column;
            flex-wrap: nowrap;
            background: none;
            padding: 0;
            gap: 0.35rem;
            z-index: auto;
            justify-content: flex-start;
            align-items: stretch;
        }

        /* Key events: fill left column, title fixed, dates scroll */
        .key-events {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
            height: 100%;
        }
        .key-events-scroll {
            flex: 1;
            overflow-y: scroll;
            overflow-x: hidden;
            min-height: 0;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
        }

        /* League window: fill center column remainder, header fixed, leagues scroll */
        .league-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }
        .league-window-scroll {
            flex: 1;
            overflow-y: scroll;
            overflow-x: hidden;
            min-height: 0;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
        }

        /* Compact panel padding */
        .key-events,
        .league-window { padding: 0.5rem 0.4rem; border-radius: 8px; }

        /* Shrink key events */
        .key-events-title { font-size: 0.72rem; margin-bottom: 0.4rem; letter-spacing: 0.06em; }
        .event-item { padding: 0.4rem 0.45rem; margin-bottom: 0.35rem; }
        .event-title { font-size: 0.78rem; }
        .event-date  { font-size: 0.74rem; }
        .event-league { font-size: 0.72rem; }

        /* Shrink league window */
        .league-window-header { font-size: 0.8rem; padding: 0.35rem 0.4rem; }
        .league-item-name   { font-size: 0.8rem; }
        .league-item-record { font-size: 0.72rem; }

        /* Icon buttons — compact vertical column */
        .icon-button {
            min-width: unset;
            min-height: 40px;
            padding: 0.3rem 0.25rem;
            flex-shrink: 0;
            width: 100%;
            gap: 0.2rem;
        }
        .icon-button-icon-container { width: 24px; height: 24px; }
        .icon-button-icon { width: 13px; height: 13px; }
        .icon-button-label { font-size: 0.48rem; }
    }

    /* LeagueDetail 3-column responsive layout */
    @media (min-width: 768px) {
        .league-detail-grid { grid-template-columns: 220px 1fr 260px !important; }
        .league-detail-grid > div {
            max-height: calc(100vh - 200px);
            display: flex;
            flex-direction: column;
        }
        .league-detail-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 0;
        }
        .league-detail-scroll::-webkit-scrollbar { width: 6px; }
        .league-detail-scroll::-webkit-scrollbar-track { background: rgba(212,175,55,0.1); border-radius: 3px; }
        .league-detail-scroll::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }
    }
    @media (min-width: 1200px) {
        .league-detail-grid { grid-template-columns: 260px 1fr 300px !important; }
    }

    /* ══════ TRADE CALCULATOR STYLES ══════ */
    .tc-team-grid { display: grid; grid-template-columns: 1fr; gap: 0.75rem; }
    @media(min-width:600px){ .tc-team-grid { grid-template-columns: 1fr 1fr; } }
    @media(min-width:900px){ .tc-team-grid { grid-template-columns: repeat(3,1fr); } }
    @media(min-width:1200px){ .tc-team-grid { grid-template-columns: repeat(4,1fr); } }

    .tc-team-card { background: var(--off-black); border: 1px solid rgba(212,175,55,0.2); border-radius: 8px; overflow: hidden; transition: border-color 0.2s; }
    .tc-team-card:hover { border-color: rgba(212,175,55,0.5); }
    .tc-team-card.tc-my-team { border-color: var(--gold); box-shadow: 0 0 12px rgba(212,175,55,0.15); }
    .tc-card-header { background: var(--charcoal); padding: 0.55rem 0.7rem; display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
    .tc-card-body { padding: 0.6rem 0.7rem; display: flex; flex-direction: column; gap: 0.5rem; }

    .tc-pos-grid { display: flex; flex-direction: column; gap: 0.22rem; }
    .tc-pos-row { display: flex; align-items: center; gap: 0.4rem; }
    .tc-pos-label { font-size: 0.76rem; font-weight: 700; width: 20px; flex-shrink: 0; }
    .tc-pos-dots { display: flex; gap: 2px; flex: 1; flex-wrap: wrap; }
    .tc-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .tc-dot-filled { background: var(--win-green); }
    .tc-dot-depth { background: rgba(255,255,255,0.28); border: 1px solid rgba(255,255,255,0.35); }
    .tc-dot-empty { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); }
    .tc-dot-surplus { background: var(--gold); }
    .tc-dot-deficit { background: var(--loss-red); }
    .tc-pos-count { font-size: 0.74rem; width: 28px; text-align: right; flex-shrink: 0; }
    .tc-pos-status-icon { font-size: 0.8rem; width: 14px; flex-shrink: 0; }

    .tc-panic-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.2rem; }
    .tc-panic-dot { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); }
    .tc-panic-dot.tc-lit { background: var(--loss-red); border-color: var(--loss-red); box-shadow: 0 0 4px rgba(231,76,60,0.6); }

    .tc-chip-row { display: flex; flex-wrap: wrap; gap: 0.25rem; }
    .tc-chip { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em; padding: 0.1rem 0.35rem; border-radius: 3px; text-transform: uppercase; }
    .tc-chip-strength { background: rgba(46,204,113,0.15); border: 1px solid rgba(46,204,113,0.4); color: #2ECC71; }
    .tc-chip-need { background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.4); color: #E74C3C; }
    .tc-chip-thin { background: rgba(240,165,0,0.15); border: 1px solid rgba(240,165,0,0.4); color: #F0A500; }
    .tc-chip-window { background: rgba(93,173,226,0.12); border: 1px solid rgba(93,173,226,0.3); color: #5DADE2; }
    .tc-chip-dna { background: rgba(212,175,55,0.12); border: 1px solid rgba(212,175,55,0.3); color: var(--gold); }

    .tc-score-row { display: flex; align-items: center; gap: 0.5rem; }
    .tc-score-label { font-size: 0.78rem; color: var(--silver); opacity: 0.7; width: 60px; flex-shrink: 0; }
    .tc-score-bar-wrap { flex: 1; height: 6px; background: rgba(255,255,255,0.08); border-radius: 3px; overflow: hidden; }
    .tc-score-bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
    .tc-score-val { font-size: 0.8rem; font-weight: 700; width: 32px; text-align: right; flex-shrink: 0; }

    .tc-divider { height: 1px; background: rgba(212,175,55,0.1); margin: 0.25rem 0; }
    .tc-section-hdr { font-family: 'Bebas Neue', sans-serif; font-size: 0.9rem; color: var(--gold); letter-spacing: 0.12em; border-bottom: 1px solid rgba(212,175,55,0.2); padding-bottom: 0.3rem; margin-bottom: 0.6rem; }
    .tc-summary-bar { display: flex; gap: 1rem; padding: 0.5rem 0.75rem; background: rgba(212,175,55,0.05); border: 1px solid rgba(212,175,55,0.1); border-radius: 6px; margin-bottom: 0.75rem; flex-wrap: wrap; }
