<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Fantasy War Room</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fantasy War Room">
    <meta name="theme-color" content="#D4AF37">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #B8941E;
            --black: #0A0A0A;
            --off-black: #1A1A1A;
            --charcoal: #2A2A2A;
            --silver: #C0C0C0;
            --white: #FFFFFF;
            --win-green: #2ECC71;
            --loss-red: #E74C3C;
        }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

        body {
        font-family: 'Oswald', sans-serif;
        background: var(--black);
        color: var(--white);
        overflow-x: hidden;
        overflow-y: auto;
        min-height: 100vh;
        position: relative;
        -webkit-overflow-scrolling: touch;
    }

    /* Subdued logo background */
    body::before {
        content: '';
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: clamp(400px, 60vw, 1000px);
        height: clamp(400px, 60vw, 1000px);
        background-image: url('icon-192.png');
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
        opacity: 0.05;
        z-index: 0;
        pointer-events: none;
        filter: brightness(1.2);
    }

    .app-container {
        position: relative;
        z-index: 1;
        max-width: 100%;
        margin: 0 auto;
    }

    /* Header */
    .header {
        background: linear-gradient(135deg, var(--black) 0%, var(--off-black) 100%);
        padding: 1rem;
        border-bottom: 3px solid var(--gold);
        box-shadow: 0 4px 20px rgba(212, 175, 55, 0.2);
    }

    .header-title {
        font-family: 'Bebas Neue', cursive;
        font-size: 1rem;
        text-align: center;
        color: var(--gold);
        letter-spacing: 0.15em;
        margin-bottom: 0.5rem;
    }

    .owner-name {
        font-family: 'Bebas Neue', cursive;
        font-size: clamp(1.5rem, 5vw, 2.5rem);
        text-align: center;
        background: linear-gradient(135deg, var(--gold) 0%, var(--white) 50%, var(--gold) 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 0.1em;
        animation: shimmer 3s linear infinite;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
    }

    .owner-logo-small {
        width: clamp(70px, 12vw, 100px);
        height: clamp(70px, 12vw, 100px);
        flex-shrink: 0;
        filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
    }

    @keyframes shimmer {
        0% { background-position: 0% center; }
        100% { background-position: 200% center; }
    }

    .quote {
        text-align: center;
        margin-top: 0.75rem;
        padding: 0.75rem;
        font-family: 'Crimson Text', serif;
        font-style: italic;
        font-size: clamp(0.8rem, 2vw, 1rem);
        color: var(--silver);
        border-top: 1px solid rgba(212, 175, 55, 0.2);
    }

    .quote-author {
        font-size: 0.75rem;
        color: var(--gold);
        margin-top: 0.25rem;
        font-style: normal;
    }

    .settings-icon {
        position: absolute;
        top: 1rem;
        right: 1rem;
        width: 24px;
        height: 24px;
        cursor: pointer;
        opacity: 0.7;
        transition: all 0.3s ease;
    }

    .settings-icon:hover {
        opacity: 1;
        transform: rotate(90deg);
    }

    /* Main Layout */
    .main-layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
        padding: 1rem;
        padding-bottom: 50px;
        min-height: calc(100vh - 200px);
    }

    /* Desktop/Tablet 2-column layout (leagues + sidebar) */
    @media (min-width: 768px) {
        .main-layout {
            grid-template-columns: 1fr 80px;
            gap: 1.5rem;
            padding: 1.5rem;
        }
    }

    @media (min-width: 1200px) {
        .main-layout {
            grid-template-columns: 1fr 100px;
            padding: 2rem;
            max-width: 1600px;
            margin: 0 auto;
        }
    }

    .left-column, .center-column {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        overflow-x: hidden;
    }

   @media (min-width: 768px) {
        .left-column, .center-column {
            max-height: calc(100vh - 220px);
            overflow-y: auto;
            overflow-x: hidden;
            overscroll-behavior: contain;
            scroll-behavior: smooth;
        }

        .right-column {
            box-sizing: content-box;
            max-height: calc(100vh - 180px);
            overflow-y: auto;
            overflow-x: hidden;
            align-self: start;
            overscroll-behavior: contain;
            scroll-behavior: smooth;
            padding-bottom: 2rem;
        }

        .left-column::-webkit-scrollbar,
        .center-column::-webkit-scrollbar,
        .right-column::-webkit-scrollbar {
            width: 6px;
        }
        .left-column::-webkit-scrollbar-track,
        .center-column::-webkit-scrollbar-track,
        .right-column::-webkit-scrollbar-track {
            background: rgba(212, 175, 55, 0.1);
            border-radius: 3px;
        }
        .left-column::-webkit-scrollbar-thumb,
        .center-column::-webkit-scrollbar-thumb,
        .right-column::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 3px;
        }
    }

    .league-window {
        background: var(--black);
        border: 2px solid rgba(212, 175, 55, 0.2);
        border-radius: 12px;
        padding: 1rem;
        overflow-x: hidden;
        animation: fadeInLeft 0.6s ease both;
    }

    @media (min-width: 768px) {
        .league-window {
            max-height: 400px;
            display: flex;
            flex-direction: column;
        }
    }

    @keyframes fadeInLeft {
        from {
            opacity: 0;
            transform: translateX(-20px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    .league-window-scroll {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        min-height: 0;
        touch-action: pan-y;
    }

    .league-window-scroll::-webkit-scrollbar {
        width: 6px;
    }

    .league-window-scroll::-webkit-scrollbar-track {
        background: rgba(212, 175, 55, 0.1);
        border-radius: 3px;
    }

    .league-window-scroll::-webkit-scrollbar-thumb {
        background: var(--gold);
        border-radius: 3px;
    }

    .league-window-header {
        font-family: 'Bebas Neue', cursive;
        font-size: 1.2rem;
        color: var(--gold);
        margin-bottom: 0.75rem;
        letter-spacing: 0.1em;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        flex-shrink: 0;
    }

    .league-item {
        padding: 0.75rem;
        margin-bottom: 0.5rem;
        background: rgba(212, 175, 55, 0.05);
        border-left: 3px solid transparent;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .league-item:hover, .league-item.active {
        background: rgba(212, 175, 55, 0.15);
        border-left-color: var(--gold);
    }

    .league-item-name {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--white);
        margin-bottom: 0.25rem;
    }

    .league-item-record {
        font-size: 0.75rem;
        color: var(--silver);
    }



    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Key Events */
    .key-events {
        background: var(--black);
        border: 2px solid rgba(212, 175, 55, 0.2);
        border-radius: 12px;
        padding: 1.5rem;
        overflow-x: hidden;
        animation: fadeInUp 0.6s ease 0.4s both;
    }

    @media (min-width: 768px) {
        .key-events {
            max-height: 600px;
            display: flex;
            flex-direction: column;
        }
    }

    .key-events-scroll {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        min-height: 0;
        touch-action: pan-y;
    }

    .key-events-scroll::-webkit-scrollbar {
        width: 6px;
    }

    .key-events-scroll::-webkit-scrollbar-track {
        background: rgba(212, 175, 55, 0.1);
        border-radius: 3px;
    }

    .key-events-scroll::-webkit-scrollbar-thumb {
        background: var(--gold);
        border-radius: 3px;
    }

    .key-events-title {
        font-family: 'Bebas Neue', cursive;
        font-size: 1.3rem;
        color: var(--gold);
        margin-bottom: 1rem;
        letter-spacing: 0.15em;
        flex-shrink: 0;
    }

    .event-item {
        background: rgba(212, 175, 55, 0.05);
        border-left: 3px solid var(--gold);
        padding: 1rem;
        margin-bottom: 0.75rem;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .event-item:hover {
        background: rgba(212, 175, 55, 0.15);
        box-shadow: -4px 4px 12px rgba(212, 175, 55, 0.2);
    }

    .event-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.5rem;
    }

    .event-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--white);
    }

    .event-date {
        font-size: 0.85rem;
        color: var(--gold);
        font-weight: 600;
    }

    .event-league {
        font-size: 0.75rem;
        color: var(--silver);
        opacity: 0.8;
    }

    /* Right Column - Icon Buttons */
    .right-column {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        animation: fadeInRight 0.6s ease 0.5s both;
    }

    @keyframes fadeInRight {
        from {
            opacity: 0;
            transform: translateX(20px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    .icon-button {
        background: var(--black);
        border: 2px solid var(--gold);
        border-radius: 6px;
        padding: 0.75rem 0.5rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow:
            0 0 0 1px rgba(212, 175, 55, 0.3),
            0 3px 9px rgba(0, 0, 0, 0.5),
            inset 0 1px 0 rgba(212, 175, 55, 0.2);
        min-height: 71px;
        flex-shrink: 0;
        position: relative;
        overflow: visible;
    }

    /* Ornate corner decorations */
    .icon-button::before,
    .icon-button::after {
        content: '';
        position: absolute;
        width: 9px;
        height: 9px;
        border: 2px solid var(--gold);
        opacity: 0.6;
    }

    .icon-button::before {
        top: -2px;
        left: -2px;
        border-right: none;
        border-bottom: none;
    }

    .icon-button::after {
        bottom: -2px;
        right: -2px;
        border-left: none;
        border-top: none;
    }

    .icon-button:hover {
        transform: translateY(-4px);
        border-color: var(--white);
        box-shadow: 
            0 0 0 1px var(--gold),
            0 0 20px rgba(212, 175, 55, 0.4),
            0 8px 24px rgba(0, 0, 0, 0.6),
            inset 0 1px 0 rgba(212, 175, 55, 0.4);
    }

    .icon-button:hover::before,
    .icon-button:hover::after {
        border-color: var(--white);
        opacity: 1;
    }

    .icon-button:active {
        transform: translateY(-2px);
    }

    .icon-button-icon-container {
        width: 32px;
        height: 32px;
        background: linear-gradient(135deg, var(--gold) 0%, var(--dark-gold) 100%);
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 
            0 2px 8px rgba(212, 175, 55, 0.3),
            inset 0 1px 0 rgba(255, 255, 255, 0.2);
        position: relative;
    }

    .icon-button-icon-container::before {
        content: '';
        position: absolute;
        inset: 2px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, transparent 100%);
        border-radius: 4px;
        pointer-events: none;
    }

    .icon-button-icon {
        width: 18px;
        height: 18px;
        color: var(--black);
        position: relative;
        z-index: 1;
    }

    .icon-button-label {
        font-size: 0.49rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--white);
        text-align: center;
        line-height: 1.3;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }

    /* Mobile 3-column layout (iPhone) */
    @media (max-width: 767px) {
        .main-layout {
            display: grid;
            grid-template-columns: 120px 1fr 70px;
            grid-template-rows: calc(100vh - 200px);
            gap: 0.4rem;
            padding: 0.45rem;
            overflow: hidden;
        }

        .left-column,
        .center-column {
            overflow-y: hidden;
            overflow-x: hidden;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .right-column {
            overflow-y: scroll;
            overflow-x: hidden;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
            height: 100%;
            position: static;
            flex-direction: column;
            flex-wrap: nowrap;
            background: none;
            padding: 0;
            gap: 0.35rem;
            z-index: auto;
            justify-content: flex-start;
            align-items: stretch;
        }

        /* Key events: fill left column, title fixed, dates scroll */
        .key-events {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
            height: 100%;
        }
        .key-events-scroll {
            flex: 1;
            overflow-y: scroll;
            overflow-x: hidden;
            min-height: 0;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
        }

        /* League window: fill center column remainder, header fixed, leagues scroll */
        .league-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }
        .league-window-scroll {
            flex: 1;
            overflow-y: scroll;
            overflow-x: hidden;
            min-height: 0;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
        }

        /* Compact panel padding */
        .key-events,
        .league-window { padding: 0.5rem 0.4rem; border-radius: 8px; }

        /* Shrink key events */
        .key-events-title { font-size: 0.72rem; margin-bottom: 0.4rem; letter-spacing: 0.06em; }
        .event-item { padding: 0.4rem 0.45rem; margin-bottom: 0.35rem; }
        .event-title { font-size: 0.62rem; }
        .event-date  { font-size: 0.58rem; }
        .event-league { font-size: 0.55rem; }

        /* Shrink league window */
        .league-window-header { font-size: 0.65rem; padding: 0.35rem 0.4rem; }
        .league-item-name   { font-size: 0.65rem; }
        .league-item-record { font-size: 0.56rem; }

        /* Icon buttons — compact vertical column */
        .icon-button {
            min-width: unset;
            min-height: 40px;
            padding: 0.3rem 0.25rem;
            flex-shrink: 0;
            width: 100%;
            gap: 0.2rem;
        }
        .icon-button-icon-container { width: 24px; height: 24px; }
        .icon-button-icon { width: 13px; height: 13px; }
        .icon-button-label { font-size: 0.48rem; }
    }

    /* LeagueDetail 3-column responsive layout */
    @media (min-width: 768px) {
        .league-detail-grid { grid-template-columns: 220px 1fr 260px !important; }
        .league-detail-grid > div {
            max-height: calc(100vh - 200px);
            display: flex;
            flex-direction: column;
        }
        .league-detail-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 0;
        }
        .league-detail-scroll::-webkit-scrollbar { width: 6px; }
        .league-detail-scroll::-webkit-scrollbar-track { background: rgba(212,175,55,0.1); border-radius: 3px; }
        .league-detail-scroll::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }
    }
    @media (min-width: 1200px) {
        .league-detail-grid { grid-template-columns: 260px 1fr 300px !important; }
    }
</style>

</head>
<body>
    <div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://jcc100218.github.io/ReconAI/shared/constants.js"></script>
<script src="https://jcc100218.github.io/ReconAI/shared/utils.js"></script>
<script src="https://jcc100218.github.io/ReconAI/shared/sleeper-api.js"></script>
<script src="https://jcc100218.github.io/ReconAI/shared/supabase-client.js"></script>
<script src="https://jcc100218.github.io/ReconAI/shared/dhq-engine.js"></script>
<script src="https://jcc100218.github.io/ReconAI/shared/dhq-ai.js"></script>
<script src="https://jcc100218.github.io/ReconAI/shared/ai-dispatch.js"></script>
<script src="https://jcc100218.github.io/ReconAI/shared/player-modal.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
    // ===== DEV MODE =====
    const DEV_MODE = new URLSearchParams(window.location.search).has('dev') || window.location.hostname.includes('sandbox');
    if (DEV_MODE) {
        console.log('%c[DEV MODE] All features unlocked, auth bypassed','color:#D4AF37;font-weight:bold;font-size:14px');
        const b = document.createElement('div');
        b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#D4AF37;color:#000;font-size:11px;font-weight:700;text-align:center;padding:3px;letter-spacing:.05em;font-family:monospace';
        b.textContent = '⚡ SANDBOX — changes here do not affect production';
        document.body.prepend(b);
    }

    // ===== AUTHENTICATION CHECK =====
    const AUTH_KEY    = 'od_auth_v1';
    const SESSION_KEY = 'fw_session_v1';

    const legacyAuth   = localStorage.getItem(AUTH_KEY);
    const newSession   = (() => { try { return JSON.parse(localStorage.getItem(SESSION_KEY) || 'null'); } catch { return null; } })();
    const isAuthed     = !!(legacyAuth || newSession?.token || DEV_MODE);

    if (!isAuthed) {
        window.location.href = 'landing.html';
    }

    let sleeperUsername = '';
    // Dev mode: use URL param or default test username
    if (DEV_MODE) {
        sleeperUsername = new URLSearchParams(window.location.search).get('user') || 'jcc100218';
    }
    try {
        if (legacyAuth && !sleeperUsername) {
            const credentials = JSON.parse(legacyAuth);
            sleeperUsername = credentials.username || '';
            // Sync username to Team Comps page localStorage key so it auto-logs in
            if (sleeperUsername) {
                localStorage.setItem('od_locked_username_v2', sleeperUsername);
            }
        }
    } catch (e) {
        localStorage.removeItem(AUTH_KEY);
        if (!newSession?.token) window.location.href = 'landing.html';
    }

    const { useState, useEffect, useRef } = React;

    function handleLogout() {
        if (confirm('Are you sure you want to logout?')) {
            localStorage.removeItem(AUTH_KEY);
            localStorage.removeItem(SESSION_KEY);
            window.location.href = 'landing.html';
        }
    }


    // ===== SLEEPER API =====
    const SLEEPER_BASE_URL = 'https://api.sleeper.app/v1';

    async function fetchJSON(url) {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
    }

    async function fetchSleeperUser(username) {
        return await fetchJSON(`${SLEEPER_BASE_URL}/user/${encodeURIComponent(username)}`);
    }

    async function fetchUserLeagues(userId, season) {
        return await fetchJSON(`${SLEEPER_BASE_URL}/user/${userId}/leagues/nfl/${season}`);
    }

    async function fetchLeagueRosters(leagueId) {
        return await fetchJSON(`${SLEEPER_BASE_URL}/league/${leagueId}/rosters`);
    }

    async function fetchLeagueUsers(leagueId) {
        return await fetchJSON(`${SLEEPER_BASE_URL}/league/${leagueId}/users`);
    }

    async function fetchLeagueInfo(leagueId) {
        return await fetchJSON(`${SLEEPER_BASE_URL}/league/${leagueId}`);
    }

    let _wrPlayersCache = null;
    async function fetchAllPlayers() {
        if (_wrPlayersCache) return _wrPlayersCache;
        _wrPlayersCache = await fetchJSON(`${SLEEPER_BASE_URL}/players/nfl`);
        return _wrPlayersCache;
    }

    const STATS_YEAR = '2025'; // Most recent completed season — used until Sleeper publishes projections

    let _wrStatsCache = {};
    async function fetchSeasonStats(season) {
        if (_wrStatsCache[season]) return _wrStatsCache[season];
        try {
            _wrStatsCache[season] = await fetchJSON(`${SLEEPER_BASE_URL}/stats/nfl/regular/${season}`);
        } catch (e) {
            console.warn('Stats fetch failed:', e);
            _wrStatsCache[season] = {};
        }
        return _wrStatsCache[season];
    }

    let _projectionsCache = {};
    async function fetchSeasonProjections(season) {
        if (_projectionsCache[season]) return _projectionsCache[season];
        try {
            _projectionsCache[season] = await fetchJSON(`${SLEEPER_BASE_URL}/projections/nfl/regular/${season}`);
        } catch (e) {
            console.warn('Projections fetch failed:', e);
            _projectionsCache[season] = {};
        }
        return _projectionsCache[season];
    }

    // Settings Modal
    function SettingsModal({ onClose, initDisplayName, onDisplayNameSave, leagueMates }) {
        const [pwMsg, setPwMsg] = React.useState('');
        const [currentPw, setCurrentPw] = React.useState('');
        const [newPw, setNewPw] = React.useState('');
        const [confirmPw, setConfirmPw] = React.useState('');
        const [displayName, setDisplayName] = React.useState(initDisplayName || '');
        const [matesAccess, setMatesAccess] = React.useState(null); // Set of usernames with accounts
        const [giftLinks, setGiftLinks] = React.useState({}); // { username: { url, password } }
        const [giftingFor, setGiftingFor] = React.useState(null);

        const isGiftedAccount = React.useMemo(() => {
            try {
                const auth = JSON.parse(localStorage.getItem('od_auth_v1') || '{}');
                return !!auth.isGifted;
            } catch { return false; }
        }, []);

        const currentTier = React.useMemo(() => {
            try {
                const p = JSON.parse(localStorage.getItem('od_profile_v1') || '{}');
                return p.tier || 'free';
            } catch { return 'free'; }
        }, []);

        const tierLabel = { free: 'War Room Free', pro: 'Dynasty HQ Pro', power: 'Dynasty HQ Power' };
        const tierColor = { free: 'var(--silver)', pro: 'var(--gold)', power: '#A855F7' };
        const tierBg    = { free: 'rgba(192,192,192,0.12)', pro: 'rgba(212,175,55,0.12)', power: 'rgba(168,85,247,0.12)' };

        function goToManagePlan() {
            window.location.href = 'onboarding.html?manage=true';
        }

        function handleCancelPlan() {
            if (!confirm('Cancel your subscription? You will be moved to the War Room Free plan.')) return;
            try {
                const profile = JSON.parse(localStorage.getItem('od_profile_v1') || '{}');
                localStorage.setItem('od_profile_v1', JSON.stringify({ ...profile, tier: 'free' }));
                alert('Subscription cancelled. You are now on the War Room Free plan.');
                onClose();
            } catch { alert('Failed to cancel. Please try again.'); }
        }

        function handleDisplayNameSave() {
            onDisplayNameSave(displayName);
        }

        async function handleChangePassword() {
            setPwMsg('');
            if (!currentPw || !newPw || !confirmPw) { setPwMsg('✗ Fill in all fields'); return; }
            if (newPw !== confirmPw) { setPwMsg('✗ New passwords do not match'); return; }
            if (newPw.length < 6) { setPwMsg('✗ Password must be at least 6 characters'); return; }
            try {
                // Verify current password against stored hash
                const AUTH_KEY = 'od_auth_v1';
                const auth = JSON.parse(localStorage.getItem(AUTH_KEY) || '{}');
                const encoder = new TextEncoder();
                const hashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(currentPw));
                const currentHash = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');

                if (auth.passwordHash && auth.passwordHash !== currentHash) {
                    // Also try Supabase in case this is a gifted account
                    const result = await window.OD.verifySupabasePassword(sleeperUsername, currentPw);
                    if (!result || !result.match) {
                        setPwMsg('✗ Current password is incorrect');
                        return;
                    }
                }
                // Update Supabase
                await window.OD.updatePassword(sleeperUsername, newPw);
                // Update localStorage
                const newHashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(newPw));
                const newHash = Array.from(new Uint8Array(newHashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');
                localStorage.setItem(AUTH_KEY, JSON.stringify({ ...auth, passwordHash: newHash, isGifted: false }));
                setCurrentPw(''); setNewPw(''); setConfirmPw('');
                setPwMsg('✓ Password updated');
            } catch (e) {
                setPwMsg('✗ Failed to update password');
            }
        }

        // Load leaguemate access status when modal opens
        React.useEffect(() => {
            if (!leagueMates || leagueMates.length === 0) return;
            const usernames = leagueMates.map(m => m.username).filter(Boolean);
            window.OD.checkUsersAccess(usernames).then(setMatesAccess).catch(() => setMatesAccess(new Set()));
        }, []);

        async function handleGiftAccess(mate) {
            const username = mate.username;
            if (!username) return;
            setGiftingFor(username);
            try {
                // Generate a random 8-char initial password
                const pw = Array.from(crypto.getRandomValues(new Uint8Array(4)))
                    .map(b => b.toString(16).padStart(2, '0')).join('').toUpperCase();
                await window.OD.createGiftUser({
                    sleeperUsername: username,
                    password: pw,
                    displayName: mate.display_name || null,
                });
                const base = window.location.href.replace(/\/[^/]*$/, '/');
                const url = `${base}login.html?for=${encodeURIComponent(username)}`;
                setGiftLinks(prev => ({ ...prev, [username]: { url, password: pw } }));
                setMatesAccess(prev => new Set([...(prev || []), username]));
            } catch (e) {
                console.error('Gift failed:', e);
            }
            setGiftingFor(null);
        }

        const sectionStyle = { marginBottom: '1.25rem', padding: '1rem', background: 'rgba(212,175,55,0.07)', border: '1px solid rgba(212,175,55,0.2)', borderRadius: '8px' };
        const sectionTitle = { fontFamily: 'Bebas Neue, cursive', fontSize: '1rem', color: 'var(--gold)', letterSpacing: '0.12em', marginBottom: '0.75rem' };
        const inputStyle = { width: '100%', padding: '0.55rem 0.75rem', background: 'var(--black)', border: '1px solid rgba(212,175,55,0.3)', borderRadius: '6px', color: 'var(--white)', fontFamily: 'Oswald, sans-serif', fontSize: '0.85rem', marginBottom: '0.5rem' };
        const btnPrimary = { flex: 1, padding: '0.6rem', background: 'var(--gold)', border: 'none', borderRadius: '6px', color: 'var(--black)', fontFamily: 'Oswald, sans-serif', fontSize: '0.82rem', fontWeight: '700', textTransform: 'uppercase', letterSpacing: '0.05em', cursor: 'pointer' };
        const btnOutline = { flex: 1, padding: '0.6rem', background: 'transparent', border: '1px solid var(--gold)', borderRadius: '6px', color: 'var(--gold)', fontFamily: 'Oswald, sans-serif', fontSize: '0.82rem', fontWeight: '700', textTransform: 'uppercase', letterSpacing: '0.05em', cursor: 'pointer' };

        return (
            <div style={{ position: 'fixed', top: 0, left: 0, right: 0, bottom: 0, background: 'rgba(0,0,0,0.85)', display: 'flex', alignItems: 'center', justifyContent: 'center', zIndex: 1000, padding: '1rem' }} onClick={onClose}>
                <div style={{ background: 'linear-gradient(135deg, var(--off-black) 0%, var(--charcoal) 100%)', border: '3px solid var(--gold)', borderRadius: '12px', padding: '1.5rem', maxWidth: '440px', width: '100%', boxShadow: '0 8px 32px rgba(0,0,0,0.8)', maxHeight: '90vh', overflowY: 'auto' }} onClick={(e) => e.stopPropagation()}>
                    <h2 style={{ fontFamily: 'Bebas Neue, cursive', fontSize: '1.5rem', color: 'var(--gold)', marginBottom: '1.25rem', textAlign: 'center', letterSpacing: '0.1em' }}>SETTINGS</h2>

                    <div style={{ fontSize: '0.85rem', color: 'var(--silver)', marginBottom: '1.25rem' }}>
                        Logged in as: <strong style={{ color: 'var(--white)' }}>{sleeperUsername}</strong>
                        {isGiftedAccount && <span style={{ marginLeft: '0.5rem', fontSize: '0.7rem', color: 'var(--gold)', background: 'rgba(212,175,55,0.15)', padding: '0.1rem 0.4rem', borderRadius: '4px' }}>GIFTED — change your password below</span>}
                    </div>

                    {/* ── DISPLAY NAME ── */}
                    <div style={sectionStyle}>
                        <div style={sectionTitle}>DISPLAY NAME</div>
                        <div style={{ fontSize: '0.72rem', color: 'var(--silver)', marginBottom: '0.5rem' }}>Custom name (optional)</div>
                        <div style={{ display: 'flex', gap: '0.5rem' }}>
                            <input
                                style={{ ...inputStyle, marginBottom: 0, flex: 1 }}
                                placeholder={sleeperUsername}
                                value={displayName}
                                onChange={e => setDisplayName(e.target.value)}
                            />
                            <button onClick={handleDisplayNameSave} style={{ ...btnPrimary, flex: 'none', padding: '0.55rem 0.85rem' }}>Save</button>
                        </div>
                    </div>

                    {/* ── CHANGE PASSWORD ── */}
                    <div style={sectionStyle}>
                        <div style={sectionTitle}>CHANGE PASSWORD</div>
                        <input style={inputStyle} type="password" placeholder="Current password" value={currentPw} onChange={e => setCurrentPw(e.target.value)} />
                        <input style={inputStyle} type="password" placeholder="New password" value={newPw} onChange={e => setNewPw(e.target.value)} />
                        <input style={{ ...inputStyle, marginBottom: '0.75rem' }} type="password" placeholder="Confirm new password" value={confirmPw} onChange={e => setConfirmPw(e.target.value)} />
                        <button onClick={handleChangePassword} style={{ ...btnPrimary, width: '100%', flex: 'none' }}>Update Password</button>
                        {pwMsg && <div style={{ marginTop: '0.5rem', fontSize: '0.73rem', color: pwMsg.startsWith('✓') ? 'var(--win-green)' : '#E74C3C' }}>{pwMsg}</div>}
                    </div>

                    {/* ── LEAGUEMATES ACCESS ── */}
                    {leagueMates && leagueMates.length > 0 && (
                        <div style={sectionStyle}>
                            <div style={sectionTitle}>LEAGUEMATE ACCESS</div>
                            <div style={{ fontSize: '0.72rem', color: 'var(--silver)', marginBottom: '0.75rem' }}>
                                Share the dashboard with your league. Each leaguemate gets their own login with full access to all features including AI Scout.
                            </div>
                            <div style={{ display: 'flex', flexDirection: 'column', gap: '0.5rem', maxHeight: '220px', overflowY: 'auto' }}>
                                {leagueMates.map(mate => {
                                    const username = mate.username;
                                    if (!username) return null;
                                    const hasAccess = matesAccess?.has(username);
                                    const link = giftLinks[username];
                                    const isGifting = giftingFor === username;
                                    return (
                                        <div key={username} style={{ padding: '0.5rem 0.6rem', background: 'rgba(0,0,0,0.3)', borderRadius: '6px', border: `1px solid ${hasAccess ? 'rgba(46,204,113,0.3)' : 'rgba(212,175,55,0.15)'}` }}>
                                            <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', marginBottom: link ? '0.4rem' : 0 }}>
                                                {mate.avatar
                                                    ? <img src={`https://sleepercdn.com/avatars/thumbs/${mate.avatar}`} style={{ width: 24, height: 24, borderRadius: '50%', flexShrink: 0 }} onError={e => { e.target.style.display='none'; }} />
                                                    : <div style={{ width: 24, height: 24, borderRadius: '50%', background: 'rgba(212,175,55,0.3)', display:'flex', alignItems:'center', justifyContent:'center', fontSize:'0.65rem', fontWeight:700, flexShrink: 0 }}>{(mate.display_name || username || '?')[0].toUpperCase()}</div>
                                                }
                                                <span style={{ flex: 1, fontSize: '0.78rem', color: 'var(--white)', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                                                    {mate.display_name || username}
                                                </span>
                                                {matesAccess === null
                                                    ? <span style={{ fontSize: '0.65rem', color: 'var(--silver)' }}>checking…</span>
                                                    : hasAccess
                                                        ? <span style={{ fontSize: '0.65rem', color: 'var(--win-green)', fontWeight: 700 }}>✓ Has access</span>
                                                        : <button onClick={() => handleGiftAccess(mate)} disabled={isGifting} style={{ padding: '0.2rem 0.55rem', background: 'var(--gold)', border: 'none', borderRadius: '4px', color: 'var(--black)', fontFamily: 'Oswald,sans-serif', fontSize: '0.68rem', fontWeight: 700, cursor: 'pointer', flexShrink: 0 }}>
                                                            {isGifting ? '…' : 'Generate Link'}
                                                        </button>
                                                }
                                            </div>
                                            {link && (
                                                <div style={{ fontSize: '0.65rem', color: 'var(--silver)', wordBreak: 'break-all', background: 'rgba(0,0,0,0.4)', padding: '0.3rem 0.4rem', borderRadius: '4px' }}>
                                                    <div><strong style={{ color: 'var(--gold)' }}>Link:</strong> {link.url}</div>
                                                    <div><strong style={{ color: 'var(--gold)' }}>Temp password:</strong> {link.password}</div>
                                                    <div style={{ color: 'rgba(255,255,255,0.4)', marginTop: '0.2rem' }}>Share both — they can change password after login</div>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    )}

                    {/* ── SUBSCRIPTION ── */}
                    <div style={sectionStyle}>
                        <div style={sectionTitle}>SUBSCRIPTION</div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', marginBottom: '0.85rem' }}>
                            <span style={{ fontSize: '0.72rem', color: 'var(--silver)' }}>Current plan:</span>
                            <span style={{ fontSize: '0.75rem', fontWeight: 700, color: tierColor[currentTier] || 'var(--silver)', background: tierBg[currentTier] || 'rgba(192,192,192,0.12)', padding: '0.15rem 0.55rem', borderRadius: '4px', textTransform: 'uppercase', letterSpacing: '0.06em' }}>
                                {tierLabel[currentTier] || 'War Room Free'}
                            </span>
                        </div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '0.5rem' }}>
                            <button onClick={goToManagePlan} style={{ ...btnPrimary, fontSize: '0.75rem' }}>Upgrade</button>
                            <button onClick={goToManagePlan} style={{ ...btnOutline, fontSize: '0.75rem' }}>Change Plan</button>
                            <button onClick={goToManagePlan} style={{ ...btnOutline, fontSize: '0.75rem' }}>Gift Sub</button>
                            <button onClick={handleCancelPlan} style={{ ...btnOutline, fontSize: '0.75rem', borderColor: 'rgba(231,76,60,0.35)', color: '#E74C3C' }}>Cancel</button>
                        </div>
                        <div style={{ marginTop: '0.6rem', fontSize: '0.66rem', color: 'rgba(255,255,255,0.3)', textAlign: 'center' }}>Manage your Dynasty HQ subscription</div>
                    </div>

                    <div style={{ display: 'flex', gap: '0.75rem', flexDirection: 'column' }}>
                        <button onClick={handleLogout} style={{ padding: '0.75rem', background: 'linear-gradient(135deg, #E74C3C 0%, #C0392B 100%)', border: 'none', borderRadius: '8px', color: 'white', fontFamily: 'Oswald, sans-serif', fontSize: '0.9rem', fontWeight: '700', textTransform: 'uppercase', letterSpacing: '0.05em', cursor: 'pointer' }}>
                            Logout
                        </button>
                        <button onClick={onClose} style={{ padding: '0.75rem', background: 'var(--black)', border: '2px solid var(--gold)', borderRadius: '8px', color: 'var(--gold)', fontFamily: 'Oswald, sans-serif', fontSize: '0.9rem', fontWeight: '700', textTransform: 'uppercase', letterSpacing: '0.05em', cursor: 'pointer' }}>
                            Close
                        </button>
                    </div>
                </div>
            </div>
        );
    }

    // League Detail Component
    function LeagueDetail({ league, onBack, sleeperUserId }) {
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [playersData, setPlayersData] = useState({});
        const [myRoster, setMyRoster] = useState(null);
        const [standings, setStandings] = useState([]);
        const [viewingOwnerId, setViewingOwnerId] = useState(sleeperUserId);
        const [statsData, setStatsData] = useState({});
        const [projectionsData, setProjectionsData] = useState({});
        const [stats2025Data, setStats2025Data] = useState({});
        const [currentLeague, setCurrentLeague] = useState(league);
        const [activeYear, setActiveYear] = useState(league.season);
        const [trending, setTrending] = useState({ adds: [], drops: [] });

        useEffect(() => {
            loadLeagueDetails();
        }, [currentLeague]);

        async function loadLeagueDetails() {
            try {
                if (!currentLeague.rosters || !currentLeague.users) {
                    throw new Error('League missing roster or user data');
                }

                const myRosterData = currentLeague.rosters.find(r => r.owner_id === sleeperUserId);
                setMyRoster(myRosterData);

                const standingsData = currentLeague.rosters.map(roster => {
                    const user = currentLeague.users.find(u => u.user_id === roster.owner_id);
                    return {
                        rosterId: roster.roster_id,
                        userId: roster.owner_id,
                        displayName: user?.display_name || user?.username || 'Unknown',
                        avatar: user?.avatar,
                        wins: roster.settings?.wins || 0,
                        losses: roster.settings?.losses || 0,
                        ties: roster.settings?.ties || 0,
                        pointsFor: roster.settings?.fpts || 0,
                        division: roster.settings?.division || 0
                    };
                }).sort((a, b) => {
                    if (b.wins !== a.wins) return b.wins - a.wins;
                    if (a.losses !== b.losses) return a.losses - b.losses;
                    return b.pointsFor - a.pointsFor;
                });

                setStandings(standingsData);

                const [stats, projections, s2025] = await Promise.all([
                    fetchSeasonStats(currentLeague.season),
                    fetchSeasonProjections(currentLeague.season),
                    fetchSeasonStats(STATS_YEAR)
                ]);
                setStatsData(stats);
                setProjectionsData(projections);
                setStats2025Data(s2025);
                setLoading(false);
                // Load player names in background — large payload, non-blocking
                fetchAllPlayers().then(p => setPlayersData(p)).catch(() => {});
                // Load Sleeper trending adds/drops in background
                if (window.Sleeper?.fetchTrending) {
                    Promise.all([
                        window.Sleeper.fetchTrending('add', 24, 15),
                        window.Sleeper.fetchTrending('drop', 24, 15)
                    ]).then(([adds, drops]) => {
                        setTrending({ adds: adds || [], drops: drops || [] });
                    }).catch(() => {});
                }
            } catch (err) {
                console.error('Failed to load league details:', err);
                setError(err.message || 'Failed to load league details');
                setLoading(false);
            }
        }

        async function switchYear(year) {
            if (year === activeYear) return;
            setLoading(true);
            setError(null);
            setActiveYear(year);
            try {
                const targetYear = parseInt(year);
                const currentYear = parseInt(activeYear);
                let targetLeagueId = null;

                if (targetYear < currentYear) {
                    // Going backward: walk previous_league_id chain
                    let leagueId = currentLeague.id;
                    for (let y = currentYear; y > targetYear && leagueId; y--) {
                        const leagueInfo = await fetchLeagueInfo(leagueId);
                        leagueId = leagueInfo?.previous_league_id || null;
                    }
                    targetLeagueId = leagueId;
                } else {
                    // Going forward: get user leagues for target year, then check which one chains back to current league
                    const userLeagues = await fetchUserLeagues(sleeperUserId, year);
                    for (const lg of userLeagues) {
                        // Walk this league's previous_league_id chain to see if it connects to our current league
                        let checkId = lg.previous_league_id;
                        let steps = targetYear - currentYear;
                        while (steps > 1 && checkId) {
                            const info = await fetchLeagueInfo(checkId);
                            checkId = info?.previous_league_id || null;
                            steps--;
                        }
                        if (checkId === currentLeague.id) {
                            targetLeagueId = lg.league_id;
                            break;
                        }
                    }
                    // Fallback: match by name if chain doesn't connect
                    if (!targetLeagueId) {
                        const nameMatch = userLeagues.find(l => l.name === currentLeague.name);
                        targetLeagueId = nameMatch ? nameMatch.league_id : (userLeagues[0] ? userLeagues[0].league_id : null);
                    }
                }

                if (!targetLeagueId) {
                    setError('No leagues found for ' + year);
                    setLoading(false);
                    return;
                }

                const [leagueInfo, rosters, users] = await Promise.all([
                    fetchLeagueInfo(targetLeagueId),
                    fetchLeagueRosters(targetLeagueId),
                    fetchLeagueUsers(targetLeagueId)
                ]);
                setViewingOwnerId(sleeperUserId);
                setCurrentLeague({
                    id: targetLeagueId,
                    name: leagueInfo.name,
                    season: year,
                    scoring_settings: leagueInfo.scoring_settings || {},
                    roster_positions: leagueInfo.roster_positions || [],
                    rosters,
                    users
                });
            } catch (err) {
                console.error('Failed to switch year:', err);
                setError('Failed to load ' + year + ' data');
                setLoading(false);
            }
        }

        function getPlayerName(playerId) {
            const player = playersData[playerId];
            if (!player) return `Player ${playerId}`;
            return player.full_name || `${player.first_name || ''} ${player.last_name || ''}`.trim() || `Player ${playerId}`;
        }

        function getPlayerPosition(playerId) {
            const player = playersData[playerId];
            return player?.position || '??';
        }

        function getPlayerTeam(playerId) {
            const player = playersData[playerId];
            return player?.team || '';
        }

        // Compute fantasy pts using the league's actual scoring_settings weights,
        // applied to raw stat fields — works for both offensive and IDP players.
        // Mirrors the Team Comps page's fantasyPointsFromScoring() approach:
        // always use scoring_settings when available so IDP defensive stats aren't
        // silently zeroed out by Sleeper's pre-calculated pts_half_ppr = 0.
        function calcRawPts(s) {
            if (!s) return null;
            const scoring = currentLeague?.scoring_settings;
            if (scoring) {
                let total = 0;
                for (const [field, weight] of Object.entries(scoring)) {
                    if (typeof weight !== 'number') continue;
                    if (s[field] != null) total += Number(s[field]) * weight;
                }
                return total;
            }
            // Fallback: Sleeper's pre-calculated totals (offensive players only)
            const pre = s.pts_half_ppr ?? s.pts_ppr ?? s.pts_std ?? null;
            return pre !== null ? Number(pre) : null;
        }

        function getPlayerStats(playerId) {
            const player = playersData[playerId];
            // Always show STATS_YEAR totals; fall back to current-season data for historical year views
            const s = stats2025Data[playerId] || statsData[playerId];
            const p = projectionsData[playerId];

            // Years of experience
            const yrs = player?.years_exp != null ? player.years_exp : '-';

            // Fantasy points — uses league scoring_settings for IDP players
            const rawPts = calcRawPts(s);
            const pts = rawPts !== null ? Number(rawPts).toFixed(1) : '-';

            // Games played
            const gp = s?.gp != null ? s.gp : '-';

            // Average points per game
            let avg = '-';
            if (rawPts !== null && s?.gp && s.gp > 0) {
                avg = (rawPts / s.gp).toFixed(1);
            }

            // Projected points — use Sleeper projections when available, otherwise 2025 season totals
            const rawProj = p ? (p.pts_half_ppr ?? p.pts_ppr ?? p.pts_std ?? null) : null;
            const rawPts2025 = calcRawPts(stats2025Data[playerId]);
            const proj = rawProj !== null ? Number(rawProj).toFixed(1) : (rawPts2025 !== null ? Number(rawPts2025).toFixed(1) : '-');

            return { yrs, pts, gp, avg, proj };
        }

        function getPositionColor(pos) {
            const colors = { QB: '#FF6B6B', RB: '#4ECDC4', WR: '#45B7D1', TE: '#F7DC6F', K: '#BB8FCE', DEF: '#85929E' };
            return colors[pos] || 'var(--silver)';
        }

        if (error) {
            return (
                <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', color: 'var(--white)', padding: '2rem', textAlign: 'center' }}>
                    <div style={{ color: '#E74C3C', fontSize: '1.5rem', marginBottom: '1rem' }}>Error Loading League</div>
                    <div style={{ color: 'var(--silver)', marginBottom: '2rem' }}>{error}</div>
                    <button onClick={onBack} style={{ padding: '0.75rem 1.5rem', background: 'var(--gold)', border: 'none', borderRadius: '8px', color: 'var(--black)', fontFamily: 'Oswald, sans-serif', fontSize: '1rem', fontWeight: '700', cursor: 'pointer' }}>← Back to Dashboard</button>
                </div>
            );
        }

        if (loading) {
            return (
                <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', color: 'var(--gold)', gap: '1rem' }}>
                    <div style={{ fontSize: '1.5rem' }}>Loading {currentLeague.name}...</div>
                    <div style={{ fontSize: '0.9rem', color: 'var(--silver)' }}>Fetching player database & stats</div>
                </div>
            );
        }

        // Currently viewed roster
        const viewingRoster = currentLeague.rosters.find(r => r.owner_id === viewingOwnerId) || myRoster;
        const viewingOwner = standings.find(t => t.userId === viewingOwnerId);
        const isViewingMyTeam = viewingOwnerId === sleeperUserId;

        // Stat column style shared by header and rows
        const statColStyle = { width: '42px', textAlign: 'center', fontSize: '0.65rem', flexShrink: 0 };

        // Column header row for stat columns — merged into section labels
        const statLabels = ['YRS', 'PTS', 'GP', 'AVG', 'PROJ'];

        function SectionLabel({ label, color, borderColor, borderWidth }) {
            return (
                <div style={{
                    display: 'flex',
                    alignItems: 'center',
                    marginBottom: '0.5rem',
                    paddingBottom: '0.4rem',
                    borderBottom: `${borderWidth || '1px'} solid ${borderColor || color}`,
                    gap: '0.5rem'
                }}>
                    <span style={{ width: '36px', flexShrink: 0 }}></span>
                    <span style={{ flex: 1, color: color, fontSize: '0.85rem', fontWeight: '700', letterSpacing: '0.08em' }}>{label}</span>
                    {statLabels.map(l => (
                        <span key={l} style={{ ...statColStyle, color: 'var(--gold)', fontWeight: '700', letterSpacing: '0.05em', opacity: 0.8 }}>{l}</span>
                    ))}
                </div>
            );
        }

        // PlayerRow with gold position box, clickable name, 5 stat columns
        function PlayerRow({ playerId, section }) {
            const pos = getPlayerPosition(playerId);
            const stats = getPlayerStats(playerId);
            const team = getPlayerTeam(playerId);
            const borderColor = section === 'starter' ? 'var(--gold)' : section === 'ir' ? '#E74C3C' : section === 'taxi' ? '#3498DB' : 'transparent';
            const bgColor = section === 'starter' ? 'rgba(212, 175, 55, 0.05)' : section === 'ir' ? 'rgba(231, 76, 60, 0.05)' : section === 'taxi' ? 'rgba(52, 152, 219, 0.05)' : 'rgba(255, 255, 255, 0.02)';
            return (
                <div style={{
                    display: 'flex',
                    alignItems: 'center',
                    padding: '0.45rem 0.6rem',
                    marginBottom: '0.3rem',
                    background: bgColor,
                    borderLeft: borderColor !== 'transparent' ? `3px solid ${borderColor}` : 'none',
                    borderRadius: '4px',
                    gap: '0.5rem'
                }}>
                    {/* Gold position box */}
                    <span style={{
                        display: 'inline-flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        width: '36px',
                        flexShrink: 0,
                        fontSize: '0.65rem',
                        fontWeight: '700',
                        color: getPositionColor(pos),
                        border: '1.5px solid var(--gold)',
                        borderRadius: '3px',
                        padding: '2px 0',
                        background: 'rgba(212, 175, 55, 0.08)',
                        letterSpacing: '0.02em'
                    }}>
                        {pos}
                    </span>
                    {/* Player name + team — opens shared player card */}
                    <a
                        href="#"
                        onClick={e => { e.preventDefault(); if(window.openFWPlayerModal) openFWPlayerModal(playerId, playersData, statsData); }}
                        style={{
                            flex: 1,
                            display: 'flex',
                            alignItems: 'center',
                            gap: '6px',
                            color: 'var(--white)',
                            fontSize: '0.92rem',
                            overflow: 'hidden',
                            textDecoration: 'none',
                            transition: 'color 0.2s',
                            minWidth: 0,
                            cursor: 'pointer'
                        }}
                        onMouseEnter={e => e.currentTarget.style.color = 'var(--gold)'}
                        onMouseLeave={e => e.currentTarget.style.color = 'var(--white)'}
                    >
                        <img
                            src={`https://sleepercdn.com/content/nfl/players/thumb/${playerId}.jpg`}
                            alt=""
                            onError={e => { e.target.style.display = 'none'; }}
                            style={{ width: '28px', height: '28px', borderRadius: '50%', objectFit: 'cover', flexShrink: 0 }}
                        />
                        <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                            {getPlayerName(playerId)} <span style={{ fontSize: '0.62rem', color: 'var(--silver)', opacity: 0.5 }}>{team}</span>
                        </span>
                    </a>
                    {/* Stat columns: YRS PTS GP AVG PROJ */}
                    <span style={{ ...statColStyle, color: 'var(--silver)', opacity: 0.7 }}>{stats.yrs}</span>
                    <span style={{ ...statColStyle, color: 'var(--gold)', fontWeight: '700' }}>{stats.pts}</span>
                    <span style={{ ...statColStyle, color: 'var(--silver)', opacity: 0.7 }}>{stats.gp}</span>
                    <span style={{ ...statColStyle, color: 'var(--silver)', opacity: 0.7 }}>{stats.avg}</span>
                    <span style={{ ...statColStyle, color: '#4ECDC4', fontWeight: '600' }}>{stats.proj}</span>
                </div>
            );
        }

        // Reusable roster section renderer
        function RosterSection({ roster }) {
            if (!roster) return <div style={{ textAlign: 'center', color: 'var(--silver)', padding: '2rem' }}>No roster found</div>;
            const starters = roster.starters || [];
            const reserve = roster.reserve || [];
            const taxi = roster.taxi || [];
            const bench = (roster.players || []).filter(p => !starters.includes(p) && !reserve.includes(p) && !taxi.includes(p));

            return (
                <>
                    {starters.length > 0 && (
                        <div style={{ marginBottom: '1.25rem' }}>
                            <SectionLabel label="STARTERS" color="var(--gold)" borderColor="var(--gold)" borderWidth="2px" />
                            {starters.map((id, i) => <PlayerRow key={i} playerId={id} section="starter" />)}
                        </div>
                    )}
                    {bench.length > 0 && (
                        <div style={{ marginBottom: '1.25rem' }}>
                            <SectionLabel label="BENCH" color="var(--silver)" borderColor="rgba(255,255,255,0.15)" />
                            {bench.map((id, i) => <PlayerRow key={i} playerId={id} section="bench" />)}
                        </div>
                    )}
                    {reserve.length > 0 && (
                        <div style={{ marginBottom: '1.25rem' }}>
                            <SectionLabel label="INJURED RESERVE" color="#E74C3C" borderColor="rgba(231,76,60,0.3)" />
                            {reserve.map((id, i) => <PlayerRow key={i} playerId={id} section="ir" />)}
                        </div>
                    )}
                    {taxi.length > 0 && (
                        <div>
                            <SectionLabel label="TAXI SQUAD" color="#3498DB" borderColor="rgba(52,152,219,0.3)" />
                            {taxi.map((id, i) => <PlayerRow key={i} playerId={id} section="taxi" />)}
                        </div>
                    )}
                </>
            );
        }

        // Build divisions
        const divisions = {};
        const hasDivisions = standings.some(t => t.division > 0);
        if (hasDivisions) {
            standings.forEach(team => {
                const div = team.division || 0;
                if (!divisions[div]) divisions[div] = [];
                divisions[div].push(team);
            });
        } else {
            divisions[0] = [...standings];
        }
        const divisionKeys = Object.keys(divisions).sort((a, b) => Number(a) - Number(b));

        // Nav buttons
        const navButtons = [
            { label: 'Dashboard', action: onBack },
            { label: 'Team Comps', url: 'team-comps/' },
            { label: 'Matchup', url: `https://sleeper.com/leagues/${currentLeague.id}/matchup` },
            { label: 'Draft War Room', url: 'draft-war-room/' },
            { label: 'Trade Calculator', url: 'trade-calculator.html' },
            { label: 'Free Agent Tracker', action: () => window.location.href = 'free-agency.html' }
        ];

        return (
            <div className="app-container" style={{ paddingBottom: '60px' }}>
                {/* Header */}
                <header className="header" style={{ position: 'relative', marginBottom: '0', paddingBottom: '0.75rem' }}>
                    <div className="header-title">{currentLeague.name}</div>
                    <div style={{ textAlign: 'center', color: 'var(--gold)', fontSize: '1.1rem', fontFamily: 'Oswald, sans-serif', marginTop: '0.25rem' }}>
                        {activeYear} SEASON
                    </div>
                </header>

                {/* Nav Buttons Bar */}
                <div style={{
                    display: 'flex',
                    justifyContent: 'center',
                    gap: '0.35rem',
                    padding: '0.5rem 0.75rem',
                    background: 'var(--off-black)',
                    borderBottom: '1px solid rgba(212, 175, 55, 0.2)',
                    flexWrap: 'wrap'
                }}>
                    {navButtons.map((btn, idx) => (
                        <button
                            key={idx}
                            onClick={() => btn.action ? btn.action() : window.open(btn.url, '_blank')}
                            style={{
                                padding: '0.3rem 0.65rem',
                                background: btn.label === 'Dashboard' ? 'var(--gold)' : 'var(--black)',
                                border: '1.5px solid var(--gold)',
                                borderRadius: '4px',
                                color: btn.label === 'Dashboard' ? 'var(--black)' : 'var(--gold)',
                                fontFamily: 'Oswald, sans-serif',
                                fontSize: '0.68rem',
                                fontWeight: '700',
                                cursor: 'pointer',
                                textTransform: 'uppercase',
                                letterSpacing: '0.05em',
                                transition: 'all 0.2s ease',
                                whiteSpace: 'nowrap'
                            }}
                            onMouseEnter={e => { if (btn.label !== 'Dashboard') { e.target.style.background = 'rgba(212,175,55,0.15)'; }}}
                            onMouseLeave={e => { if (btn.label !== 'Dashboard') { e.target.style.background = 'var(--black)'; }}}
                        >
                            {btn.label}
                        </button>
                    ))}
                </div>

                {/* Year / Stats Toggle Bar */}
                <div style={{
                    display: 'flex',
                    justifyContent: 'center',
                    alignItems: 'center',
                    gap: '0.75rem',
                    padding: '0.45rem 1rem',
                    background: 'var(--black)',
                    borderBottom: '2px solid rgba(212, 175, 55, 0.15)',
                    flexWrap: 'wrap'
                }}>
                    <div style={{
                        display: 'flex',
                        alignItems: 'center',
                        gap: '0.2rem',
                        background: 'var(--off-black)',
                        borderRadius: '6px',
                        padding: '0.15rem',
                        border: '1px solid rgba(212, 175, 55, 0.2)'
                    }}>
                        {['2023', '2024', '2025', '2026'].map(year => (
                            <div
                                key={year}
                                style={{
                                    padding: '0.2rem 0.55rem',
                                    borderRadius: '4px',
                                    fontSize: '0.68rem',
                                    fontWeight: '700',
                                    fontFamily: 'Oswald, sans-serif',
                                    color: year === activeYear ? 'var(--black)' : 'var(--silver)',
                                    background: year === activeYear ? 'var(--gold)' : 'transparent',
                                    cursor: year === activeYear ? 'default' : 'pointer',
                                    opacity: year === activeYear ? 1 : 0.4,
                                    transition: 'all 0.2s'
                                }}
                                onClick={() => switchYear(year)}
                            >
                                {year}
                            </div>
                        ))}
                    </div>
                    <div style={{ color: 'rgba(212,175,55,0.3)', fontSize: '0.8rem' }}>|</div>
                    <div style={{ color: 'var(--silver)', fontSize: '0.68rem', fontFamily: 'Oswald, sans-serif', opacity: 0.7 }}>
                        Half PPR · {standings.length} Teams
                    </div>
                </div>

                {/* 3-Column Layout */}
                <div style={{ padding: '1rem', maxWidth: '1600px', margin: '0 auto' }}>
                    <div className="league-detail-grid" style={{ display: 'grid', gridTemplateColumns: '1fr', gap: '1.25rem' }}>

                        {/* LEFT COLUMN - Clickable Owners */}
                        <div style={{ background: 'var(--black)', border: '2px solid rgba(212, 175, 55, 0.3)', borderRadius: '12px', padding: '1rem' }}>
                            <h3 style={{ color: 'var(--gold)', fontFamily: 'Bebas Neue, cursive', fontSize: '1.4rem', letterSpacing: '0.1em', marginBottom: '0.75rem', textAlign: 'center', paddingBottom: '0.5rem', borderBottom: '1px solid rgba(212, 175, 55, 0.3)', flexShrink: 0 }}>OWNERS</h3>

                            <div className="league-detail-scroll">
                            {standings.map((team, idx) => {
                                const isViewing = team.userId === viewingOwnerId;
                                const isMe = team.userId === sleeperUserId;
                                return (
                                    <div
                                        key={team.rosterId}
                                        onClick={() => setViewingOwnerId(team.userId)}
                                        style={{
                                            display: 'flex',
                                            alignItems: 'center',
                                            gap: '0.5rem',
                                            padding: '0.5rem',
                                            marginBottom: '0.35rem',
                                            background: isViewing ? 'rgba(212, 175, 55, 0.15)' : isMe ? 'rgba(212, 175, 55, 0.06)' : 'transparent',
                                            border: isViewing ? '1.5px solid var(--gold)' : isMe ? '1px solid rgba(212, 175, 55, 0.3)' : '1px solid rgba(255, 255, 255, 0.06)',
                                            borderRadius: '8px',
                                            cursor: 'pointer',
                                            transition: 'all 0.2s ease'
                                        }}
                                    >
                                        <div style={{ width: '20px', color: 'var(--gold)', fontWeight: '700', fontSize: '0.8rem', textAlign: 'center', flexShrink: 0 }}>{idx + 1}</div>
                                        {team.avatar ? (
                                            <img src={`https://sleepercdn.com/avatars/thumbs/${team.avatar}`} alt="" style={{ width: '32px', height: '32px', borderRadius: '50%', border: isViewing ? '2px solid var(--gold)' : '2px solid var(--charcoal)', flexShrink: 0 }} />
                                        ) : (
                                            <div style={{ width: '32px', height: '32px', borderRadius: '50%', background: 'var(--charcoal)', border: isViewing ? '2px solid var(--gold)' : '2px solid rgba(255,255,255,0.1)', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '0.75rem', color: 'var(--silver)' }}>{team.displayName.charAt(0)}</div>
                                        )}
                                        <div style={{ flex: 1, minWidth: 0 }}>
                                            <div style={{ color: isViewing ? 'var(--gold)' : isMe ? 'var(--gold)' : 'var(--white)', fontSize: '0.88rem', fontWeight: isViewing || isMe ? '700' : '500', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', lineHeight: '1.2' }}>
                                                {team.displayName}{isMe ? ' (You)' : ''}
                                            </div>
                                            <div style={{ color: 'var(--silver)', fontSize: '0.7rem', opacity: 0.7 }}>
                                                {team.wins}-{team.losses}{team.ties > 0 ? `-${team.ties}` : ''} · {team.pointsFor.toFixed(1)} PF
                                            </div>
                                        </div>
                                    </div>
                                );
                            })}
                            </div>
                        </div>

                        {/* CENTER COLUMN - Roster (changes when owner clicked) */}
                        <div style={{ background: 'var(--black)', border: '2px solid rgba(212, 175, 55, 0.3)', borderRadius: '12px', padding: '1.25rem' }}>
                            <h3 style={{ color: 'var(--gold)', fontFamily: 'Bebas Neue, cursive', fontSize: '1.5rem', letterSpacing: '0.1em', marginBottom: '0.75rem', textAlign: 'center', paddingBottom: '0.5rem', borderBottom: '1px solid rgba(212, 175, 55, 0.3)', flexShrink: 0 }}>
                                {isViewingMyTeam ? 'MY ROSTER' : (viewingOwner?.displayName || 'TEAM') + "'S ROSTER"}
                            </h3>
                            <div className="league-detail-scroll">
                                {!isViewingMyTeam && (
                                    <div
                                        onClick={() => setViewingOwnerId(sleeperUserId)}
                                        style={{ textAlign: 'center', marginBottom: '0.75rem', cursor: 'pointer', fontSize: '0.7rem', color: 'var(--gold)', opacity: 0.7, transition: 'opacity 0.2s' }}
                                        onMouseEnter={e => e.target.style.opacity = 1}
                                        onMouseLeave={e => e.target.style.opacity = 0.7}
                                    >
                                        ← Back to My Roster
                                    </div>
                                )}
                                <RosterSection roster={viewingRoster} />
                            </div>
                        </div>

                        {/* RIGHT COLUMN - Divisions (clickable teams) */}
                        <div style={{ background: 'var(--black)', border: '2px solid rgba(212, 175, 55, 0.3)', borderRadius: '12px', padding: '1rem' }}>
                            <h3 style={{ color: 'var(--gold)', fontFamily: 'Bebas Neue, cursive', fontSize: '1.4rem', letterSpacing: '0.1em', marginBottom: '0.75rem', textAlign: 'center', paddingBottom: '0.5rem', borderBottom: '1px solid rgba(212, 175, 55, 0.3)', flexShrink: 0 }}>
                                {hasDivisions ? 'DIVISIONS' : 'LEAGUE STANDINGS'}
                            </h3>

                            <div className="league-detail-scroll">
                            {divisionKeys.map((divKey, divIdx) => {
                                const divTeams = divisions[divKey];
                                const divSorted = [...divTeams].sort((a, b) => {
                                    if (b.wins !== a.wins) return b.wins - a.wins;
                                    if (a.losses !== b.losses) return a.losses - b.losses;
                                    return b.pointsFor - a.pointsFor;
                                });
                                return (
                                    <div key={divKey} style={{ marginBottom: divIdx < divisionKeys.length - 1 ? '1rem' : 0 }}>
                                        {hasDivisions && (
                                            <div style={{ color: 'var(--gold)', fontSize: '0.82rem', fontWeight: '700', textTransform: 'uppercase', letterSpacing: '0.1em', marginBottom: '0.5rem', paddingBottom: '0.35rem', borderBottom: '1px solid rgba(212, 175, 55, 0.2)' }}>Division {divKey}</div>
                                        )}
                                        {divSorted.map(team => (
                                            <div
                                                key={team.rosterId}
                                                onClick={() => setViewingOwnerId(team.userId)}
                                                style={{
                                                    display: 'flex',
                                                    alignItems: 'center',
                                                    justifyContent: 'space-between',
                                                    padding: '0.5rem 0.6rem',
                                                    marginBottom: '0.3rem',
                                                    background: team.userId === viewingOwnerId ? 'rgba(212, 175, 55, 0.12)' : 'transparent',
                                                    border: team.userId === viewingOwnerId ? '1px solid rgba(212, 175, 55, 0.4)' : '1px solid rgba(255, 255, 255, 0.05)',
                                                    borderRadius: '6px',
                                                    cursor: 'pointer',
                                                    transition: 'all 0.2s'
                                                }}
                                            >
                                                <div style={{ display: 'flex', alignItems: 'center', gap: '0.4rem', flex: 1, minWidth: 0 }}>
                                                    {team.avatar ? (
                                                        <img src={`https://sleepercdn.com/avatars/thumbs/${team.avatar}`} alt="" style={{ width: '24px', height: '24px', borderRadius: '50%', flexShrink: 0 }} />
                                                    ) : (
                                                        <div style={{ width: '24px', height: '24px', borderRadius: '50%', background: 'var(--charcoal)', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '0.65rem', color: 'var(--silver)' }}>{team.displayName.charAt(0)}</div>
                                                    )}
                                                    <span style={{ color: team.userId === viewingOwnerId ? 'var(--gold)' : 'var(--white)', fontSize: '0.85rem', fontWeight: team.userId === viewingOwnerId ? '700' : '500', overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{team.displayName}</span>
                                                </div>
                                                <div style={{ flexShrink: 0, textAlign: 'right' }}>
                                                    <div style={{ color: 'var(--silver)', fontSize: '0.78rem', fontWeight: '600' }}>{team.wins}-{team.losses}{team.ties > 0 ? `-${team.ties}` : ''}</div>
                                                    <div style={{ color: 'var(--gold)', fontSize: '0.68rem', opacity: 0.7 }}>{team.pointsFor.toFixed(1)}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                );
                            })}
                            </div>
                        </div>

                    </div>

                    {/* League Pulse — Sleeper Trending Adds / Drops */}
                    {(trending.adds.length > 0 || trending.drops.length > 0) && (
                        <div style={{
                            marginTop: '1.25rem',
                            background: 'var(--black)',
                            border: '2px solid rgba(212, 175, 55, 0.3)',
                            borderRadius: '12px',
                            padding: '1rem 1.25rem'
                        }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '0.5rem', marginBottom: '0.75rem', paddingBottom: '0.5rem', borderBottom: '1px solid rgba(212, 175, 55, 0.3)' }}>
                                <span style={{ color: 'var(--gold)', fontFamily: 'Bebas Neue, cursive', fontSize: '1.4rem', letterSpacing: '0.1em' }}>LEAGUE PULSE</span>
                                <span style={{ color: 'var(--silver)', fontSize: '0.68rem', opacity: 0.6 }}>Trending across Sleeper - Last 24h</span>
                            </div>
                            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '1.5rem' }}>
                                {/* Most Added */}
                                <div>
                                    <div style={{ color: '#2ECC71', fontSize: '0.78rem', fontWeight: '700', textTransform: 'uppercase', letterSpacing: '0.08em', marginBottom: '0.5rem', fontFamily: 'Oswald, sans-serif' }}>Most Added</div>
                                    {trending.adds.slice(0, 10).map(item => {
                                        const player = playersData[item.player_id];
                                        if (!player) return null;
                                        const pos = player.position || '??';
                                        return (
                                            <div key={item.player_id} style={{ display: 'flex', alignItems: 'center', gap: '0.4rem', padding: '0.3rem 0', fontSize: '0.82rem' }}>
                                                <span style={{ color: '#2ECC71', fontWeight: '700', fontSize: '0.72rem', minWidth: '14px' }}>▲</span>
                                                <span style={{
                                                    display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                                                    width: '30px', flexShrink: 0, fontSize: '0.6rem', fontWeight: '700',
                                                    color: getPositionColor(pos), border: '1px solid var(--gold)',
