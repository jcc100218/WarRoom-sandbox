<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>Fantasy War Room</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fantasy War Room">
    <meta name="theme-color" content="#D4AF37">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Oswald:wght@300;400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #B8941E;
            --black: #0A0A0A;
            --off-black: #1A1A1A;
            --charcoal: #2A2A2A;
            --silver: #C0C0C0;
            --white: #FFFFFF;
            --win-green: #2ECC71;
            --loss-red: #E74C3C;
        }

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

        body {
        font-family: 'Oswald', sans-serif;
        background: var(--black);
        color: var(--white);
        overflow-x: hidden;
        overflow-y: auto;
        min-height: 100vh;
        position: relative;
        -webkit-overflow-scrolling: touch;
    }

    /* Subdued logo background */
    body::before {
        content: '';
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: clamp(400px, 60vw, 1000px);
        height: clamp(400px, 60vw, 1000px);
        background-image: url('icon-192.png');
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
        opacity: 0.05;
        z-index: 0;
        pointer-events: none;
        filter: brightness(1.2);
    }

    .app-container {
        position: relative;
        z-index: 1;
        max-width: 100%;
        margin: 0 auto;
    }

    /* Header */
    .header {
        background: linear-gradient(135deg, var(--black) 0%, var(--off-black) 100%);
        padding: 1rem;
        border-bottom: 3px solid var(--gold);
        box-shadow: 0 4px 20px rgba(212, 175, 55, 0.2);
    }

    .header-title {
        font-family: 'Bebas Neue', cursive;
        font-size: 1rem;
        text-align: center;
        color: var(--gold);
        letter-spacing: 0.15em;
        margin-bottom: 0.5rem;
    }

    .owner-name {
        font-family: 'Bebas Neue', cursive;
        font-size: clamp(1.5rem, 5vw, 2.5rem);
        text-align: center;
        background: linear-gradient(135deg, var(--gold) 0%, var(--white) 50%, var(--gold) 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 0.1em;
        animation: shimmer 3s linear infinite;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 1rem;
    }

    .owner-logo-small {
        width: clamp(70px, 12vw, 100px);
        height: clamp(70px, 12vw, 100px);
        flex-shrink: 0;
        filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.5));
    }

    @keyframes shimmer {
        0% { background-position: 0% center; }
        100% { background-position: 200% center; }
    }

    .quote {
        text-align: center;
        margin-top: 0.75rem;
        padding: 0.75rem;
        font-family: 'Crimson Text', serif;
        font-style: italic;
        font-size: clamp(0.8rem, 2vw, 1rem);
        color: var(--silver);
        border-top: 1px solid rgba(212, 175, 55, 0.2);
    }

    .quote-author {
        font-size: 0.75rem;
        color: var(--gold);
        margin-top: 0.25rem;
        font-style: normal;
    }

    .settings-icon {
        position: absolute;
        top: 1rem;
        right: 1rem;
        width: 24px;
        height: 24px;
        cursor: pointer;
        opacity: 0.7;
        transition: all 0.3s ease;
    }

    .settings-icon:hover {
        opacity: 1;
        transform: rotate(90deg);
    }

    /* Main Layout */
    .main-layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1rem;
        padding: 1rem;
        padding-bottom: 50px;
        min-height: calc(100vh - 200px);
    }

    /* Desktop/Tablet 2-column layout (leagues + sidebar) */
    @media (min-width: 768px) {
        .main-layout {
            grid-template-columns: 1fr auto;
            gap: 1.5rem;
            padding: 1.5rem;
        }
    }

    @media (min-width: 1200px) {
        .main-layout {
            grid-template-columns: 1fr auto;
            padding: 2rem;
            max-width: 1600px;
            margin: 0 auto;
        }
    }

    .left-column, .center-column {
        display: flex;
        flex-direction: column;
        gap: 1rem;
        overflow-x: hidden;
    }

   @media (min-width: 768px) {
        .left-column, .center-column {
            max-height: calc(100vh - 220px);
            overflow-y: auto;
            overflow-x: hidden;
            overscroll-behavior: contain;
            scroll-behavior: smooth;
        }

        .right-column {
            box-sizing: content-box;
            max-height: calc(100vh - 180px);
            overflow-y: auto;
            overflow-x: hidden;
            align-self: start;
            overscroll-behavior: contain;
            scroll-behavior: smooth;
            padding-bottom: 2rem;
        }

        .left-column::-webkit-scrollbar,
        .center-column::-webkit-scrollbar,
        .right-column::-webkit-scrollbar {
            width: 6px;
        }
        .left-column::-webkit-scrollbar-track,
        .center-column::-webkit-scrollbar-track,
        .right-column::-webkit-scrollbar-track {
            background: rgba(212, 175, 55, 0.1);
            border-radius: 3px;
        }
        .left-column::-webkit-scrollbar-thumb,
        .center-column::-webkit-scrollbar-thumb,
        .right-column::-webkit-scrollbar-thumb {
            background: var(--gold);
            border-radius: 3px;
        }
    }

    .league-window {
        background: var(--black);
        border: 2px solid rgba(212, 175, 55, 0.2);
        border-radius: 12px;
        padding: 1rem;
        overflow-x: hidden;
        animation: fadeInLeft 0.6s ease both;
    }

    @media (min-width: 768px) {
        .league-window {
            max-height: 400px;
            display: flex;
            flex-direction: column;
        }
    }

    @keyframes fadeInLeft {
        from {
            opacity: 0;
            transform: translateX(-20px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    .league-window-scroll {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        min-height: 0;
        touch-action: pan-y;
    }

    .league-window-scroll::-webkit-scrollbar {
        width: 6px;
    }

    .league-window-scroll::-webkit-scrollbar-track {
        background: rgba(212, 175, 55, 0.1);
        border-radius: 3px;
    }

    .league-window-scroll::-webkit-scrollbar-thumb {
        background: var(--gold);
        border-radius: 3px;
    }

    .league-window-header {
        font-family: 'Bebas Neue', cursive;
        font-size: 1.2rem;
        color: var(--gold);
        margin-bottom: 0.75rem;
        letter-spacing: 0.1em;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding-bottom: 0.5rem;
        border-bottom: 1px solid rgba(212, 175, 55, 0.3);
        flex-shrink: 0;
    }

    .league-item {
        padding: 0.75rem;
        margin-bottom: 0.5rem;
        background: rgba(212, 175, 55, 0.05);
        border-left: 3px solid transparent;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .league-item:hover, .league-item.active {
        background: rgba(212, 175, 55, 0.15);
        border-left-color: var(--gold);
    }

    .league-item-name {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--white);
        margin-bottom: 0.25rem;
    }

    .league-item-record {
        font-size: 0.75rem;
        color: var(--silver);
    }



    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Key Events */
    .key-events {
        background: var(--black);
        border: 2px solid rgba(212, 175, 55, 0.2);
        border-radius: 12px;
        padding: 1.5rem;
        overflow-x: hidden;
        animation: fadeInUp 0.6s ease 0.4s both;
    }

    @media (min-width: 768px) {
        .key-events {
            max-height: 600px;
            display: flex;
            flex-direction: column;
        }
    }

    .key-events-scroll {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        min-height: 0;
        touch-action: pan-y;
    }

    .key-events-scroll::-webkit-scrollbar {
        width: 6px;
    }

    .key-events-scroll::-webkit-scrollbar-track {
        background: rgba(212, 175, 55, 0.1);
        border-radius: 3px;
    }

    .key-events-scroll::-webkit-scrollbar-thumb {
        background: var(--gold);
        border-radius: 3px;
    }

    .key-events-title {
        font-family: 'Bebas Neue', cursive;
        font-size: 1.3rem;
        color: var(--gold);
        margin-bottom: 1rem;
        letter-spacing: 0.15em;
        flex-shrink: 0;
    }

    .event-item {
        background: rgba(212, 175, 55, 0.05);
        border-left: 3px solid var(--gold);
        padding: 1rem;
        margin-bottom: 0.75rem;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .event-item:hover {
        background: rgba(212, 175, 55, 0.15);
        box-shadow: -4px 4px 12px rgba(212, 175, 55, 0.2);
    }

    .event-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.5rem;
    }

    .event-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--white);
    }

    .event-date {
        font-size: 0.85rem;
        color: var(--gold);
        font-weight: 600;
    }

    .event-league {
        font-size: 0.75rem;
        color: var(--silver);
        opacity: 0.8;
    }

    /* Right Column - Icon Buttons */
    .right-column {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        animation: fadeInRight 0.6s ease 0.5s both;
    }

    @keyframes fadeInRight {
        from {
            opacity: 0;
            transform: translateX(20px);
        }
        to {
            opacity: 1;
            transform: translateX(0);
        }
    }

    @keyframes dhqSpin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    .icon-button {
        background: var(--black);
        border: 2px solid var(--gold);
        border-radius: 6px;
        padding: 0.75rem 0.5rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow:
            0 0 0 1px rgba(212, 175, 55, 0.3),
            0 3px 9px rgba(0, 0, 0, 0.5),
            inset 0 1px 0 rgba(212, 175, 55, 0.2);
        min-height: 71px;
        flex-shrink: 0;
        position: relative;
        overflow: visible;
    }

    /* Ornate corner decorations */
    .icon-button::before,
    .icon-button::after {
        content: '';
        position: absolute;
        width: 9px;
        height: 9px;
        border: 2px solid var(--gold);
        opacity: 0.6;
    }

    .icon-button::before {
        top: -2px;
        left: -2px;
        border-right: none;
        border-bottom: none;
    }

    .icon-button::after {
        bottom: -2px;
        right: -2px;
        border-left: none;
        border-top: none;
    }

    .icon-button:hover {
        transform: translateY(-4px);
        border-color: var(--white);
        box-shadow: 
            0 0 0 1px var(--gold),
            0 0 20px rgba(212, 175, 55, 0.4),
            0 8px 24px rgba(0, 0, 0, 0.6),
            inset 0 1px 0 rgba(212, 175, 55, 0.4);
    }

    .icon-button:hover::before,
    .icon-button:hover::after {
        border-color: var(--white);
        opacity: 1;
    }

    .icon-button:active {
        transform: translateY(-2px);
    }

    .icon-button-icon-container {
        width: 32px;
        height: 32px;
        background: linear-gradient(135deg, var(--gold) 0%, var(--dark-gold) 100%);
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 
            0 2px 8px rgba(212, 175, 55, 0.3),
            inset 0 1px 0 rgba(255, 255, 255, 0.2);
        position: relative;
    }

    .icon-button-icon-container::before {
        content: '';
        position: absolute;
        inset: 2px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.1) 0%, transparent 100%);
        border-radius: 4px;
        pointer-events: none;
    }

    .icon-button-icon {
        width: 18px;
        height: 18px;
        color: var(--black);
        position: relative;
        z-index: 1;
    }

    .icon-button-label {
        font-size: 0.49rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--white);
        text-align: center;
        line-height: 1.3;
        text-shadow: 0 1px 2px rgba(0, 0, 0, 0.5);
    }

    /* Mobile 3-column layout (iPhone) */
    @media (max-width: 767px) {
        .main-layout {
            display: grid;
            grid-template-columns: 120px 1fr 70px;
            grid-template-rows: calc(100vh - 200px);
            gap: 0.4rem;
            padding: 0.45rem;
            overflow: hidden;
        }

        .left-column,
        .center-column {
            overflow-y: hidden;
            overflow-x: hidden;
            height: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
        }

        .right-column {
            overflow-y: scroll;
            overflow-x: hidden;
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
            height: 100%;
            position: static;
            flex-direction: column;
            flex-wrap: nowrap;
            background: none;
            padding: 0;
            gap: 0.35rem;
            z-index: auto;
            justify-content: flex-start;
            align-items: stretch;
        }

        /* Key events: fill left column, title fixed, dates scroll */
        .key-events {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
            height: 100%;
        }
        .key-events-scroll {
            flex: 1;
            overflow-y: scroll;
            overflow-x: hidden;
            min-height: 0;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
        }

        /* League window: fill center column remainder, header fixed, leagues scroll */
        .league-window {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-height: 0;
        }
        .league-window-scroll {
            flex: 1;
            overflow-y: scroll;
            overflow-x: hidden;
            min-height: 0;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
        }

        /* Compact panel padding */
        .key-events,
        .league-window { padding: 0.5rem 0.4rem; border-radius: 8px; }

        /* Shrink key events */
        .key-events-title { font-size: 0.72rem; margin-bottom: 0.4rem; letter-spacing: 0.06em; }
        .event-item { padding: 0.4rem 0.45rem; margin-bottom: 0.35rem; }
        .event-title { font-size: 0.62rem; }
        .event-date  { font-size: 0.58rem; }
        .event-league { font-size: 0.55rem; }

        /* Shrink league window */
        .league-window-header { font-size: 0.65rem; padding: 0.35rem 0.4rem; }
        .league-item-name   { font-size: 0.65rem; }
        .league-item-record { font-size: 0.56rem; }

        /* Icon buttons — compact vertical column */
        .icon-button {
            min-width: unset;
            min-height: 40px;
            padding: 0.3rem 0.25rem;
            flex-shrink: 0;
            width: 100%;
            gap: 0.2rem;
        }
        .icon-button-icon-container { width: 24px; height: 24px; }
        .icon-button-icon { width: 13px; height: 13px; }
        .icon-button-label { font-size: 0.48rem; }
    }

    /* LeagueDetail 3-column responsive layout */
    @media (min-width: 768px) {
        .league-detail-grid { grid-template-columns: 220px 1fr 260px !important; }
        .league-detail-grid > div {
            max-height: calc(100vh - 200px);
            display: flex;
            flex-direction: column;
        }
        .league-detail-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 0;
        }
        .league-detail-scroll::-webkit-scrollbar { width: 6px; }
        .league-detail-scroll::-webkit-scrollbar-track { background: rgba(212,175,55,0.1); border-radius: 3px; }
        .league-detail-scroll::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }
    }
    @media (min-width: 1200px) {
        .league-detail-grid { grid-template-columns: 260px 1fr 300px !important; }
    }
</style>

</head>
<body>
    <div id="root"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="https://jcc100218.github.io/ReconAI/shared/constants.js"></script>
<script src="https://jcc100218.github.io/ReconAI/shared/utils.js"></script>
<script src="https://jcc100218.github.io/ReconAI/shared/sleeper-api.js"></script>
<script src="https://jcc100218.github.io/ReconAI/shared/supabase-client.js"></script>
<script src="https://jcc100218.github.io/ReconAI/shared/dhq-engine.js"></script>
<script src="https://jcc100218.github.io/ReconAI/shared/team-assess.js"></script>
<script src="https://jcc100218.github.io/ReconAI/shared/analytics-engine.js"></script>
<script src="https://jcc100218.github.io/ReconAI/shared/dhq-ai.js"></script>
<script src="https://jcc100218.github.io/ReconAI/shared/ai-dispatch.js"></script>
<script src="https://jcc100218.github.io/ReconAI/shared/player-modal.js"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">
    // ===== DEV MODE =====
    const DEV_MODE = new URLSearchParams(window.location.search).has('dev') || window.location.hostname.includes('sandbox');
    if (DEV_MODE) {
        console.log('%c[DEV MODE] All features unlocked, auth bypassed','color:#D4AF37;font-weight:bold;font-size:14px');
        const b = document.createElement('div');
        b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:99999;background:#D4AF37;color:#000;font-size:11px;font-weight:700;text-align:center;padding:3px;letter-spacing:.05em;font-family:monospace';
        b.textContent = 'SANDBOX — changes here do not affect production';
        document.body.prepend(b);
    }

    // ===== AUTHENTICATION CHECK =====
    const AUTH_KEY    = 'od_auth_v1';
    const SESSION_KEY = 'fw_session_v1';

    const legacyAuth   = localStorage.getItem(AUTH_KEY);
    const newSession   = (() => { try { return JSON.parse(localStorage.getItem(SESSION_KEY) || 'null'); } catch { return null; } })();
    const isAuthed     = !!(legacyAuth || newSession?.token || DEV_MODE);

    if (!isAuthed) {
        window.location.href = 'landing.html';
    }

    let sleeperUsername = '';
    // Dev mode: use URL param or default test username
    if (DEV_MODE) {
        sleeperUsername = new URLSearchParams(window.location.search).get('user') || 'jcc100218';
    }
    try {
        if (legacyAuth && !sleeperUsername) {
            const credentials = JSON.parse(legacyAuth);
            sleeperUsername = credentials.username || '';
            // Sync username to Team Comps page localStorage key so it auto-logs in
            if (sleeperUsername) {
                localStorage.setItem('od_locked_username_v2', sleeperUsername);
            }
        }
    } catch (e) {
        localStorage.removeItem(AUTH_KEY);
        if (!newSession?.token) window.location.href = 'landing.html';
    }

    const { useState, useEffect, useRef } = React;

    function handleLogout() {
        if (confirm('Are you sure you want to logout?')) {
            localStorage.removeItem(AUTH_KEY);
            localStorage.removeItem(SESSION_KEY);
            window.location.href = 'landing.html';
        }
    }


    // ===== SLEEPER API =====
    const SLEEPER_BASE_URL = 'https://api.sleeper.app/v1';

    async function fetchJSON(url) {
        const response = await fetch(url);
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        return response.json();
    }

    async function fetchSleeperUser(username) {
        return await fetchJSON(`${SLEEPER_BASE_URL}/user/${encodeURIComponent(username)}`);
    }

    async function fetchUserLeagues(userId, season) {
        return await fetchJSON(`${SLEEPER_BASE_URL}/user/${userId}/leagues/nfl/${season}`);
    }

    async function fetchLeagueRosters(leagueId) {
        return await fetchJSON(`${SLEEPER_BASE_URL}/league/${leagueId}/rosters`);
    }

    async function fetchLeagueUsers(leagueId) {
        return await fetchJSON(`${SLEEPER_BASE_URL}/league/${leagueId}/users`);
    }

    async function fetchLeagueInfo(leagueId) {
        return await fetchJSON(`${SLEEPER_BASE_URL}/league/${leagueId}`);
    }

    let _wrPlayersCache = null;
    async function fetchAllPlayers() {
        if (_wrPlayersCache) return _wrPlayersCache;
        // Check sessionStorage first (avoid re-fetching 10k players on every load)
        try {
            const cached = sessionStorage.getItem('fw_players_cache');
            if (cached) {
                const d = JSON.parse(cached);
                if (Date.now() - d.ts < 3600000) { _wrPlayersCache = d.data; return d.data; }
            }
        } catch(e) {}
        _wrPlayersCache = await fetchJSON(`${SLEEPER_BASE_URL}/players/nfl`);
        try { sessionStorage.setItem('fw_players_cache', JSON.stringify({ data: _wrPlayersCache, ts: Date.now() })); } catch(e) {}
        return _wrPlayersCache;
    }

    const STATS_YEAR = '2025'; // Most recent completed season — used until Sleeper publishes projections

    let _wrStatsCache = {};
    async function fetchSeasonStats(season) {
        if (_wrStatsCache[season]) return _wrStatsCache[season];
        try {
            _wrStatsCache[season] = await fetchJSON(`${SLEEPER_BASE_URL}/stats/nfl/regular/${season}`);
        } catch (e) {
            console.warn('Stats fetch failed:', e);
            _wrStatsCache[season] = {};
        }
        return _wrStatsCache[season];
    }

    let _projectionsCache = {};
    async function fetchSeasonProjections(season) {
        if (_projectionsCache[season]) return _projectionsCache[season];
        try {
            _projectionsCache[season] = await fetchJSON(`${SLEEPER_BASE_URL}/projections/nfl/regular/${season}`);
        } catch (e) {
            console.warn('Projections fetch failed:', e);
            _projectionsCache[season] = {};
        }
        return _projectionsCache[season];
    }

        async function handleChangePassword() {
            setPwMsg('');
            if (!currentPw || !newPw || !confirmPw) { setPwMsg('x Fill in all fields'); return; }
            if (newPw !== confirmPw) { setPwMsg('x New passwords do not match'); return; }
            if (newPw.length < 6) { setPwMsg('x Password must be at least 6 characters'); return; }
            try {
                // Verify current password against stored hash
                const AUTH_KEY = 'od_auth_v1';
                const auth = JSON.parse(localStorage.getItem(AUTH_KEY) || '{}');
                const encoder = new TextEncoder();
                const hashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(currentPw));
                const currentHash = Array.from(new Uint8Array(hashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');

                if (auth.passwordHash && auth.passwordHash !== currentHash) {
                    // Also try Supabase in case this is a gifted account
                    const result = await window.OD.verifySupabasePassword(sleeperUsername, currentPw);
                    if (!result || !result.match) {
                        setPwMsg('x Current password is incorrect');
                        return;
                    }
                }
                // Update Supabase
                await window.OD.updatePassword(sleeperUsername, newPw);
                // Update localStorage
                const newHashBuffer = await crypto.subtle.digest('SHA-256', encoder.encode(newPw));
                const newHash = Array.from(new Uint8Array(newHashBuffer)).map(b => b.toString(16).padStart(2,'0')).join('');
                localStorage.setItem(AUTH_KEY, JSON.stringify({ ...auth, passwordHash: newHash, isGifted: false }));
                setCurrentPw(''); setNewPw(''); setConfirmPw('');

    function LeagueDetail({ league, onBack, sleeperUserId }) {
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [playersData, setPlayersData] = useState({});
        const [myRoster, setMyRoster] = useState(null);

        const [viewingOwnerId, setViewingOwnerId] = useState(sleeperUserId);
        const [statsData, setStatsData] = useState({});
        const [projectionsData, setProjectionsData] = useState({});
        const [stats2025Data, setStats2025Data] = useState({});
        const [currentLeague, setCurrentLeague] = useState(league);
        const [activeYear, setActiveYear] = useState(league.season);
        const [trending, setTrending] = useState({ adds: [], drops: [] });
        const [activeTab, setActiveTab] = useState('dashboard');
        const [showSettings, setShowSettings] = useState(false);
        const [analyticsData, setAnalyticsData] = useState(null);
        const [analyticsTab, setAnalyticsTab] = useState('roster');
        const [rosterFilter, setRosterFilter] = useState('All');
        const [rosterSort, setRosterSort] = useState({ key: 'dhq', dir: -1 });
        const [heroStory, setHeroStory] = useState('');
        const [aiStories, setAiStories] = useState([]);
        const [transactions, setTransactions] = useState([]);
        const [rankedTeams, setRankedTeams] = useState([]);
        const [dhqStatus, setDhqStatus] = useState({ loading: false, step: '', progress: 0 });
        const [loadStage, setLoadStage] = useState('');
        const [editingKpi, setEditingKpi] = useState(null); // index being edited, null = not editing

        // Default 5 KPIs — customizable per owner, saved in localStorage
        const KPI_OPTIONS = {
            'starter-gap':    { label: 'Starter Gap', icon: '', category: 'Roster' },
            'portfolio':      { label: 'Portfolio DHQ', icon: '', category: 'Roster' },
            'value-rank':     { label: 'Value Rank', icon: '', category: 'League' },
            'health-score':   { label: 'Health Score', icon: '', category: 'Roster' },
            'avg-age':        { label: 'Avg Age', icon: '', category: 'Roster' },
            'top5-conc':      { label: 'Top 5 Concentration', icon: '', category: 'Roster' },
            'hit-rate':       { label: 'Draft Hit Rate', icon: '', category: 'Draft' },
            'faab-efficiency':{ label: 'FAAB Efficiency', icon: '', category: 'Waivers' },
            'net-trade':      { label: 'Net DHQ/Trade', icon: '', category: 'Trades' },
            'trade-velocity': { label: 'Trade Velocity', icon: '', category: 'Trades' },
            'window':         { label: 'Compete Window', icon: '', category: 'Projection' },
            'aging-cliff':    { label: 'Aging Cliff %', icon: '', category: 'Projection' },
            'partner-wr':     { label: 'Partner Win Rate', icon: '', category: 'Trades' },
            'elite-count':    { label: 'Elite Players', icon: '', category: 'Roster' },
            'bench-quality':  { label: 'Bench Quality', icon: '', category: 'Roster' },
        };
        const DEFAULT_KPIS = ['starter-gap', 'hit-rate', 'faab-efficiency', 'net-trade', 'window'];
        const [selectedKpis, setSelectedKpis] = useState(() => {
            try {
                const saved = localStorage.getItem('wr_kpi_selection_' + (currentLeague?.id || ''));
                return saved ? JSON.parse(saved) : DEFAULT_KPIS;
            } catch(e) { return DEFAULT_KPIS; }
        });
        useEffect(() => {
            try { localStorage.setItem('wr_kpi_selection_' + (currentLeague?.id || ''), JSON.stringify(selectedKpis)); } catch(e) {}
        }, [selectedKpis]);

        function computeKpiValue(kpiKey) {
            const LI = window.App?.LI || {};
            const scores = LI.playerScores || {};
            const myPlayers = myRoster?.players || [];
            const profile = LI.ownerProfiles?.[myRoster?.roster_id];
            switch(kpiKey) {
                case 'portfolio': {
                    const total = myPlayers.reduce((s, pid) => s + (scores[pid] || 0), 0);
                    return { value: total.toLocaleString(), sub: 'Total DHQ', color: 'var(--gold)' };
                }
                case 'value-rank': {
                    const vals = (currentLeague.rosters || []).map(r => (r.players || []).reduce((s, pid) => s + (scores[pid] || 0), 0)).sort((a,b) => b - a);
                    const myTotal = myPlayers.reduce((s, pid) => s + (scores[pid] || 0), 0);
                    const rank = vals.findIndex(v => v <= myTotal) + 1;
                    return { value: '#' + (rank || '?') + '/' + standings.length, sub: 'League rank', color: rank <= 3 ? '#2ECC71' : rank <= 6 ? 'var(--gold)' : '#E74C3C' };
                }
                case 'health-score': {
                    const ranked = rankedTeams.find(t => t.userId === sleeperUserId);
                    const hs = ranked?.healthScore || 0;
                    return { value: hs || '\u2014', sub: 'Score', color: hs >= 80 ? '#2ECC71' : hs >= 60 ? 'var(--gold)' : '#E74C3C' };
                }
                case 'starter-gap': {
                    const analytics = analyticsData || (typeof runLeagueAnalytics === 'function' ? runLeagueAnalytics() : null);
                    const gap = analytics?.roster?.gaps?.find(g => g.severity === 'high') || analytics?.roster?.gaps?.[0];
                    if (gap) return { value: gap.area.split(' ')[0] + ' ' + (gap.delta > 0 ? '+' : '') + (typeof gap.delta === 'number' ? gap.delta.toFixed(gap.delta < 1 ? 2 : 0) : gap.delta), sub: gap.severity + ' priority', color: gap.severity === 'high' ? '#E74C3C' : '#F0A500' };
                    return { value: '\u2714', sub: 'No major gaps', color: '#2ECC71' };
                }
                case 'avg-age': {
                    if (!myPlayers.length) return { value: '\u2014', sub: 'Avg age', color: 'var(--silver)' };
                    const avg = myPlayers.reduce((s, pid) => s + (playersData[pid]?.age || 26), 0) / myPlayers.length;
                    return { value: avg.toFixed(1), sub: 'Avg age', color: avg <= 25 ? '#2ECC71' : avg <= 27 ? 'var(--gold)' : '#E74C3C' };
                }
                case 'top5-conc': {
                    const vals = myPlayers.map(pid => scores[pid] || 0).sort((a,b) => b - a);
                    const total = vals.reduce((s,v) => s + v, 0);
                    const top5 = vals.slice(0, 5).reduce((s,v) => s + v, 0);
                    const pct = total > 0 ? Math.round(top5 / total * 100) : 0;
                    return { value: pct + '%', sub: 'In top 5 players', color: pct >= 65 ? '#2ECC71' : pct >= 50 ? 'var(--gold)' : '#E74C3C' };
                }
                case 'hit-rate': {
                    if (!profile || !profile.trades) return { value: '\u2014', sub: 'Draft hit rate', color: 'var(--silver)' };
                    const total = (profile.tradesWon || 0) + (profile.tradesLost || 0) + (profile.tradesFair || 0);
                    const rate = total > 0 ? Math.round(((profile.tradesWon || 0) + (profile.tradesFair || 0)) / total * 100) : 0;
                    return { value: rate + '%', sub: 'Win/fair rate', color: rate >= 60 ? '#2ECC71' : rate >= 40 ? 'var(--gold)' : '#E74C3C' };
                }
                case 'faab-efficiency': {
                    const budget = myRoster?.settings?.waiver_budget || 0;
                    const spent = myRoster?.settings?.waiver_budget_used || 0;
                    if (!budget) return { value: '\u2014', sub: 'No FAAB', color: 'var(--silver)' };
                    const remaining = budget - spent;
                    return { value: '$' + remaining, sub: '$' + budget + ' budget', color: remaining > budget * 0.5 ? '#2ECC71' : remaining > budget * 0.25 ? 'var(--gold)' : '#E74C3C' };
                }
                case 'net-trade': {
                    if (!profile) return { value: '\u2014', sub: 'Net DHQ/trade', color: 'var(--silver)' };
                    const avg = profile.avgValueDiff || 0;
                    return { value: (avg >= 0 ? '+' : '') + Math.round(avg), sub: 'Avg per trade', color: avg >= 100 ? '#2ECC71' : avg >= 0 ? 'var(--gold)' : '#E74C3C' };
                }
                case 'trade-velocity': {
                    if (!profile) return { value: '\u2014', sub: 'Trades', color: 'var(--silver)' };
                    return { value: profile.trades || 0, sub: 'Total trades', color: (profile.trades || 0) >= 4 ? '#2ECC71' : (profile.trades || 0) >= 2 ? 'var(--gold)' : 'var(--silver)' };
                }
                case 'window': {
                    if (!myPlayers.length) return { value: '\u2014', sub: 'Window', color: 'var(--silver)' };
                    const avgAge = myPlayers.reduce((s, pid) => s + (playersData[pid]?.age || 26), 0) / myPlayers.length;
                    const yrs = Math.max(0, Math.round(29 - avgAge));
                    return { value: yrs > 0 ? yrs + 'yr' : 'Now', sub: 'Compete window', color: yrs >= 3 ? '#2ECC71' : yrs >= 1 ? 'var(--gold)' : '#E74C3C' };
                }
                case 'aging-cliff': {
                    const total = myPlayers.reduce((s, pid) => s + (scores[pid] || 0), 0);
                    const pastPeak = myPlayers.reduce((s, pid) => {
                        const p = playersData[pid]; if (!p) return s;
                        const pos = p.position; const age = p.age || 26;
                        const peaks = {QB:33,RB:26,WR:29,TE:30,DL:29,LB:28,DB:29};
                        return age > (peaks[pos] || 29) ? s + (scores[pid] || 0) : s;
                    }, 0);
                    const pct = total > 0 ? Math.round(pastPeak / total * 100) : 0;
                    return { value: pct + '%', sub: 'Past peak DHQ', color: pct <= 20 ? '#2ECC71' : pct <= 35 ? '#F0A500' : '#E74C3C' };
                }
                case 'partner-wr': {
                    if (!profile || !profile.tradesWon) return { value: '\u2014', sub: 'Partner W/R', color: 'var(--silver)' };
                    const total = (profile.tradesWon || 0) + (profile.tradesLost || 0);
                    return { value: (profile.tradesWon || 0) + '-' + (profile.tradesLost || 0), sub: 'Trade W-L', color: (profile.tradesWon || 0) > (profile.tradesLost || 0) ? '#2ECC71' : '#E74C3C' };
                }
                case 'elite-count': {
                    const elites = myPlayers.filter(pid => (scores[pid] || 0) >= 7000).length;
                    return { value: elites, sub: 'DHQ 7000+', color: elites >= 3 ? '#2ECC71' : elites >= 1 ? 'var(--gold)' : '#E74C3C' };
                }
                case 'bench-quality': {
                    const starters = new Set(myRoster?.starters || []);
                    const benchVals = myPlayers.filter(pid => !starters.has(pid)).map(pid => scores[pid] || 0).filter(v => v > 0);
                    const avg = benchVals.length ? Math.round(benchVals.reduce((s,v) => s + v, 0) / benchVals.length) : 0;
                    return { value: avg.toLocaleString(), sub: 'Avg bench DHQ', color: avg >= 2500 ? '#2ECC71' : avg >= 1500 ? 'var(--gold)' : 'var(--silver)' };
                }
                default: return { value: '\u2014', sub: '', color: 'var(--silver)' };
            }
        }

        // Compute power rankings when DHQ engine finishes or standings change
        useEffect(() => {

            function computeRankings() {
                const ranked = standings.map(t => {
                    const r = currentLeague.rosters.find(r => r.owner_id === t.userId);
                    const totalDHQ = r?.players?.reduce((s, pid) => s + (window.App?.LI?.playerScores?.[pid] || 0), 0) || 0;

                        }
                    } catch(e) {}
                    if (!healthScore && totalDHQ > 0) {
                        const maxDHQ = 120000;
                        healthScore = Math.min(100, Math.round((totalDHQ / maxDHQ) * 100));
                        tierColor = healthScore >= 70 ? '#2ECC71' : healthScore >= 50 ? '#D4AF37' : healthScore >= 30 ? '#F0A500' : '#E74C3C';
                    }
                    return { ...t, totalDHQ, healthScore, tierColor };

                    if (b.healthScore !== a.healthScore) return b.healthScore - a.healthScore;
                    return b.totalDHQ - a.totalDHQ;
                });

        async function loadLeagueDetails() {
            try {
                if (!currentLeague.rosters || !currentLeague.users) {
                    throw new Error('League missing roster or user data');
                }

                const myRosterData = currentLeague.rosters.find(r => r.owner_id === sleeperUserId);
                setMyRoster(myRosterData);

                // Compute standings immediately (no fetch needed)
                const standingsData = currentLeague.rosters.map(roster => {
                    const user = currentLeague.users.find(u => u.user_id === roster.owner_id);
                    return {
                        rosterId: roster.roster_id,
                        userId: roster.owner_id,
                        displayName: user?.display_name || user?.username || 'Unknown',
                        avatar: user?.avatar,
                        wins: roster.settings?.wins || 0,
                        losses: roster.settings?.losses || 0,
                        ties: roster.settings?.ties || 0,
                        pointsFor: roster.settings?.fpts || 0,
                        division: roster.settings?.division || 0
                    };
                }).sort((a, b) => {
                    if (b.wins !== a.wins) return b.wins - a.wins;
                    if (a.losses !== b.losses) return a.losses - b.losses;
                    return b.pointsFor - a.pointsFor;
                });
                setStandings(standingsData);

                // Show dashboard immediately with what we have
                setLoading(false);
                setLoadStage('Loading player data...');

                // Fire ALL data fetches in parallel
                const [stats, projections, prevStats, players, tradedPicks] = await Promise.all([
                    fetchSeasonStats(currentLeague.season).catch(() => ({})),
                    fetchSeasonProjections(currentLeague.season).catch(() => ({})),
                    fetchSeasonStats(STATS_YEAR).catch(() => ({})),
                    fetchAllPlayers().catch(() => ({})),
                    fetchJSON(`${SLEEPER_BASE_URL}/league/${currentLeague.id}/traded_picks`).catch(() => []),
                ]);

                setStatsData(stats);
                setProjectionsData(projections);
                setStats2025Data(prevStats);
                setPlayersData(players);
                setLoadStage('Computing values...');

                // Bridge to DHQ engine immediately
                if (window.App) {
                    if (!window.S) window.S = {};
                    window.S.players = players || {};
                    window.S.playerStats = {};
                    window.S.rosters = currentLeague.rosters || [];
                    window.S.leagueUsers = currentLeague.users || [];
                    window.S.leagues = [{ league_id: currentLeague.id, name: currentLeague.name, scoring_settings: currentLeague.scoring_settings, roster_positions: currentLeague.roster_positions, settings: currentLeague.settings }];
                    window.S.currentLeagueId = currentLeague.id;
                    window.S.season = activeYear;
                    window.S.nflState = { season: activeYear };
                    window.S.tradedPicks = tradedPicks || [];
                    window.S.myRosterId = myRosterData?.roster_id;

                    // Bridge stats data
                    Object.entries(stats).forEach(([pid, s]) => {
                        if (!window.S.playerStats[pid]) window.S.playerStats[pid] = {};
                        const pts = calcRawPts(s);
                        const gp = s.gp || 0;
                        window.S.playerStats[pid].prevTotal = pts ? Math.round(pts * 10) / 10 : 0;
                        window.S.playerStats[pid].prevAvg = gp > 0 ? Math.round(pts / gp * 10) / 10 : 0;
                        window.S.playerStats[pid].prevRawStats = s;
                    });
                }

                setLoadStage('Building league intelligence...');

                // Fire DHQ engine + transactions + trending ALL in parallel
                await Promise.all([
                    // DHQ engine
                    (async () => {
                        if (typeof window.App?.loadLeagueIntel === 'function' && !window.App.LI_LOADED) {
                            setDhqStatus({ loading: true, step: 'Analyzing league history...', progress: 20 });
                            try {
                                await window.App.loadLeagueIntel();
                                console.log('[War Room] DHQ engine loaded:', Object.keys(window.App.LI?.playerScores || {}).length, 'players valued');
                                setDhqStatus({ loading: false, step: 'Complete!', progress: 100 });
                                setStatsData(prev => ({...prev})); // force re-render
                            } catch(e) {
                                console.warn('[War Room] DHQ engine error:', e);
                                setDhqStatus({ loading: false, step: 'Error: ' + e.message, progress: 0 });
                            }
                        }
                    })(),
                    // Transactions (last 3 weeks)
                    (async () => {
                        try {
                            const nflState = await fetchJSON(`${SLEEPER_BASE_URL}/state/nfl`).catch(() => ({}));
                            const currentWeek = nflState?.display_week || nflState?.week || 1;
                            const weekFetches = [];
                            for (let w = Math.max(1, currentWeek - 2); w <= Math.min(18, currentWeek); w++) {
                                weekFetches.push(fetchJSON(`${SLEEPER_BASE_URL}/league/${currentLeague.id}/transactions/${w}`).catch(() => []));
                            }
                            const weekResults = await Promise.all(weekFetches);
                            const allTxns = weekResults.flat().filter(t => t && t.type && t.status !== 'failed').sort((a,b) => (b.created || 0) - (a.created || 0));
                            setTransactions(allTxns.slice(0, 30));
                        } catch(e) { console.warn('Transaction fetch error:', e); }
                    })(),
                    // Trending
                    (async () => {
                        if (window.Sleeper?.fetchTrending) {
                            try {
                                const [adds, drops] = await Promise.all([
                                    window.Sleeper.fetchTrending('add', 24, 15),
                                    window.Sleeper.fetchTrending('drop', 24, 15)
                                ]);
                                setTrending({ adds: adds || [], drops: drops || [] });
                            } catch(e) {}
                        }
                    })(),
                ]);

                setLoadStage('');

            } catch (err) {
                console.error('Failed to load league details:', err);
                setError(err.message || 'Failed to load league details');
                setLoading(false);
                setLoadStage('');
            }
        }

        async function switchYear(year) {
            if (year === activeYear) return;
            setLoading(true);
            setError(null);
            setActiveYear(year);
            try {
                const targetYear = parseInt(year);
                const currentYear = parseInt(activeYear);
                let targetLeagueId = null;

                if (targetYear < currentYear) {
                    // Going backward: walk previous_league_id chain
                    let leagueId = currentLeague.id;
                    for (let y = currentYear; y > targetYear && leagueId; y--) {
                        const leagueInfo = await fetchLeagueInfo(leagueId);
                        leagueId = leagueInfo?.previous_league_id || null;
                    }
                    targetLeagueId = leagueId;
                } else {
                    // Going forward: get user leagues for target year, then check which one chains back to current league
                    const userLeagues = await fetchUserLeagues(sleeperUserId, year);
                    for (const lg of userLeagues) {
                        // Walk this league's previous_league_id chain to see if it connects to our current league
                        let checkId = lg.previous_league_id;
                        let steps = targetYear - currentYear;
                        while (steps > 1 && checkId) {
                            const info = await fetchLeagueInfo(checkId);
                            checkId = info?.previous_league_id || null;
                            steps--;
                        }
                        if (checkId === currentLeague.id) {
                            targetLeagueId = lg.league_id;
                            break;
                        }
                    }
                    // Fallback: match by name if chain doesn't connect
                    if (!targetLeagueId) {
                        const nameMatch = userLeagues.find(l => l.name === currentLeague.name);
                        targetLeagueId = nameMatch ? nameMatch.league_id : (userLeagues[0] ? userLeagues[0].league_id : null);
                    }
                }

                if (!targetLeagueId) {
                    setError('No leagues found for ' + year);
                    setLoading(false);
                    return;
                }

                const [leagueInfo, rosters, users] = await Promise.all([
                    fetchLeagueInfo(targetLeagueId),
                    fetchLeagueRosters(targetLeagueId),
                    fetchLeagueUsers(targetLeagueId)
                ]);
                setViewingOwnerId(sleeperUserId);
                setCurrentLeague({
                    id: targetLeagueId,
                    name: leagueInfo.name,
                    season: year,
                    scoring_settings: leagueInfo.scoring_settings || {},
                    roster_positions: leagueInfo.roster_positions || [],
                    rosters,
                    users
                });
            } catch (err) {
                console.error('Failed to switch year:', err);
                setError('Failed to load ' + year + ' data');
                setLoading(false);
            }
        }

        function getPlayerName(playerId) {
            const player = playersData[playerId];

        function getPlayerPosition(playerId) {

        // Compute fantasy pts using the league's actual scoring_settings weights,
        // applied to raw stat fields — works for both offensive and IDP players.
        // Mirrors the Team Comps page's fantasyPointsFromScoring() approach:
        // always use scoring_settings when available so IDP defensive stats aren't
        // silently zeroed out by Sleeper's pre-calculated pts_half_ppr = 0.
        function calcRawPts(s) {
            if (!s) return null;
            const scoring = currentLeague?.scoring_settings;
            if (scoring) {
                let total = 0;
                for (const [field, weight] of Object.entries(scoring)) {
                    if (typeof weight !== 'number') continue;
                    if (s[field] != null) total += Number(s[field]) * weight;
                }
                return total;
            }
            // Fallback: Sleeper's pre-calculated totals (offensive players only)
            const pre = s.pts_half_ppr ?? s.pts_ppr ?? s.pts_std ?? null;
            return pre !== null ? Number(pre) : null;
        }

        function getPlayerStats(playerId) {
            const player = playersData[playerId];
            // Always show STATS_YEAR totals; fall back to current-season data for historical year views
            const s = stats2025Data[playerId] || statsData[playerId];
            const p = projectionsData[playerId];

            // Years of experience
            const yrs = player?.years_exp != null ? player.years_exp : '-';

            // Fantasy points — uses league scoring_settings for IDP players
            const rawPts = calcRawPts(s);
            const pts = rawPts !== null ? Number(rawPts).toFixed(1) : '-';

            // Games played
            const gp = s?.gp != null ? s.gp : '-';

            // Average points per game
            let avg = '-';
            if (rawPts !== null && s?.gp && s.gp > 0) {
                avg = (rawPts / s.gp).toFixed(1);
            }

            // Projected points — use Sleeper projections when available, otherwise 2025 season totals
            const rawProj = p ? (p.pts_half_ppr ?? p.pts_ppr ?? p.pts_std ?? null) : null;
            const rawPts2025 = calcRawPts(stats2025Data[playerId]);
            const proj = rawProj !== null ? Number(rawProj).toFixed(1) : (rawPts2025 !== null ? Number(rawPts2025).toFixed(1) : '-');

            return { yrs, pts, gp, avg, proj };
        }

            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return hrs + 'h ago';
            const days = Math.floor(hrs / 24);
            if (days < 30) return days + 'd ago';
            return Math.floor(days / 30) + 'mo ago';
        }

            try {

        // ReconAI: send message
        async function sendReconMessage(text) {
          if (!text?.trim()) return;
          setReconInput('');
          const userMsg = { role: 'user', content: text.trim() };
          setReconMessages(prev => [...prev, userMsg, { role: 'assistant', content: '...' }]);
          try {
            let context = '';
            if (typeof dhqContext === 'function') context = dhqContext(true);
            const messages = [...reconMessages.slice(-4), userMsg].map((m, i, arr) => {
              if (m.role === 'user' && i === arr.length - 1) {
                return { role: 'user', content: context + '\n\n' + m.content };
              }
              if (m.role === 'assistant' && m.content.length > 400) {
                return { role: 'assistant', content: m.content.substring(0, 400) + '...' };
              }
              return m;
            });
            const reply = typeof dhqAI === 'function'
              ? await dhqAI('home-chat', null, null, { messages })
              : typeof callClaude === 'function'
                ? await callClaude(messages)
                : 'AI not available. Add an API key in Settings.';
            setReconMessages(prev => {
              const updated = [...prev];
              updated[updated.length - 1] = { role: 'assistant', content: reply };
              return updated;
            });
          } catch(e) {
            setReconMessages(prev => {
              const updated = [...prev];
              updated[updated.length - 1] = { role: 'assistant', content: 'Error: ' + e.message };
              return updated;
            });
          }
        }

        }

        // Currently viewed roster
        const viewingRoster = currentLeague.rosters.find(r => r.owner_id === viewingOwnerId) || myRoster;
        const viewingOwner = standings.find(t => t.userId === viewingOwnerId);
        const isViewingMyTeam = viewingOwnerId === sleeperUserId;

        // Stat column style shared by header and rows
        const statColStyle = { width: '42px', textAlign: 'center', fontSize: '0.65rem', flexShrink: 0 };

        // Column header row for stat columns — merged into section labels
        const statLabels = ['DHQ', 'YRS', 'PTS', 'GP', 'AVG', 'PROJ'];

        function SectionLabel({ label, color, borderColor, borderWidth }) {
            return (
                <div style={{
                    display: 'flex',
                    alignItems: 'center',
                    marginBottom: '0.5rem',
                    paddingBottom: '0.4rem',
                    borderBottom: `${borderWidth || '1px'} solid ${borderColor || color}`,
                    gap: '0.5rem'
                }}>
                    <span style={{ width: '36px', flexShrink: 0 }}></span>
                    <span style={{ flex: 1, color: color, fontSize: '0.85rem', fontWeight: '700', letterSpacing: '0.08em' }}>{label}</span>
                    {statLabels.map(l => (
                        <span key={l} style={{ ...statColStyle, color: 'var(--gold)', fontWeight: '700', letterSpacing: '0.05em', opacity: 0.8 }}>{l}</span>
                    ))}
                </div>
            );
        }

        // PlayerRow with gold position box, clickable name, 5 stat columns
        function PlayerRow({ playerId, section }) {
            const pos = getPlayerPosition(playerId);
            const stats = getPlayerStats(playerId);
            const team = getPlayerTeam(playerId);
            const borderColor = section === 'starter' ? 'var(--gold)' : section === 'ir' ? '#E74C3C' : section === 'taxi' ? '#3498DB' : 'transparent';
            const bgColor = section === 'starter' ? 'rgba(212, 175, 55, 0.05)' : section === 'ir' ? 'rgba(231, 76, 60, 0.05)' : section === 'taxi' ? 'rgba(52, 152, 219, 0.05)' : 'rgba(255, 255, 255, 0.02)';
            return (
                <div style={{
                    display: 'flex',
                    alignItems: 'center',
                    padding: '0.45rem 0.6rem',
                    marginBottom: '0.3rem',
                    background: bgColor,
                    borderLeft: borderColor !== 'transparent' ? `3px solid ${borderColor}` : 'none',
                    borderRadius: '4px',
                    gap: '0.5rem'
                }}>
                    {/* Gold position box */}
                    <span style={{
                        display: 'inline-flex',
                        alignItems: 'center',
                        justifyContent: 'center',
                        width: '36px',
                        flexShrink: 0,
                        fontSize: '0.65rem',
                        fontWeight: '700',
                        color: getPositionColor(pos),
                        border: '1.5px solid var(--gold)',
                        borderRadius: '3px',
                        padding: '2px 0',
                        background: 'rgba(212, 175, 55, 0.08)',
                        letterSpacing: '0.02em'
                    }}>
                        {pos}
                    </span>
                    {/* Player name + team — opens shared player card */}
                    <a
                        href="#"
                        onClick={e => { e.preventDefault(); if(window.openFWPlayerModal) openFWPlayerModal(playerId, playersData, statsData); }}
                        style={{
                            flex: 1,
                            display: 'flex',
                            alignItems: 'center',
                            gap: '6px',
                            color: 'var(--white)',
                            fontSize: '0.92rem',
                            overflow: 'hidden',
                            textDecoration: 'none',
                            transition: 'color 0.2s',
                            minWidth: 0,
                            cursor: 'pointer'
                        }}
                        onMouseEnter={e => e.currentTarget.style.color = 'var(--gold)'}
                        onMouseLeave={e => e.currentTarget.style.color = 'var(--white)'}
                    >
                        <img
                            src={`https://sleepercdn.com/content/nfl/players/thumb/${playerId}.jpg`}
                            alt=""
                            onError={e => { e.target.style.display = 'none'; }}
                            style={{ width: '28px', height: '28px', borderRadius: '50%', objectFit: 'cover', flexShrink: 0 }}
                        />
                        <span style={{ overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>
                            {getPlayerName(playerId)} <span style={{ fontSize: '0.62rem', color: 'var(--silver)', opacity: 0.5 }}>{team}</span>
                        </span>
                    </a>
                    {/* DHQ dynasty value */}
                    {(() => {
                      const dhq = window.App?.LI?.playerScores?.[playerId] || 0;
                      if (!dhq) return <span style={{ ...statColStyle, color: 'var(--silver)', opacity: 0.4, fontSize: '0.65rem' }}>—</span>;
                      const col = dhq >= 7000 ? '#2ECC71' : dhq >= 4000 ? '#D4AF37' : dhq >= 2000 ? 'var(--silver)' : 'rgba(255,255,255,0.4)';
                      return <span style={{ ...statColStyle, color: col, fontWeight: '700', fontFamily: 'Oswald, sans-serif', fontSize: '0.72rem', minWidth: '42px' }}>{dhq.toLocaleString()}</span>;
                    })()}
                    {/* Stat columns: YRS PTS GP AVG PROJ */}
                    <span style={{ ...statColStyle, color: 'var(--silver)', opacity: 0.7 }}>{stats.yrs}</span>
                    <span style={{ ...statColStyle, color: 'var(--gold)', fontWeight: '700' }}>{stats.pts}</span>
                    <span style={{ ...statColStyle, color: 'var(--silver)', opacity: 0.7 }}>{stats.gp}</span>
                    <span style={{ ...statColStyle, color: 'var(--silver)', opacity: 0.7 }}>{stats.avg}</span>
                    <span style={{ ...statColStyle, color: '#4ECDC4', fontWeight: '600' }}>{stats.proj}</span>
                </div>
            );
        }

        // Reusable roster section renderer
        function RosterSection({ roster }) {
            if (!roster) return <div style={{ textAlign: 'center', color: 'var(--silver)', padding: '2rem' }}>No roster found</div>;
            const starters = roster.starters || [];
            const reserve = roster.reserve || [];
            const taxi = roster.taxi || [];
            const bench = (roster.players || []).filter(p => !starters.includes(p) && !reserve.includes(p) && !taxi.includes(p));

            return (
                <>
                    {starters.length > 0 && (
                        <div style={{ marginBottom: '1.25rem' }}>
                            <SectionLabel label="STARTERS" color="var(--gold)" borderColor="var(--gold)" borderWidth="2px" />
                            {starters.map((id, i) => <PlayerRow key={i} playerId={id} section="starter" />)}
                        </div>
                    )}
                    {bench.length > 0 && (
                        <div style={{ marginBottom: '1.25rem' }}>
                            <SectionLabel label="BENCH" color="var(--silver)" borderColor="rgba(255,255,255,0.15)" />
                            {bench.map((id, i) => <PlayerRow key={i} playerId={id} section="bench" />)}
                        </div>
                    )}
                    {reserve.length > 0 && (
                        <div style={{ marginBottom: '1.25rem' }}>
                            <SectionLabel label="INJURED RESERVE" color="#E74C3C" borderColor="rgba(231,76,60,0.3)" />
                            {reserve.map((id, i) => <PlayerRow key={i} playerId={id} section="ir" />)}
                        </div>
                    )}
                    {taxi.length > 0 && (
                        <div>
                            <SectionLabel label="TAXI SQUAD" color="#3498DB" borderColor="rgba(52,152,219,0.3)" />
                            {taxi.map((id, i) => <PlayerRow key={i} playerId={id} section="taxi" />)}
                        </div>
                    )}
                </>
            );
        }

        // --- My Team Tab helpers ---
        function filteredAndSortedRows(rows) {
          const offPos = new Set(['QB','RB','WR','TE','K']);
          const idpPos = new Set(['DL','LB','DB']);
          let filtered = rows;
          if (rosterFilter === 'Starters') filtered = rows.filter(r => r.isStarter);
          else if (rosterFilter === 'Bench') filtered = rows.filter(r => !r.isStarter && !r.isIR && !r.isTaxi);
          else if (rosterFilter === 'Taxi') filtered = rows.filter(r => r.isTaxi);
          else if (rosterFilter === 'IR') filtered = rows.filter(r => r.isIR);
          else if (rosterFilter === 'Offense') filtered = rows.filter(r => offPos.has(r.pos));
          else if (rosterFilter === 'IDP') filtered = rows.filter(r => idpPos.has(r.pos));

          const posOrder = {QB:0,RB:1,WR:2,TE:3,K:4,DL:5,LB:6,DB:7};
          return [...filtered].sort((a, b) => {
            const {key, dir} = rosterSort;
            if (key === 'dhq') return (b.dhq - a.dhq) * dir;
            if (key === 'age') return ((a.age||99) - (b.age||99)) * dir;
            if (key === 'ppg') return ((b.curPPG||0) - (a.curPPG||0)) * dir;
            if (key === 'prev') return ((b.prevPPG||0) - (a.prevPPG||0)) * dir;
            if (key === 'trend') return ((b.trend||0) - (a.trend||0)) * dir;
            if (key === 'gp') return ((b.curGP||0) - (a.curGP||0)) * dir;
            if (key === 'name') { const na = getPlayerName(a.pid).toLowerCase(), nb = getPlayerName(b.pid).toLowerCase(); return (na < nb ? -1 : na > nb ? 1 : 0) * dir; }
            if (key === 'pos') return ((posOrder[a.pos]||99) - (posOrder[b.pos]||99)) * dir;
            if (key === 'peak') return ((b.peakYrsLeft||0) - (a.peakYrsLeft||0)) * dir;
            if (key === 'rec') { const ord = {BUY:3,HOLD:2,SELL:1}; return ((ord[b.rec]||0) - (ord[a.rec]||0)) * dir; }
            return 0;
          });
        }

        function renderMyTeamTab() {
          if (!myRoster) return <div style={{ padding: '2rem', textAlign: 'center', color: 'var(--silver)' }}>No roster found</div>;

          const allPlayers = myRoster.players || [];
          const starters = new Set(myRoster.starters || []);
          const reserve = new Set(myRoster.reserve || []);
          const taxi = new Set(myRoster.taxi || []);

          const normPos = (pos) => {
            if (!pos) return null;
            const p = pos.toUpperCase();
            if (['DE','DT','NT'].includes(p)) return 'DL';
            if (['ILB','OLB','MLB'].includes(p)) return 'LB';
            if (['CB','SS','FS','S'].includes(p)) return 'DB';
            return p;
          };

          // Build enriched player rows
          const rows = allPlayers.map(pid => {
            const p = playersData[pid];
            if (!p) return null;
            const pos = normPos(p.position) || p.position || '?';
            const dhq = window.App?.LI?.playerScores?.[pid] || 0;
            const meta = window.App?.LI?.playerMeta?.[pid];
            const st = statsData[pid] || {};
            const prev = stats2025Data?.[pid] || {};

            const curPts = calcRawPts(st) || 0;
            const curGP = st.gp || 0;
            const curPPG = curGP > 0 ? +(curPts / curGP).toFixed(1) : 0;

            const prevPts = calcRawPts(prev) || 0;
            const prevGP = prev.gp || 0;
            const prevPPG = prevGP > 0 ? +(prevPts / prevGP).toFixed(1) : 0;

            const trend = meta?.trend || (prevPPG && curPPG ? Math.round((curPPG - prevPPG) / prevPPG * 100) : 0);

            const age = p.age || (p.birth_date ? Math.floor((Date.now() - new Date(p.birth_date).getTime()) / 31557600000) : null);
            const isStarter = starters.has(pid);
            const isIR = reserve.has(pid);
            const isTaxi = taxi.has(pid);
            const section = isStarter ? 'starter' : isIR ? 'ir' : isTaxi ? 'taxi' : 'bench';

            const peaks = {QB:[27,33],RB:[22,26],WR:[24,29],TE:[25,30],DL:[24,29],LB:[23,28],DB:[24,29]};
            const [pLo, pHi] = peaks[pos] || [24,29];
            const peakPct = age ? Math.max(0, Math.min(100, ((age - (pLo-4)) / ((pHi+4) - (pLo-4))) * 100)) : 50;
            const peakPhase = !age ? '\u2014' : age < pLo ? 'PRE' : age <= pHi ? 'PRIME' : 'POST';
            const peakYrsLeft = age ? Math.max(0, pHi - age) : 0;

            const rec = peakYrsLeft <= 0 ? 'SELL' : peakYrsLeft <= 2 ? (trend >= 10 ? 'HOLD' : 'SELL') : (dhq >= 7000 ? 'HOLD' : 'BUY');

            return { pid, p, pos, dhq, age, curPPG, prevPPG, trend, isStarter, isIR, isTaxi, section, peakPhase, peakPct, peakYrsLeft, rec, curGP, meta, injury: p.injury_status };
          }).filter(Boolean);

          // Position-level PPG percentiles for color coding
          const posPPGs = {};
          rows.forEach(r => {
            if (!posPPGs[r.pos]) posPPGs[r.pos] = [];
            if (r.curPPG > 0) posPPGs[r.pos].push(r.curPPG);
          });
          const posP75 = {}, posP25 = {};
          Object.entries(posPPGs).forEach(([pos, vals]) => {
            vals.sort((a,b) => a-b);
            posP75[pos] = vals[Math.floor(vals.length * 0.75)] || 10;
            posP25[pos] = vals[Math.floor(vals.length * 0.25)] || 5;
          });

          // Cell background helpers (FM-style colored cells)
          const dhqBg = v => v >= 7000 ? 'rgba(46,204,113,0.15)' : v >= 4000 ? 'rgba(52,152,219,0.12)' : v >= 2000 ? 'rgba(255,255,255,0.04)' : 'transparent';
          const dhqCol = v => v >= 7000 ? '#2ECC71' : v >= 4000 ? '#3498DB' : v >= 2000 ? 'var(--silver)' : 'rgba(255,255,255,0.25)';
          const ageBg = a => !a ? 'transparent' : a <= 24 ? 'rgba(46,204,113,0.12)' : a <= 28 ? 'transparent' : a <= 31 ? 'rgba(240,165,0,0.1)' : 'rgba(231,76,60,0.1)';
          const ageCol = a => !a ? 'var(--silver)' : a <= 24 ? '#2ECC71' : a <= 28 ? 'var(--white)' : a <= 31 ? '#F0A500' : '#E74C3C';
          const ppgBg = (v, pos) => v >= (posP75[pos]||10) ? 'rgba(46,204,113,0.12)' : v <= (posP25[pos]||3) ? 'rgba(231,76,60,0.08)' : 'transparent';
          const trendBg = t => t >= 15 ? 'rgba(46,204,113,0.12)' : t <= -15 ? 'rgba(231,76,60,0.1)' : 'transparent';
          const statusCol = s => s === 'starter' ? 'var(--gold)' : s === 'ir' ? '#E74C3C' : s === 'taxi' ? '#3498DB' : 'transparent';
          const posColors = {QB:'#E74C3C',RB:'#2ECC71',WR:'#3498DB',TE:'#F0A500',K:'#9B59B6',DL:'#E67E22',LB:'#1ABC9C',DB:'#E91E63'};

          const filtered = filteredAndSortedRows(rows);

          const grid = '3px 26px 1fr 34px 30px 50px 38px 38px 38px 42px 26px 34px 38px 38px';
          const cellStyle = { padding: '0 4px', display: 'flex', alignItems: 'center', fontSize: '0.68rem', overflow: 'hidden', whiteSpace: 'nowrap' };
          const sortKeys = [null,null,'name','pos','age','dhq','ppg','prev','trend','peak','gp','gp','rec',null];

          return (
            <div style={{ padding: '16px' }}>
              <div style={{ display: 'flex', alignItems: 'baseline', gap: '12px', marginBottom: '12px' }}>
                <span style={{ fontFamily: 'Bebas Neue, cursive', fontSize: '1.6rem', color: 'var(--gold)', letterSpacing: '0.05em' }}>MY TEAM</span>
                <span style={{ fontSize: '0.68rem', color: 'var(--silver)' }}>{allPlayers.length} players</span>
                <span style={{ fontSize: '0.68rem', color: 'var(--silver)' }}>Total DHQ: <span style={{ color: 'var(--gold)', fontWeight: 700 }}>{rows.reduce((s,r) => s+r.dhq, 0).toLocaleString()}</span></span>
              </div>

              {/* Filter bar */}
              <div style={{ display: 'flex', gap: '6px', marginBottom: '8px', flexWrap: 'wrap', alignItems: 'center' }}>
                {['All','Starters','Bench','Taxi','IR','Offense','IDP'].map(f => (
                  <button key={f} onClick={() => setRosterFilter(f)} style={{
                    padding: '4px 10px', fontSize: '0.6rem', fontWeight: rosterFilter === f ? 700 : 400,
                    fontFamily: 'Oswald', textTransform: 'uppercase', letterSpacing: '0.03em',
                    background: rosterFilter === f ? 'var(--gold)' : 'rgba(255,255,255,0.04)',
                    color: rosterFilter === f ? 'var(--black)' : 'var(--silver)',
                    border: '1px solid ' + (rosterFilter === f ? 'var(--gold)' : 'rgba(255,255,255,0.08)'),
                    borderRadius: '3px', cursor: 'pointer'
                  }}>{f}</button>
                ))}
                <span style={{ marginLeft: 'auto', fontSize: '0.6rem', color: 'var(--silver)', opacity: 0.5 }}>{filtered.length} shown</span>
              </div>

              {/* FM-style table */}
              <div style={{ background: 'var(--black)', border: '1px solid rgba(212,175,55,0.2)', borderRadius: '8px', overflow: 'hidden' }}>
                {/* Sticky header */}
                <div style={{ display: 'grid', gridTemplateColumns: grid, background: 'rgba(212,175,55,0.08)', borderBottom: '2px solid rgba(212,175,55,0.2)', position: 'sticky', top: 0, zIndex: 2 }}>
                  {['','','Player','Pos','Age','DHQ','PPG','Prev','Trend','Peak','GP','Dur','Action','Slot'].map((h, i) => (
                    <div key={i} onClick={() => {
                      if (sortKeys[i]) setRosterSort(prev => prev.key === sortKeys[i] ? {...prev, dir: prev.dir * -1} : {key: sortKeys[i], dir: -1});
                    }} style={{
                      ...cellStyle, height: '28px', fontSize: '0.55rem', fontWeight: 700,
                      color: 'var(--gold)', fontFamily: 'Oswald', textTransform: 'uppercase',
                      letterSpacing: '0.04em', cursor: sortKeys[i] ? 'pointer' : 'default',
                      justifyContent: i >= 4 ? 'center' : 'flex-start'
                    }}>
                      {h}{rosterSort.key === sortKeys[i] && sortKeys[i] ? (rosterSort.dir === -1 ? ' \u25BC' : ' \u25B2') : ''}
                    </div>
                  ))}
                </div>

                {/* Rows */}
                <div style={{ maxHeight: '600px', overflow: 'auto' }}>
                  {filtered.map(r => (
                    <div key={r.pid} onClick={() => { if (window.openFWPlayerModal) openFWPlayerModal(r.pid, playersData, statsData); }}
                      style={{
                        display: 'grid', gridTemplateColumns: grid, cursor: 'pointer',
                        borderBottom: '1px solid rgba(255,255,255,0.03)',
                        transition: 'background 0.1s', height: '32px'
                      }}
                      onMouseEnter={e => e.currentTarget.style.background = 'rgba(212,175,55,0.06)'}
                      onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
                    >
                      {/* Status strip */}
                      <div style={{ background: statusCol(r.section), width: '3px', height: '100%' }}></div>
                      {/* Photo */}
                      <div style={{...cellStyle}}><img src={'https://sleepercdn.com/content/nfl/players/thumb/' + r.pid + '.jpg'} alt="" onError={e => e.target.style.display='none'} style={{ width: '22px', height: '22px', borderRadius: '50%', objectFit: 'cover' }} /></div>
                      {/* Name + Team */}
                      <div style={{...cellStyle, flexDirection: 'column', alignItems: 'flex-start', justifyContent: 'center', gap: '0px', lineHeight: 1.2 }}>
                        <span style={{ fontWeight: 600, color: 'var(--white)', fontSize: '0.72rem' }}>{getPlayerName(r.pid)}</span>
                        <span style={{ fontSize: '0.52rem', color: 'var(--silver)', opacity: 0.5 }}>{r.p.team || 'FA'}{r.injury ? ' \u00B7 ' + r.injury : ''}</span>
                      </div>
                      {/* Pos */}
                      <div style={{...cellStyle, justifyContent: 'center'}}><span style={{ fontSize: '0.58rem', fontWeight: 700, padding: '1px 4px', borderRadius: '2px', background: (posColors[r.pos] || '#666') + '22', color: posColors[r.pos] || 'var(--silver)' }}>{r.pos}</span></div>
                      {/* Age */}
                      <div style={{...cellStyle, justifyContent: 'center', background: ageBg(r.age)}}><span style={{ color: ageCol(r.age), fontWeight: 600, fontFamily: 'Oswald' }}>{r.age || '\u2014'}</span></div>
                      {/* DHQ */}
                      <div style={{...cellStyle, justifyContent: 'center', background: dhqBg(r.dhq)}}><span style={{ color: dhqCol(r.dhq), fontWeight: 700, fontFamily: 'Oswald', fontSize: '0.72rem' }}>{r.dhq > 0 ? r.dhq.toLocaleString() : '\u2014'}</span></div>
                      {/* PPG */}
                      <div style={{...cellStyle, justifyContent: 'center', background: ppgBg(r.curPPG, r.pos)}}><span style={{ color: r.curPPG >= (posP75[r.pos]||10) ? '#2ECC71' : 'var(--silver)' }}>{r.curPPG || '\u2014'}</span></div>
                      {/* Prev */}
                      <div style={{...cellStyle, justifyContent: 'center'}}><span style={{ color: 'var(--silver)', opacity: 0.6 }}>{r.prevPPG || '\u2014'}</span></div>
                      {/* Trend */}
                      <div style={{...cellStyle, justifyContent: 'center', background: trendBg(r.trend)}}><span style={{ color: r.trend >= 15 ? '#2ECC71' : r.trend <= -15 ? '#E74C3C' : 'var(--silver)', fontWeight: 600, fontSize: '0.62rem' }}>{r.trend > 0 ? '+' + r.trend + '%' : r.trend < 0 ? r.trend + '%' : '\u2014'}</span></div>
                      {/* Peak */}
                      <div style={{...cellStyle, justifyContent: 'center', flexDirection: 'column', gap: '1px'}}>
                        <span style={{ fontSize: '0.52rem', fontWeight: 700, color: r.peakPhase === 'PRIME' ? '#2ECC71' : r.peakPhase === 'PRE' ? '#3498DB' : '#E74C3C' }}>{r.peakPhase}</span>
                        <div style={{ width: '30px', height: '3px', borderRadius: '1px', background: 'rgba(255,255,255,0.06)', overflow: 'hidden', position: 'relative' }}>
                          <div style={{ position: 'absolute', left: 0, top: 0, height: '100%', width: '30%', background: 'rgba(52,152,219,0.4)' }}></div>
                          <div style={{ position: 'absolute', left: '30%', top: 0, height: '100%', width: '40%', background: 'rgba(46,204,113,0.4)' }}></div>
                          <div style={{ position: 'absolute', left: '70%', top: 0, height: '100%', width: '30%', background: 'rgba(231,76,60,0.3)' }}></div>
                          <div style={{ position: 'absolute', left: r.peakPct + '%', top: '-1px', width: '2px', height: '5px', background: 'var(--white)', borderRadius: '1px' }}></div>
                        </div>
                      </div>
                      {/* GP */}
                      <div style={{...cellStyle, justifyContent: 'center'}}><span style={{ color: 'var(--silver)', fontSize: '0.62rem' }}>{r.curGP || '\u2014'}</span></div>
                      {/* Durability bar */}
                      <div style={{...cellStyle, justifyContent: 'center'}}>
                        <div style={{ width: '24px', height: '4px', borderRadius: '2px', background: 'rgba(255,255,255,0.06)', overflow: 'hidden' }}>
                          <div style={{ width: Math.min(100, (r.curGP / 17) * 100) + '%', height: '100%', background: r.curGP >= 15 ? '#2ECC71' : r.curGP >= 10 ? '#F0A500' : '#E74C3C', borderRadius: '2px' }}></div>
                        </div>
                      </div>
                      {/* Action */}
                      <div style={{...cellStyle, justifyContent: 'center'}}><span style={{ fontSize: '0.58rem', fontWeight: 700, padding: '1px 6px', borderRadius: '2px', background: r.rec === 'BUY' ? 'rgba(46,204,113,0.15)' : r.rec === 'HOLD' ? 'rgba(212,175,55,0.12)' : 'rgba(231,76,60,0.12)', color: r.rec === 'BUY' ? '#2ECC71' : r.rec === 'HOLD' ? 'var(--gold)' : '#E74C3C' }}>{r.rec}</span></div>
                      {/* Slot */}
                      <div style={{...cellStyle, justifyContent: 'center'}}><span style={{ fontSize: '0.52rem', color: 'var(--silver)', opacity: 0.5, textTransform: 'uppercase' }}>{r.section === 'starter' ? 'STR' : r.section === 'ir' ? 'IR' : r.section === 'taxi' ? 'TAX' : 'BN'}</span></div>
                    </div>
                  ))}
                </div>
              </div>

              {/* Position summary bar (FM-style) */}
              <div style={{ display: 'flex', gap: '8px', marginTop: '12px', flexWrap: 'wrap' }}>
                {Object.entries(posColors).map(([pos, col]) => {
                  const posRows = rows.filter(r => r.pos === pos);
                  if (!posRows.length) return null;
                  const total = posRows.reduce((s,r) => s + r.dhq, 0);
                  const stCount = posRows.filter(r => r.isStarter).length;
                  return (
                    <div key={pos} style={{ background: col + '11', border: '1px solid ' + col + '33', borderRadius: '6px', padding: '6px 10px', minWidth: '70px' }}>

                    </div>
                  );

        const divisions = {};

                                        borderRadius: '8px', zIndex: 50, maxHeight: '220px', overflowY: 'auto',
                                        boxShadow: '0 8px 32px rgba(0,0,0,0.6)'

                                            .filter(([k]) => !selectedKpis.includes(k) || k === kpiKey)

                                                return (
                                                    <div key={k} onClick={() => {
