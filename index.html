                                                                <span style={{ fontSize:'0.7rem', fontWeight:700, color:verdictCol, padding:'1px 6px', borderRadius:'3px', background:verdictCol + '15' }}>{verdict}</span>
                                                                <span style={{ fontSize:'0.72rem', color:'var(--silver)' }}>vs {otherUser}</span>
                                                                {t.fairness != null && <span style={{ fontSize:'0.7rem', color:'var(--silver)', opacity:0.6 }}>Fairness: {t.fairness}</span>}
                                                            </div>
                                                            <div style={{ display:'grid', gridTemplateColumns:'1fr 1fr', gap:'8px' }}>
                                                                <div>
                                                                    <div style={{ fontSize:'0.7rem', color:'#2ECC71', marginBottom:'2px' }}>Received:</div>
                                                                    {(mySide.players || []).map(pid => (
                                                                        <div key={pid} style={{ fontSize:'0.76rem', color:'var(--white)' }}>
                                                                            {playersData[pid]?.full_name || pid}
                                                                            <span style={{ color:'var(--silver)', fontSize:'0.78rem', marginLeft:'4px' }}>
                                                                                ({(window.App?.LI?.playerScores?.[pid] || 0).toLocaleString()} DHQ)
                                                                            </span>
                                                                        </div>
                                                                    ))}
                                                                    {(mySide.picks || []).map((pk, pi) => (
                                                                        <div key={'pk'+pi} style={{ fontSize:'0.76rem', color:'#a78bfa' }}>{pk.season} Round {pk.round}</div>
                                                                    ))}
                                                                </div>
                                                                <div>
                                                                    <div style={{ fontSize:'0.7rem', color:'#E74C3C', marginBottom:'2px' }}>Sent:</div>
                                                                    {(theirSide.players || []).map(pid => (
                                                                        <div key={pid} style={{ fontSize:'0.76rem', color:'var(--white)' }}>
                                                                            {playersData[pid]?.full_name || pid}
                                                                            <span style={{ color:'var(--silver)', fontSize:'0.78rem', marginLeft:'4px' }}>
                                                                                ({(window.App?.LI?.playerScores?.[pid] || 0).toLocaleString()} DHQ)
                                                                            </span>
                                                                        </div>
                                                                    ))}
                                                                    {(theirSide.picks || []).map((pk, pi) => (
                                                                        <div key={'pk'+pi} style={{ fontSize:'0.76rem', color:'#a78bfa' }}>{pk.season} Round {pk.round}</div>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                            <div style={{ display:'flex', gap:'12px', marginTop:'4px', fontSize:'0.72rem' }}>
                                                                <span style={{ color:'#2ECC71' }}>Got: {myValue.toLocaleString()}</span>
                                                                <span style={{ color:'#E74C3C' }}>Gave: {theirValue.toLocaleString()}</span>
                                                                <span style={{ color:verdictCol, fontWeight:700 }}>Net: {myValue >= theirValue ? '+' : ''}{(myValue - theirValue).toLocaleString()}</span>
                                                            </div>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        );
                                    })()}
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        // ── renderTradeAnalyzer ──
        function renderTradeAnalyzer() {
            if (!Object.keys(playersData).length) return <div style={{ color:'var(--silver)', textAlign:'center', padding:'2rem' }}>No player data loaded.</div>;

            const totalA = tradeIds.A.reduce((s, id) => s + (getPlayerValue(id).value || 0), 0)
                + tradePickIds.A.reduce((s, pkId) => { const p = pkId.split('-'); return s + getPickValue(p[1], Number(p[2]), allRosters.length); }, 0)
                + Math.round((tradeFaab.A || 0) * FAAB_RATE);
            const totalB = tradeIds.B.reduce((s, id) => s + (getPlayerValue(id).value || 0), 0)
                + tradePickIds.B.reduce((s, pkId) => { const p = pkId.split('-'); return s + getPickValue(p[1], Number(p[2]), allRosters.length); }, 0)
                + Math.round((tradeFaab.B || 0) * FAAB_RATE);
            const userGain = totalB - totalA;
            const absDiff = Math.abs(userGain);
            const hasTrade = tradeIds.A.length > 0 || tradeIds.B.length > 0 || tradePickIds.A.length > 0 || tradePickIds.B.length > 0 || tradeFaab.A > 0 || tradeFaab.B > 0;
            const diff = totalA - totalB;

            const otherOwnerId = tradeOwner.B;
            const otherDnaKey = otherOwnerId ? (ownerDna[otherOwnerId] || 'NONE') : 'NONE';
            const otherDna = DNA_TYPES[otherDnaKey] || DNA_TYPES.NONE;
            const myOwnerId = tradeOwner.A || (myAssessment?.ownerId || null);
            const theirAssessment = assessments.find(a => a.ownerId === otherOwnerId) || null;
            const theirPosture = calcOwnerPosture(theirAssessment, otherDnaKey);
            const psychTaxes = calcPsychTaxes(myAssessment, theirAssessment, otherDnaKey, theirPosture);
            const grudgeTax = calcGrudgeTax(myOwnerId, otherOwnerId, grudges, otherDnaKey);
            const netTaxTotal = psychTaxes.reduce((s,t) => s + t.impact, 0) + grudgeTax.total;
            const fairMargin = Math.round(Math.max(totalA, totalB) * 0.04);

            let likelihood = 50;
            if (hasTrade && (totalA > 0 || totalB > 0)) {
                const maxSide = Math.max(totalA, totalB, 1);
                const normalizedDiff = diff / maxSide;
                if (otherDnaKey === 'FLEECER') likelihood = normalizedDiff < -0.05 ? 75 + Math.round(Math.abs(normalizedDiff)*40) : Math.max(15, 50 - Math.round(normalizedDiff*150));
                else if (otherDnaKey === 'DOMINATOR') likelihood = normalizedDiff < -0.10 ? 70 : normalizedDiff < 0 ? 55 : Math.max(10, 40 - Math.round(normalizedDiff*200));
                else if (otherDnaKey === 'STALWART') likelihood = Math.min(85, Math.max(20, Math.round((1 - Math.abs(normalizedDiff)*3)*80)));
                else if (otherDnaKey === 'ACCEPTOR') likelihood = Math.min(90, Math.max(30, 60 + Math.round(normalizedDiff*100)));
                else if (otherDnaKey === 'DESPERATE') { const fitsNeed = theirAssessment?.needs?.some(n => (myAssessment?.strengths||[]).includes(n.pos)); likelihood = fitsNeed ? Math.min(92, 65 + Math.round(Math.abs(normalizedDiff)*20) + 20) : Math.min(75, 55 + Math.round(Math.abs(normalizedDiff)*30)); }
                else likelihood = Math.min(85, Math.max(15, 50 - Math.round(normalizedDiff*120)));
                likelihood += netTaxTotal;
            }
            likelihood = Math.round(Math.max(5, Math.min(97, likelihood)));
            const likelihoodColor = likelihood >= 70 ? 'var(--win-green)' : likelihood >= 45 ? '#F0A500' : 'var(--loss-red)';
            const verdictColor = userGain > fairMargin ? 'var(--win-green)' : userGain < -fairMargin ? '#E74C3C' : 'var(--gold)';
            const verdictText = userGain > fairMargin ? 'YOU WIN' : userGain < -fairMargin ? 'YOU LOSE' : 'EVEN TRADE';
            const diffDisplay = userGain > 0 ? `+${absDiff.toLocaleString()}` : userGain < 0 ? `-${absDiff.toLocaleString()}` : '+/-0';

            function rosterPlayersFor(side) {
                const ownerId = tradeOwner[side]; if (!ownerId) return null;
                const roster = allRosters.find(r => r.owner_id === ownerId); if (!roster) return null;
                const playerIdSet = [...new Set([...(roster.players||[]), ...(roster.reserve||[]), ...(roster.taxi||[])])];
                const q = searchText[side].toLowerCase().trim();
                return playerIdSet.filter(id => {
                    const p = playersData[id]; if (!p || !normPos(p.position)) return false;
                    if (q.length >= 1) return `${p.first_name||''} ${p.last_name||''}`.toLowerCase().includes(q);
                    return true;
                }).map(id => { const p = playersData[id]; const v = getPlayerValue(id); return { id, name:`${p.first_name||''} ${p.last_name||''}`.trim(), pos:normPos(p.position), team:p.team||'FA', value:v.value, source:v.source }; })
                .sort((a,b) => { const pd = (TC_POS_ORDER[a.pos]??9) - (TC_POS_ORDER[b.pos]??9); return pd !== 0 ? pd : b.value - a.value; });
            }

            function addPlayer(side, pid) { if (tradeIds[side].includes(pid)) return; setTradeIds(prev => ({ ...prev, [side]: [...prev[side], pid] })); setSearchText(prev => ({ ...prev, [side]: '' })); }
            function removePlayer(side, pid) { setTradeIds(prev => ({ ...prev, [side]: prev[side].filter(id => id !== pid) })); }
            function addPick(side, pickId) { if (tradePickIds[side].includes(pickId)) return; setTradePickIds(prev => ({ ...prev, [side]: [...prev[side], pickId] })); }
            function removePick(side, pickId) { setTradePickIds(prev => ({ ...prev, [side]: prev[side].filter(id => id !== pickId) })); }
            function makePickId(year, round, fromRosterId) { return `PICK-${year}-${round}-${fromRosterId}`; }
            function pickLabel(round) { const s=['th','st','nd','rd']; const v=round%100; return round+(s[(v-20)%10]||s[v]||s[0])+' Round'; }
            const ownerOptions = [{ id: null, label: '-- None --' }, ...assessments.map(a => ({ id: a.ownerId, label: `${a.ownerName} (${a.teamName})` }))];

            function TradeSide({ side, color, label }) {
                const ids = tradeIds[side];
                const pickIds = tradePickIds[side];
                const faab = tradeFaab[side] || 0;
                const tot = ids.reduce((s, id) => s + (getPlayerValue(id).value || 0), 0)
                    + pickIds.reduce((s, pkId) => { const p = pkId.split('-'); return s + getPickValue(p[1], Number(p[2]), allRosters.length); }, 0)
                    + Math.round(faab * FAAB_RATE);
                const rosterPlayers = rosterPlayersFor(side);
                const ownerId = tradeOwner[side] || null;
                const ownerPicksList = ownerId ? (picksByOwner[ownerId] || []) : [];

                return (
                    <div className={`tc-ta-side tc-side-${side.toLowerCase()}`}>
                        <span style={{ fontFamily:'Bebas Neue,cursive', fontSize:'0.95rem', color, letterSpacing:'0.08em' }}>{label}</span>
                        <select className="tc-ta-owner-select" value={tradeOwner[side] || ''} onChange={e => { setTradeOwner(prev => ({ ...prev, [side]: e.target.value || null })); setSearchText(prev => ({ ...prev, [side]: '' })); }}>
                            {ownerOptions.map(o => <option key={o.id||'none'} value={o.id||''}>{o.label}</option>)}
                        </select>

                        {/* Added players */}
                        {ids.map(pid => {
                            const p = playersData[pid]; const v = getPlayerValue(pid);
                            const pct = Math.round((v.value / MAX_VALUE) * 100);
                            if (!p) return null;
                            return (
                                <div key={pid} className="tc-ta-player-row">
                                    <button className="tc-ta-remove" onClick={() => removePlayer(side, pid)}>X</button>
                                    <span className="tc-ta-pos-dot" style={{ background: posColor(normPos(p.position)) }} />
                                    <span style={{ flex:1, fontSize:'0.82rem', fontWeight:600, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{p.first_name} {p.last_name}</span>
                                    <div className="tc-ta-val-col" style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', gap:2 }}>
                                        <div className="tc-ta-val-bar-wrap"><div className="tc-ta-val-bar-fill" style={{ width:`${pct}%`, background: color }} /></div>
                                        <span style={{ fontSize:'0.7rem', fontWeight:700, color }}>{v.value > 0 ? v.value.toLocaleString() : '--'}</span>
                                    </div>
                                </div>
                            );
                        })}

                        {/* Added picks */}
                        {pickIds.map(pkId => {
                            const parts = pkId.split('-');
                            const yr = parts[1], rd = Number(parts[2]), fromRid = parts[3];
                            const val = getPickValue(yr, rd, allRosters.length);
                            const pct = Math.round((val / MAX_VALUE) * 100);
                            const pickColor = PICK_COLORS[rd] || 'var(--silver)';
                            const via = ownerNameForRosterId(fromRid);
                            const isOwn = !via || (ownerId && (() => { const r = allRosters.find(x => x.owner_id === ownerId); return r && String(r.roster_id) === String(fromRid); })());
                            return (
                                <div key={pkId} className="tc-ta-player-row">
                                    <button className="tc-ta-remove" onClick={() => removePick(side, pkId)}>X</button>
                                    <span className="tc-ta-pos-dot" style={{ background: pickColor }} />
                                    <span style={{ flex:1, fontSize:'0.82rem', fontWeight:600 }}>{yr} {pickLabel(rd)}{!isOwn && via && <span style={{ fontSize:'0.76rem', color:'var(--silver)', opacity:0.6, marginLeft:'0.3rem' }}>via {via}</span>}</span>
                                    <div className="tc-ta-val-col" style={{ display:'flex', flexDirection:'column', alignItems:'flex-end', gap:2 }}>
                                        <div className="tc-ta-val-bar-wrap"><div className="tc-ta-val-bar-fill" style={{ width:`${pct}%`, background: pickColor }} /></div>
                                        <span style={{ fontSize:'0.7rem', fontWeight:700, color: pickColor }}>{val.toLocaleString()}</span>
                                    </div>
                                </div>
                            );
                        })}

                        {/* Roster picker */}
                        {tradeOwner[side] && rosterPlayers !== null ? (
                            <div>
                                <input className="tc-ta-roster-filter" placeholder={`Filter ${rosterPlayers.length} players...`} value={searchText[side]} onChange={e => setSearchText(prev => ({ ...prev, [side]: e.target.value }))} />
                                <div className="tc-ta-roster-list-tall">
                                    {rosterPlayers.length === 0 ? <div className="tc-ta-roster-empty">No players match</div> : (() => {
                                        const grouped = {};
                                        rosterPlayers.forEach(r => { if (!grouped[r.pos]) grouped[r.pos] = []; grouped[r.pos].push(r); });
                                        return Object.entries(grouped).sort((a,b) => (TC_POS_ORDER[a[0]]??9)-(TC_POS_ORDER[b[0]]??9)).map(([pos, posPlayers]) => (
                                            <div key={pos}>
                                                <div className="tc-ta-pos-group-hdr" style={{ color: posColor(pos) }}>{pos}</div>
                                                {posPlayers.map(r => {
                                                    const added = ids.includes(r.id);
                                                    return (
                                                        <div key={r.id} className={`tc-ta-roster-item${added?' tc-added':''}`} onClick={() => !added && addPlayer(side, r.id)}>
                                                            <span className="tc-ta-pos-dot" style={{ background: posColor(r.pos) }} />
                                                            <span style={{ flex:1, fontWeight:600, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{r.name}</span>
                                                            <span className="tc-ta-player-meta">{r.team}</span>
                                                            <span className="tc-ta-player-val">{r.value > 0 ? r.value.toLocaleString() : '--'}</span>
                                                        </div>
                                                    );
                                                })}
                                            </div>
                                        ));
                                    })()}
                                    {ownerPicksList.length > 0 && (
                                        <div style={{ marginTop:'0.5rem', borderTop:'1px solid rgba(212,175,55,0.2)', paddingTop:'0.4rem' }}>
                                            <div className="tc-ta-pos-group-hdr" style={{ color:'var(--gold)' }}>DRAFT PICKS</div>
                                            {ownerPicksList.map(({ year, round, fromRosterId }) => {
                                                const pkId = makePickId(year, round, fromRosterId);
                                                const added = pickIds.includes(pkId);
                                                const val = getPickValue(year, round, allRosters.length);
                                                const pickColor = PICK_COLORS[round] || 'var(--silver)';
                                                const via = ownerNameForRosterId(fromRosterId);
                                                const r2 = allRosters.find(x => x.owner_id === ownerId);
                                                const isOwn2 = r2 && String(r2.roster_id) === String(fromRosterId);
                                                return (
                                                    <div key={pkId} className={`tc-ta-roster-item${added?' tc-added':''}`} onClick={() => !added && addPick(side, pkId)}>
                                                        <span className="tc-ta-pos-dot" style={{ background: pickColor }} />
                                                        <span style={{ flex:1, fontWeight:600 }}>{year} {pickLabel(round)}{!isOwn2 && via && <span style={{ fontSize:'0.74rem', color:'var(--silver)', opacity:0.6, marginLeft:'0.3rem' }}>via {via}</span>}</span>
                                                        <span className="tc-ta-player-val" style={{ color: pickColor }}>{val.toLocaleString()}</span>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            </div>
                        ) : <div style={{ fontSize:'0.76rem', color:'var(--silver)', opacity:0.6, textAlign:'center', padding:'0.5rem' }}>Select an owner above to view their roster</div>}

                        {/* FAAB */}
                        <div style={{ borderTop:'1px solid rgba(255,255,255,0.06)', paddingTop:'0.4rem', marginTop:'0.2rem' }}>
                            <div style={{ display:'flex', alignItems:'center', gap:'0.5rem' }}>
                                <span style={{ fontSize:'0.72rem', fontWeight:700, color:'var(--win-green)', letterSpacing:'0.05em' }}>FAAB $</span>
                                <input type="number" min={0} value={faab || ''} onChange={e => setTradeFaab(prev => ({ ...prev, [side]: Math.max(0, Number(e.target.value)) }))} placeholder="0"
                                    style={{ width:70, background:'rgba(0,0,0,0.3)', border:'1px solid rgba(46,204,113,0.35)', color:'var(--win-green)', padding:'0.2rem 0.4rem', borderRadius:4, fontSize:'0.75rem', fontWeight:700 }} />
                                {faab > 0 && <button className="tc-ta-remove" onClick={() => setTradeFaab(prev => ({ ...prev, [side]: 0 }))}>X</button>}
                            </div>
                            {faab > 0 && <div style={{ fontSize:'0.7rem', color:'var(--silver)', opacity:0.6, marginTop:'0.2rem' }}>= {Math.round(faab * FAAB_RATE).toLocaleString()} dynasty pts</div>}
                        </div>

                        {/* Total */}
                        <div className="tc-ta-total-row" style={{ background:`${color}12`, border:`1px solid ${color}30` }}>
                            <span className="tc-ta-total-label">Total Value</span>
                            <span className="tc-ta-total-val" style={{ color }}>{tot > 0 ? tot.toLocaleString() : '--'}</span>
                        </div>
                    </div>
                );
            }

            return (
                <div>
                    <div style={{ fontSize:'0.74rem', color:'var(--silver)', opacity:0.65, marginBottom:'0.75rem', lineHeight:1.5 }}>
                        Values sourced from <strong style={{ color:'var(--gold)' }}>DHQ Engine</strong> (dynasty valuations). Select owners, add players and picks, and see the full psychological trade analysis.
                    </div>

                    <div className="tc-ta-3col">
                        {TradeSide({ side:'A', color:'#5DADE2', label:'SIDE A -- YOUR GIVE' })}
                        {TradeSide({ side:'B', color:'#E74C3C', label:'SIDE B -- YOU RECEIVE' })}

                        {/* League Scouting Panel */}
                        <div className="tc-scout-panel">
                            <div style={{ fontFamily:'Bebas Neue,cursive', fontSize:'0.92rem', color:'var(--gold)', letterSpacing:'0.1em', marginBottom:'0.2rem' }}>LEAGUE TEAMS</div>
                            <div style={{ fontSize:'0.74rem', color:'var(--silver)', opacity:0.65, marginBottom:'0.3rem' }}>Click a team to set as Side B.</div>
                            {assessments.filter(a => a.rosterId !== myRosterId).sort((a,b) => b.healthScore - a.healthScore).map(a => {
                                const isSelected = tradeOwner.B === a.ownerId;
                                const compat = myAssessment ? calcComplementarity(myAssessment, a) : 0;
                                const compatColor = compat >= 50 ? 'var(--win-green)' : compat >= 30 ? '#F0A500' : 'var(--silver)';
                                const dnaKey2 = ownerDna[a.ownerId] || 'NONE';
                                const dna2 = DNA_TYPES[dnaKey2];
                                return (
                                    <div key={a.rosterId} className={`tc-scout-team-card${isSelected ? ' tc-scout-selected' : ''}`}
                                        onClick={() => { setTradeOwner(prev => ({ ...prev, B: a.ownerId })); setSearchText(prev => ({ ...prev, B: '' })); }}>
                                        <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', gap:'0.4rem' }}>
                                            <span style={{ fontSize:'0.82rem', fontWeight:700, overflow:'hidden', textOverflow:'ellipsis', whiteSpace:'nowrap' }}>{a.ownerName}</span>
                                            <span className="tc-tier-badge" style={{ color:a.tierColor, borderColor:a.tierColor, background:a.tierBg, flexShrink:0 }}>{a.tier}</span>
                                        </div>
                                        <div style={{ fontSize:'0.76rem', color:'var(--silver)', opacity:0.655 }}>{a.teamName}</div>
                                        <div style={{ fontSize:'0.76rem', display:'flex', alignItems:'center', gap:'0.4rem' }}>
                                            <span style={{ color: a.weeklyPts >= WEEKLY_TARGET ? 'var(--win-green)' : 'var(--loss-red)', fontWeight:700 }}>{a.weeklyPts > 0 ? `${a.weeklyPts} pts` : '--'}</span>
                                            <span style={{ color:'var(--silver)', opacity:0.6 }}>/ {WEEKLY_TARGET}</span>
                                            {compat > 0 && <span style={{ marginLeft:'auto', fontSize:'0.72rem', color:compatColor, fontWeight:700 }}>{compat}% fit</span>}
                                        </div>
                                        {a.needs.length > 0 && <div style={{ display:'flex', flexWrap:'wrap', gap:'0.2rem' }}><span style={{ fontSize:'0.7rem', color:'var(--silver)', opacity:0.6 }}>NEEDS:</span>{a.needs.slice(0,4).map(n => <span key={n.pos} className={`tc-chip ${n.urgency==='deficit'?'tc-chip-need':'tc-chip-thin'}`} style={{ fontSize:'0.78rem' }}>{n.pos}</span>)}</div>}
                                        {a.strengths.length > 0 && <div style={{ display:'flex', flexWrap:'wrap', gap:'0.2rem' }}><span style={{ fontSize:'0.7rem', color:'var(--silver)', opacity:0.6 }}>HAS:</span>{a.strengths.map(s => <span key={s} className="tc-chip tc-chip-strength" style={{ fontSize:'0.78rem' }}>+{s}</span>)}</div>}
                                        {dnaKey2 !== 'NONE' && dna2 && <div style={{ fontSize:'0.72rem', color:dna2.color, opacity:0.85, fontStyle:'italic' }}>{dna2.label}</div>}
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {/* Verdict */}
                    {hasTrade && (
                        <div className="tc-ta-verdict">
                            <div className="tc-section-hdr">TRADE ANALYSIS</div>
                            <div style={{ display:'flex', alignItems:'baseline', gap:'0.6rem', flexWrap:'wrap' }}>
                                <span className="tc-verdict-diff" style={{ color: verdictColor }}>{diffDisplay}</span>
                                <span style={{ fontFamily:'Bebas Neue,cursive', fontSize:'1.1rem', color: verdictColor }}>{verdictText}</span>
                                <span style={{ fontSize:'0.74rem', color:'var(--silver)', opacity:0.655 }}>(gave {totalA.toLocaleString()} / received {totalB.toLocaleString()})</span>
                            </div>
                            {otherOwnerId && (
                                <div style={{ display:'flex', alignItems:'center', gap:'0.5rem', flexWrap:'wrap' }}>
                                    <span style={{ fontSize:'0.72rem', color:'var(--silver)', opacity:0.65 }}>Their posture:</span>
                                    <span className="tc-posture-badge" style={{ color:theirPosture.color, borderColor:theirPosture.color, background:`${theirPosture.color}18` }}>{theirPosture.label}</span>
                                    {otherDnaKey !== 'NONE' && <span className="tc-chip tc-chip-dna">{otherDna.label}</span>}
                                </div>
                            )}
                            <div>
                                <div style={{ fontSize:'0.72rem', color:'var(--silver)', opacity:0.65, textTransform:'uppercase', letterSpacing:'0.06em', marginBottom:'0.35rem' }}>Psychological Tax Breakdown {React.createElement(Tip, null, 'Each owner\'s DNA type creates psychological modifiers that affect trade acceptance beyond pure value. Taxes reduce likelihood, bonuses increase it. Factors: endowment effect, panic premium, status tax, loss aversion, rebuilding discount, need fulfillment, window alignment, and posture.')}</div>
                                <div className="tc-tax-table">
                                    {psychTaxes.map((t,i) => (
                                        <div key={i} className={`tc-tax-table-row ${t.type === 'BONUS' ? 'tc-bonus' : 'tc-tax'}`}>
                                            <span className="tc-tax-name">{t.name}</span>
                                            <span className="tc-tax-desc">{t.desc}</span>
                                            <span className="tc-tax-val" style={{ color: t.impact > 0 ? 'var(--win-green)' : 'var(--loss-red)' }}>{t.impact > 0 ? '+' : ''}{t.impact}</span>
                                        </div>
                                    ))}
                                    {grudgeTax.total !== 0 && (
                                        <div className={`tc-tax-table-row ${grudgeTax.total < 0 ? 'tc-tax' : 'tc-bonus'}`}>
                                            <span className="tc-tax-name">Grudge Tax</span>
                                            <span className="tc-tax-desc">{grudgeTax.entries.length} logged interaction{grudgeTax.entries.length!==1?'s':''}</span>
                                            <span className="tc-tax-val" style={{ color: grudgeTax.total < 0 ? 'var(--loss-red)' : 'var(--win-green)' }}>{grudgeTax.total > 0 ? '+' : ''}{grudgeTax.total}</span>
                                        </div>
                                    )}
                                    <div className="tc-tax-table-row tc-total">
                                        <span className="tc-tax-name">NET MODIFIER</span>
                                        <span className="tc-tax-desc">Applied to base likelihood</span>
                                        <span className="tc-tax-val" style={{ color: netTaxTotal > 0 ? 'var(--win-green)' : netTaxTotal < 0 ? 'var(--loss-red)' : 'var(--silver)' }}>{netTaxTotal > 0 ? '+' : ''}{netTaxTotal}</span>
                                    </div>
                                </div>
                            </div>
                            {otherDnaKey !== 'NONE' && otherDna.strategy && (
                                <div style={{ fontSize:'0.76rem', color:otherDna.color, fontStyle:'italic', background:`${otherDna.color}0d`, border:`1px solid ${otherDna.color}25`, borderRadius:5, padding:'0.4rem 0.6rem' }}>Approach: {otherDna.strategy}</div>
                            )}
                            <div>
                                <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between', marginBottom:'0.3rem' }}>
                                    <span style={{ fontSize:'0.76rem', color:'var(--silver)', opacity:0.7, textTransform:'uppercase', letterSpacing:'0.06em' }}>Likelihood of Acceptance {React.createElement(Tip, null, 'Estimated chance the other owner accepts. Starts at 50%, adjusted by: value difference, DNA type multiplier, psychological taxes, and posture. Each DNA type has different thresholds.')}</span>
                                    <span style={{ fontFamily:'Bebas Neue,cursive', fontSize:'1.4rem', color: likelihoodColor }}>{likelihood}%</span>
                                </div>
                                <div className="tc-likelihood-bar-wrap"><div className="tc-likelihood-bar-fill" style={{ width:`${likelihood}%`, background: likelihoodColor }} /></div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ── renderTradeInbox (must be inside TradeCalcTab for scope access) ──
        function renderTradeInbox() {
            const recentTrades = (() => {
                // Use LI trade history which has pre-analyzed data, or fall back to window.S.transactions
                const txns = (window.App?.LI?.tradeHistory || []).slice(0, 20);
                if (txns.length) {
                    return txns.map((trade, idx) => {
                        const rids = trade.roster_ids || [];
                        const [rid1, rid2] = rids;
                        const s1 = trade.sides?.[rid1] || { players:[], picks:[], totalValue:0 };
                        const s2 = trade.sides?.[rid2] || { players:[], picks:[], totalValue:0 };
                        const val1 = s1.totalValue || s1.players?.reduce((s,pid) => s + (getPlayerValue(pid).value||0), 0) || 0;
                        const val2 = s2.totalValue || s2.players?.reduce((s,pid) => s + (getPlayerValue(pid).value||0), 0) || 0;
                        const diff = val1 - val2;
                        const maxVal = Math.max(val1, val2, 1);
                        const pctDiff = Math.round(Math.abs(diff) / maxVal * 100);
                        const grade = pctDiff <= 5 ? 'A' : pctDiff <= 12 ? 'B+' : pctDiff <= 20 ? 'B' : pctDiff <= 30 ? 'C' : pctDiff <= 40 ? 'D' : 'F';
                        const gradeCol = grade.startsWith('A') ? 'var(--win-green)' : grade.startsWith('B') ? '#F0A500' : 'var(--loss-red)';
                        return { idx, trade, rids, sides: {[rid1]:s1,[rid2]:s2}, rid1, rid2, val1, val2, diff, grade, gradeCol, pctDiff };
                    });
                }
                return [];
            })();

            const pn = pid => playersData[pid]?.full_name || pid;

            return (
                <div>
                    <div style={{ fontSize:'0.76rem', color:'var(--silver)', opacity:0.655, marginBottom:'0.75rem', lineHeight:1.5 }}>
                        Recent trades analyzed with DHQ values and fairness grades.
                    </div>
                    {recentTrades.length === 0 ? (
                        <div style={{ color:'var(--silver)', textAlign:'center', padding:'2rem', opacity:0.65 }}>No trade history found. DHQ engine needs to load league intel first.</div>
                    ) : recentTrades.map(t => {
                        const name1 = ownerNameForRosterId(t.rid1) || 'Team ' + t.rid1;
                        const name2 = ownerNameForRosterId(t.rid2) || 'Team ' + t.rid2;
                        const s1 = t.sides[t.rid1] || { players:[], picks:[] };
                        const s2 = t.sides[t.rid2] || { players:[], picks:[] };
                        const winner = t.diff > t.val1 * 0.05 ? name1 : t.diff < -t.val2 * 0.05 ? name2 : null;

                        return (
                            <div key={t.idx} style={{ background:'rgba(255,255,255,0.02)', border:'1px solid rgba(212,175,55,0.15)', borderRadius:'8px', padding:'0.75rem', marginBottom:'0.6rem' }}>
                                <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'0.5rem' }}>
                                    <div style={{ display:'flex', alignItems:'center', gap:'0.5rem' }}>
                                        <span style={{ fontFamily:'Bebas Neue,cursive', fontSize:'1.2rem', color:t.gradeCol }}>{t.grade}</span>
                                        <span style={{ fontSize:'0.72rem', color:'var(--silver)', opacity:0.65 }}>{t.pctDiff}% variance</span>
                                        {winner && <span style={{ fontSize:'0.7rem', color:'var(--win-green)', fontWeight:700 }}>{winner} wins</span>}
                                    </div>
                                    <span style={{ fontSize:'0.78rem', color:'var(--silver)', opacity:0.6 }}>
                                        {t.trade.season ? 'S'+t.trade.season+(t.trade.week?' W'+t.trade.week:'') : ''}
                                    </span>
                                </div>
                                <div style={{ display:'grid', gridTemplateColumns:'1fr auto 1fr', gap:'0.5rem', alignItems:'start' }}>
                                    <div>
                                        <div style={{ fontSize:'0.72rem', color:'var(--gold)', fontWeight:700, marginBottom:'0.25rem' }}>{name1} ({t.val1.toLocaleString()})</div>
                                        {(s1.players||[]).map(pid => <div key={pid} style={{ fontSize:'0.78rem', color:'var(--white)' }}>{pn(pid)} <span style={{color:'var(--silver)',fontSize:'0.72rem'}}>{(getPlayerValue(pid).value||0).toLocaleString()}</span></div>)}
                                        {(s1.picks||[]).map((pk,i) => <div key={'p'+i} style={{ fontSize:'0.78rem', color:'var(--gold)' }}>{pk.season||pk.year} R{pk.round}</div>)}
                                    </div>
                                    <div style={{ fontSize:'1rem', color:'var(--gold)', alignSelf:'center', fontWeight:700 }}>&#8644;</div>
                                    <div>
                                        <div style={{ fontSize:'0.72rem', color:'var(--gold)', fontWeight:700, marginBottom:'0.25rem' }}>{name2} ({t.val2.toLocaleString()})</div>
                                        {(s2.players||[]).map(pid => <div key={pid} style={{ fontSize:'0.78rem', color:'var(--white)' }}>{pn(pid)} <span style={{color:'var(--silver)',fontSize:'0.72rem'}}>{(getPlayerValue(pid).value||0).toLocaleString()}</span></div>)}
                                        {(s2.picks||[]).map((pk,i) => <div key={'p'+i} style={{ fontSize:'0.78rem', color:'var(--gold)' }}>{pk.season||pk.year} R{pk.round}</div>)}
                                    </div>
                                </div>
                            </div>
                        );
                    })}
                </div>
            );
        }

        // ── Main render ──
        // ── Command mode: concise intelligence briefing ──
        if (viewMode === 'command') {
            const topTargets = assessments.filter(a => a.rosterId !== myRosterId).sort((a,b) => {
                const ca = calcComplementarity(myAssessment, a);
                const cb = calcComplementarity(myAssessment, b);
                return cb - ca;
            }).slice(0, 3);

            return (
                <div style={{ padding: '20px 24px', maxWidth: '1000px', margin: '0 auto' }} className="wr-fade-in">
                    <div style={{ fontFamily: 'Bebas Neue, cursive', fontSize: '1.8rem', color: 'var(--gold)', letterSpacing: '0.05em', marginBottom: '4px' }}>INTELLIGENCE BRIEFING</div>
                    <div style={{ fontSize: '0.78rem', color: 'var(--silver)', opacity: 0.6, marginBottom: '24px' }}>Top trade opportunities based on owner psychology and roster fit</div>

                    {/* Top 3 trade partners with reasoning */}
                    {topTargets.map((target, i) => {
                        const dk = ownerDna[target.ownerId] || 'NONE';
                        const dna = DNA_TYPES[dk] || DNA_TYPES.NONE;
                        const posture = calcOwnerPosture(target, dk);
                        const compat = myAssessment ? calcComplementarity(myAssessment, target) : 0;
                        const theirNeeds = target.needs?.slice(0, 2).map(n => n.pos).join(', ') || 'none';
                        const yourSurplus = myAssessment?.strengths?.filter(s => target.needs?.some(n => n.pos === s)) || [];

                        return <div key={i} style={{ background: 'var(--black)', border: '2px solid rgba(212,175,55,0.25)', borderLeft: '4px solid ' + (dna.color || 'var(--gold)'), borderRadius: '10px', padding: '16px 20px', marginBottom: '12px' }}>
                            <div style={{ display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '8px' }}>
                                <span style={{ fontFamily: 'Bebas Neue', fontSize: '1.3rem', color: 'var(--white)' }}>{target.ownerName}</span>
                                <span style={{ fontSize: '0.74rem', fontWeight: 700, color: dna.color, background: dna.color + '15', padding: '2px 8px', borderRadius: '4px' }}>{dna.label}</span>
                                <span style={{ fontSize: '0.74rem', color: posture.color }}>{posture.label}</span>
                                <span style={{ marginLeft: 'auto', fontFamily: 'Bebas Neue', fontSize: '1.1rem', color: compat >= 50 ? '#2ECC71' : compat >= 30 ? '#F0A500' : 'var(--silver)' }}>{compat}% fit</span>
                            </div>
                            <div style={{ fontSize: '0.82rem', color: 'var(--silver)', lineHeight: 1.6, marginBottom: '8px' }}>
                                Needs <strong style={{ color: '#E74C3C' }}>{theirNeeds}</strong>
                                {yourSurplus.length > 0 && <span> \u2014 you have surplus at <strong style={{ color: '#2ECC71' }}>{yourSurplus.join(', ')}</strong></span>}
                                . {dna.strategy ? <em style={{ color: dna.color, opacity: 0.8 }}>{dna.strategy.split('.')[0]}.</em> : ''}
                            </div>
                            <div style={{ display: 'flex', gap: '6px' }}>
                                <span style={{ fontSize: '0.74rem', color: 'var(--silver)', opacity: 0.5 }}>{target.healthScore} health \u00B7 {target.wins}-{target.losses} \u00B7 {target.tier}</span>
                            </div>
                        </div>;
                    })}

                    {topTargets.length === 0 && <div style={{ color: 'var(--silver)', textAlign: 'center', padding: '2rem' }}>Loading team assessments...</div>}
                    <div style={{ textAlign: 'center', padding: '16px', fontSize: '0.78rem', color: 'var(--silver)', opacity: 0.4 }}>Switch to Analyst view for full owner profiles, trade calculator, and history</div>
                </div>
            );
        }

        // ── Analyst mode: full intelligence terminal ──
        return (
            <div style={{ padding: '16px' }}>
                <div style={{ fontFamily: 'Bebas Neue, cursive', fontSize: '1.6rem', color: 'var(--gold)', marginBottom: '4px' }}>LEAGUE INTELLIGENCE</div>
                <div style={{ display: 'flex', gap: '6px', marginBottom: '16px' }}>
                    {['dna','finder','analyzer','audit','inbox'].map(tab => (
                        <button key={tab} onClick={() => setTcTab(tab)} style={{
                            padding: '6px 14px', fontSize: '0.78rem', fontFamily: 'Oswald',
                            textTransform: 'uppercase', letterSpacing: '0.04em',
                            background: tcTab === tab ? 'var(--gold)' : 'rgba(255,255,255,0.04)',
                            color: tcTab === tab ? 'var(--black)' : 'var(--silver)',
                            border: '1px solid ' + (tcTab === tab ? 'var(--gold)' : 'rgba(255,255,255,0.08)'),
                            borderRadius: '4px', cursor: 'pointer'
                        }}>{({dna:'Owner Profiles',finder:'Trade Finder',analyzer:'Deal Analyzer',inbox:'Trade History',audit:'Roster Audit'})[tab]}</button>
                    ))}
                </div>
                {tcTab === 'audit' && renderAudit()}
                {tcTab === 'dna' && renderOwnerDna()}
                {tcTab === 'analyzer' && renderTradeAnalyzer()}
                {tcTab === 'finder' && React.createElement(TradeFinderTab, { allRosters, myRosterId, assessments, ownerDna, playersData, picksByOwner, getPlayerValue, getPickValue, calcOwnerPosture, calcPsychTaxes, calcAcceptanceLikelihood: window.App?.calcAcceptanceLikelihood || function(){return 50;}, DNA_TYPES })}
                {tcTab === 'inbox' && renderTradeInbox()}
            </div>
        );
    }

    // ══════════════════════════════════════════════════════════════════════════
    // END TRADE CALCULATOR TAB
    // ══════════════════════════════════════════════════════════════════════════

    // ══════════════════════════════════════════════════════════════════════════
    // FREE AGENCY TAB — migrated from free-agency.html
    // ══════════════════════════════════════════════════════════════════════════
    function FreeAgencyTab({ playersData, statsData, myRoster, currentLeague, sleeperUserId, timeRecomputeTs, viewMode }) {
        const [faTargets, setFaTargets] = useState([]);
        const [faFilter, setFaFilter] = useState('');
        const [faBudget, setFaBudget] = useState({ total: 0, spent: 0 });
        const [faSort, setFaSort] = useState({ key: 'dhq', dir: -1 });
        const [faSelectedPid, setFaSelectedPid] = useState(null);

        function normPos(pos) {
            if (!pos) return null;
            if (['DB','CB','S','SS','FS'].includes(pos)) return 'DB';
            if (['DL','DE','DT','NT','IDL','EDGE'].includes(pos)) return 'DL';
            if (['LB','OLB','ILB','MLB'].includes(pos)) return 'LB';
            return pos;
        }

        function calcRawPts(s) {
            if (!s) return 0;
            const scoring = currentLeague?.scoring_settings;
            if (scoring) {
                let total = 0;
                for (const [field, weight] of Object.entries(scoring)) {
                    if (typeof weight !== 'number') continue;
                    if (s[field] != null) total += Number(s[field]) * weight;
                }
                return total;
            }
            return Number(s.pts_half_ppr ?? s.pts_ppr ?? s.pts_std ?? 0);
        }

        // Load FA targets from Supabase/localStorage
        useEffect(() => {
            if (window.OD?.loadTargets) {
                window.OD.loadTargets(currentLeague.league_id || currentLeague.id).then(data => {
                    if (data) { setFaTargets(data.targets || []); setFaBudget({ total: data.startingBudget || 200, spent: 0 }); }
                }).catch(() => {});
            }
        }, []);

        // Find available (unrostered) players
        const rostered = useMemo(() => {
            const set = new Set();
            (currentLeague.rosters || []).forEach(r => (r.players || []).concat(r.taxi || [], r.reserve || []).forEach(pid => set.add(String(pid))));
            return set;
        }, [currentLeague]);

        const availablePlayers = useMemo(() => {
            return Object.entries(playersData)
                .filter(([pid, p]) => !rostered.has(pid) && p.team && p.status !== 'Inactive' && p.status !== 'Retired' && p.active !== false)
                .map(([pid, p]) => ({ pid, p, dhq: window.App?.LI?.playerScores?.[pid] || 0, pos: normPos(p.position) || p.position }))
                .sort((a, b) => b.dhq - a.dhq)
                .slice(0, 300);
        }, [playersData, rostered, timeRecomputeTs]);

        const posColors = {QB:'#E74C3C',RB:'#2ECC71',WR:'#3498DB',TE:'#F0A500',K:'#9B59B6',DL:'#E67E22',LB:'#1ABC9C',DB:'#E91E63'};

        function faSortIndicator(key) { return faSort.key === key ? (faSort.dir === -1 ? ' \u25BC' : ' \u25B2') : ''; }
        function handleFaSort(key) { setFaSort(prev => prev.key === key ? { ...prev, dir: prev.dir * -1 } : { key, dir: -1 }); }

        // Sort filtered results
        const sortedPlayers = useMemo(() => {
            const filtered = availablePlayers.filter(x => !faFilter || (normPos(x.p.position) === faFilter || x.p.position === faFilter));
            return filtered.sort((a, b) => {
                const dir = faSort.dir;
                const k = faSort.key;
                if (k === 'name') {
                    const na = (a.p.full_name || ((a.p.first_name || '') + ' ' + (a.p.last_name || '')).trim()).toLowerCase();
                    const nb = (b.p.full_name || ((b.p.first_name || '') + ' ' + (b.p.last_name || '')).trim()).toLowerCase();
                    return dir * na.localeCompare(nb);
                }
                if (k === 'pos') return dir * ((normPos(a.p.position) || '').localeCompare(normPos(b.p.position) || ''));
                if (k === 'age') return dir * ((a.p.age || 0) - (b.p.age || 0));
                if (k === 'dhq') return dir * (a.dhq - b.dhq);
                if (k === 'ppg') {
                    const sa = statsData[a.pid] || {}; const sb = statsData[b.pid] || {};
                    const pa = sa.gp > 0 ? calcRawPts(sa) / sa.gp : 0;
                    const pb = sb.gp > 0 ? calcRawPts(sb) / sb.gp : 0;
                    return dir * (pa - pb);
                }
                if (k === 'team') return dir * ((a.p.team || '').localeCompare(b.p.team || ''));
                if (k === 'trend') {
                    const ta = window.App?.LI?.playerTrends?.[a.pid] || 0;
                    const tb = window.App?.LI?.playerTrends?.[b.pid] || 0;
                    return dir * (ta - tb);
                }
                if (k === 'peak') {
                    const pa2 = window.App?.LI?.playerPeaks?.[a.pid] || 0;
                    const pb2 = window.App?.LI?.playerPeaks?.[b.pid] || 0;
                    return dir * (pa2 - pb2);
                }
                if (k === 'exp') return dir * ((a.p.years_exp || 0) - (b.p.years_exp || 0));
                if (k === 'injury') return dir * ((a.p.injury_status || '').localeCompare(b.p.injury_status || ''));
                return 0;
            }).slice(0, 50);
        }, [availablePlayers, faFilter, faSort, statsData]);

        const faGridCols = '28px 1fr 36px 32px 54px 42px 42px 42px 36px 42px';
        const faHeaderStyle = { fontSize: '0.78rem', fontWeight: 700, color: 'var(--gold)', fontFamily: 'Oswald', textTransform: 'uppercase', letterSpacing: '0.04em', cursor: 'pointer', userSelect: 'none' };

        // Compute roster needs for recommendations
        const assess = useMemo(() => typeof window.assessTeamFromGlobal === 'function' ? window.assessTeamFromGlobal(myRoster?.roster_id) : null, [myRoster]);
        const peaks = {QB:[27,33],RB:[22,26],WR:[24,29],TE:[25,30],DL:[24,29],LB:[23,28],DB:[24,29]};
        const budget = currentLeague?.settings?.waiver_budget || myRoster?.settings?.waiver_budget || 0;
        const spent = myRoster?.settings?.waiver_budget_used || 0;
        const remaining = Math.max(0, budget - spent);
        const hasFAAB = budget > 0;

        // Smart FAAB recommendation
        function faabSuggest(dhq, pos) {
            if (!hasFAAB || dhq <= 0) return null;
            const base = Math.round(dhq / 250);
            const cap = Math.round(remaining * 0.15);
            const sug = Math.max(1, Math.min(cap, base));
            const lo = Math.max(1, Math.round(sug * 0.7));
            const hi = Math.min(remaining, Math.round(sug * 1.4));
            // Competition: count teams with deficit at this position
            let competitors = 0;
            if (assess && currentLeague.rosters) {
                const reqCount = (currentLeague.roster_positions || []).filter(s => normPos(s) === pos || s === 'FLEX' || s === 'SUPER_FLEX').length;
                currentLeague.rosters.forEach(r => {
                    if (r.roster_id === myRoster?.roster_id) return;
                    const cnt = (r.players || []).filter(pid => normPos(playersData[pid]?.position) === pos).length;
                    if (cnt < reqCount) competitors++;
                });
            }
            const conf = competitors <= 1 ? 'Low competition' : competitors <= 3 ? 'Moderate' : 'High demand';
            const confCol = competitors <= 1 ? '#2ECC71' : competitors <= 3 ? '#F0A500' : '#E74C3C';
            return { sug, lo, hi, conf, confCol, competitors };
        }

        // Top recommendations at weak positions
        const recommendations = useMemo(() => {
            if (!assess?.needs?.length) return [];
            const needPositions = assess.needs.slice(0, 3).map(n => n.pos);
            return availablePlayers
                .filter(x => needPositions.includes(x.pos) && x.dhq > 500)
                .slice(0, 8)
                .map(x => {
                    const st = statsData[x.pid] || {};
                    const ppg = st.gp > 0 ? +(calcRawPts(st) / st.gp).toFixed(1) : 0;
                    const need = assess.needs.find(n => n.pos === x.pos);
                    const [, pHi] = peaks[x.pos] || [24, 29];
                    const peakYrs = Math.max(0, pHi - (x.p.age || 25));
                    const faab = faabSuggest(x.dhq, x.pos);
                    return { ...x, ppg, need, peakYrs, faab };
                });
        }, [availablePlayers, assess, statsData]);

        // Selected player detail
        const selPlayer = faSelectedPid ? playersData[faSelectedPid] : null;
        const selStats = faSelectedPid ? statsData[faSelectedPid] || {} : {};
        const selDhq = faSelectedPid ? (window.App?.LI?.playerScores?.[faSelectedPid] || 0) : 0;
        const selMeta = faSelectedPid ? (window.App?.LI?.playerMeta?.[faSelectedPid] || {}) : {};
        const selPpg = selStats.gp > 0 ? +(calcRawPts(selStats) / selStats.gp).toFixed(1) : 0;
        const selPos = selPlayer ? normPos(selPlayer.position) : '';
        const selPeaks = peaks[selPos] || [24,29];
        const selPeakYrs = selPlayer ? Math.max(0, selPeaks[1] - (selPlayer.age || 25)) : 0;
        const selFaab = faSelectedPid ? faabSuggest(selDhq, selPos) : null;
        const selInitials = selPlayer ? ((selPlayer.first_name||'?')[0] + (selPlayer.last_name||'?')[0]).toUpperCase() : '';

        return (
            <div style={{ padding: '20px 24px', maxWidth: '1400px', margin: '0 auto' }} className="wr-fade-in">
                <div style={{ fontFamily: 'Bebas Neue, cursive', fontSize: '1.8rem', color: 'var(--gold)', marginBottom: '4px', letterSpacing: '0.05em' }}>FREE AGENCY</div>
                <div style={{ fontSize: '0.78rem', color: 'var(--silver)', opacity: 0.6, marginBottom: '20px' }}>Market evaluation and FAAB strategy planning</div>

                {/* ── TOP: FAAB + Position Needs Grid ── */}
                <div style={{ display: 'grid', gridTemplateColumns: hasFAAB ? '200px 1fr' : '1fr', gap: '16px', marginBottom: '24px' }}>
                    {/* FAAB gauge */}
                    {hasFAAB && <div style={{ background: 'var(--black)', border: '2px solid rgba(212,175,55,0.3)', borderRadius: '12px', padding: '16px', textAlign: 'center' }}>
                        {typeof MiniDonut !== 'undefined' && React.createElement(MiniDonut, { value: Math.round(remaining / Math.max(1, budget) * 100), size: 80, label: 'FAAB' })}
                        <div style={{ fontFamily: 'Bebas Neue', fontSize: '1.6rem', color: remaining > budget * 0.5 ? '#2ECC71' : remaining > budget * 0.25 ? '#F0A500' : '#E74C3C', marginTop: '8px' }}>{'$' + remaining}</div>
                        <div style={{ fontSize: '0.76rem', color: 'var(--silver)' }}>of ${budget} remaining</div>
                    </div>}

                    {/* Position Needs */}
                    {assess && <div style={{ background: 'var(--black)', border: '1px solid rgba(212,175,55,0.2)', borderRadius: '12px', padding: '16px' }}>
                        <div style={{ fontFamily: 'Bebas Neue', fontSize: '1rem', color: 'var(--gold)', letterSpacing: '0.08em', marginBottom: '10px' }}>ROSTER NEEDS</div>
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(90px, 1fr))', gap: '8px' }}>
                            {Object.entries(assess.posAssessment || {}).sort((a,b) => {
                                const ord = {deficit:0, thin:1, ok:2, surplus:3};
                                return (ord[a[1].status]||2) - (ord[b[1].status]||2);
                            }).map(([pos, data]) => {
                                const status = data.status || 'ok';

                                    <div style={{ flex: 1, overflow: 'hidden' }}>

                                    {r.faab && <span style={{ fontSize: '0.72rem', fontWeight: 700, color: 'var(--gold)', background: 'rgba(212,175,55,0.1)', padding: '1px 6px', borderRadius: '3px' }}>{'$' + r.faab.lo + '-' + r.faab.hi}</span>}
                                    {r.faab && <span style={{ fontSize: '0.68rem', color: r.faab.confCol }}>{r.faab.conf}</span>}

                {/* ── POSITION FILTER + FULL LIST (Analyst only, or always if no recs) ── */}

                {/* Command mode hint */}

                        <div style={{ fontFamily: 'Bebas Neue', fontSize: '1.8rem', color: 'var(--gold)' }}>{'$' + selFaab.lo + ' \u2013 $' + selFaab.hi}</div>
                        <div style={{ fontSize: '0.78rem', color: 'var(--silver)', marginTop: '4px' }}>Suggested: <strong style={{ color: 'var(--white)' }}>{'$' + selFaab.sug}</strong> of ${remaining} remaining</div>
                        <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginTop: '6px' }}>
                            <span style={{ width: '8px', height: '8px', borderRadius: '50%', background: selFaab.confCol }} />
                            <span style={{ fontSize: '0.78rem', color: selFaab.confCol, fontWeight: 600 }}>{selFaab.conf}</span>
                            <span style={{ fontSize: '0.74rem', color: 'var(--silver)', opacity: 0.6 }}>{selFaab.competitors} other team{selFaab.competitors !== 1 ? 's' : ''} need {selPos}</span>
                        </div>
                    </div>}

                    {/* Roster Fit */}
                    {assess && (() => {

                        return <div style={{ background: 'rgba(255,255,255,0.02)', border: '1px solid rgba(255,255,255,0.06)', borderRadius: '10px', padding: '14px', marginBottom: '16px' }}>
                            <div style={{ fontFamily: 'Oswald', fontSize: '0.82rem', color: 'var(--silver)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: '6px' }}>ROSTER FIT</div>
                            {need && <div style={{ fontSize: '0.82rem', color: '#2ECC71', fontWeight: 600, marginBottom: '4px' }}>Fills {selPos} {need.urgency}</div>}
                            {strength && <div style={{ fontSize: '0.82rem', color: 'var(--silver)', opacity: 0.7, marginBottom: '4px' }}>You already have {selPos} surplus — stash only</div>}

                            <div style={{ fontSize: '0.76rem', color: 'var(--silver)', opacity: 0.6 }}>
                                {selPeakYrs >= 4 ? 'Long dynasty window — buy low candidate' : selPeakYrs >= 1 ? 'In production window — immediate contributor' : 'Past peak — short-term rental only'}
                            </div>
                        </div>;
                    })()}

                    {/* Season Stats */}
                    {selStats.gp > 0 && <div style={{ marginBottom: '16px' }}>
                        <div style={{ fontFamily: 'Oswald', fontSize: '0.82rem', color: 'var(--silver)', textTransform: 'uppercase', letterSpacing: '0.06em', marginBottom: '8px' }}>SEASON STATS</div>
                        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '6px' }}>
                            {[
                                ['Games', selStats.gp],
                                ['Total Pts', selStats.pts_half_ppr ? Math.round(selStats.pts_half_ppr) : Math.round(calcRawPts(selStats))],
                                ['PPG', selPpg],
                                selStats.pass_yd ? ['Pass Yds', Math.round(selStats.pass_yd).toLocaleString()] : selStats.rush_yd ? ['Rush Yds', Math.round(selStats.rush_yd).toLocaleString()] : selStats.rec ? ['Receptions', selStats.rec] : null,
                                selStats.pass_td ? ['Pass TD', selStats.pass_td] : selStats.rush_td ? ['Rush TD', selStats.rush_td] : selStats.rec_td ? ['Rec TD', selStats.rec_td] : null,

    // ══════════════════════════════════════════════════════════════════════════
    // DRAFT TAB — migrated from draft-warroom.html
    // ══════════════════════════════════════════════════════════════════════════
    function DraftTab({ playersData, statsData, myRoster, currentLeague, sleeperUserId, setReconPanelOpen, sendReconMessage, timeRecomputeTs }) {
        const leagueSeason = parseInt(currentLeague.season || new Date().getFullYear());
        const draftRounds = currentLeague.settings?.draft_rounds || 5;
        const tradedPicks = window.S?.tradedPicks || [];
        const [draftSort, setDraftSort] = useState({ key: 'dhq', dir: -1 });

        function normPos(pos) {
            if (!pos) return null;
            if (['DB','CB','S','SS','FS'].includes(pos)) return 'DB';
            if (['DL','DE','DT','NT','IDL','EDGE'].includes(pos)) return 'DL';
            if (['LB','OLB','ILB','MLB'].includes(pos)) return 'LB';
            return pos;
        }

        // Build my picks
        const myPicks = useMemo(() => {
            const picks = [];
            for (let yr = leagueSeason; yr <= leagueSeason + 2; yr++) {
                for (let rd = 1; rd <= draftRounds; rd++) {
                    const tradedAway = tradedPicks.find(p => parseInt(p.season) === yr && p.round === rd && p.roster_id === myRoster?.roster_id && p.owner_id !== myRoster?.roster_id);
                    if (!tradedAway) picks.push({ year: yr, round: rd, own: true });
                    const acquired = tradedPicks.filter(p => parseInt(p.season) === yr && p.round === rd && p.owner_id === myRoster?.roster_id && p.roster_id !== myRoster?.roster_id);
                    acquired.forEach(a => picks.push({ year: yr, round: rd, own: false, from: a.roster_id }));
                }
            }
            return picks;
        }, [tradedPicks, myRoster]);

        // Find rookies — fixed filter to handle missing years_exp
        const rookies = useMemo(() => {
            return Object.entries(playersData)
                .filter(([pid, p]) => {
                    const exp = p.years_exp;
                    const isRookie = exp === 0 || exp === null || exp === undefined;
                    const hasValue = (window.App?.LI?.playerScores?.[pid] || 0) > 0;
                    const hasName = p.full_name || p.first_name || p.last_name;
                    return isRookie && hasName && (hasValue || p.team);
                })
                .map(([pid, p]) => ({ pid, p, dhq: window.App?.LI?.playerScores?.[pid] || 0 }))
                .sort((a, b) => b.dhq - a.dhq);
        }, [playersData, timeRecomputeTs]);

        const posColors = {QB:'#E74C3C',RB:'#2ECC71',WR:'#3498DB',TE:'#F0A500',K:'#9B59B6',DL:'#E67E22',LB:'#1ABC9C',DB:'#E91E63'};

        function draftSortIndicator(key) { return draftSort.key === key ? (draftSort.dir === -1 ? ' \u25BC' : ' \u25B2') : ''; }
        function handleDraftSort(key) { setDraftSort(prev => prev.key === key ? { ...prev, dir: prev.dir * -1 } : { key, dir: -1 }); }

        const sortedRookies = useMemo(() => {
            return rookies.slice().sort((a, b) => {
                const dir = draftSort.dir;
                const k = draftSort.key;
                if (k === 'name') {
                    const na = (a.p.full_name || ((a.p.first_name || '') + ' ' + (a.p.last_name || '')).trim()).toLowerCase();
                    const nb = (b.p.full_name || ((b.p.first_name || '') + ' ' + (b.p.last_name || '')).trim()).toLowerCase();
                    return dir * na.localeCompare(nb);
                }
                if (k === 'pos') return dir * ((normPos(a.p.position) || '').localeCompare(normPos(b.p.position) || ''));
                if (k === 'age') return dir * ((a.p.age || 0) - (b.p.age || 0));
                if (k === 'dhq') return dir * (a.dhq - b.dhq);
                if (k === 'college') return dir * ((a.p.college || a.p.metadata?.college || '').localeCompare(b.p.college || b.p.metadata?.college || ''));
                return 0;
            }).slice(0, 50);
        }, [rookies, draftSort]);

        const draftGridCols = '24px 28px 1fr 36px 32px 54px 60px';
        const draftHeaderStyle = { fontSize: '0.78rem', fontWeight: 700, color: 'var(--gold)', fontFamily: 'Oswald', textTransform: 'uppercase', letterSpacing: '0.04em', cursor: 'pointer', userSelect: 'none' };

        return (
            React.createElement('div', { style: { padding: '16px' } },

        // ── PROJECTION ENGINE: derive future player values from aging curves ──
        function projectPlayerValue(pid, baseDhq, baseAge, pos, delta) {
            if (!baseDhq || baseDhq <= 0 || delta === 0) return baseDhq;
            const peakWindows = window.App?.peakWindows || {QB:[24,34],RB:[22,27],WR:[22,30],TE:[23,30],DL:[23,29],LB:[23,28],DB:[23,29]};
            const decayRates = window.App?.decayRates || {QB:0.06,RB:0.25,WR:0.14,TE:0.12,DL:0.15,LB:0.15,DB:0.14};
            const nPos = pos === 'DE' || pos === 'DT' ? 'DL' : pos === 'CB' || pos === 'S' ? 'DB' : pos === 'OLB' || pos === 'ILB' ? 'LB' : pos;
            const [pLo, pHi] = peakWindows[nPos] || [24, 29];
            const decay = decayRates[nPos] || 0.12;
            const projAge = (baseAge || 25) + delta;
            let val = baseDhq;

            if (delta > 0) {
                // Future: apply year-by-year aging
                for (let yr = 1; yr <= delta; yr++) {
                    const ageAtYr = (baseAge || 25) + yr;
                    if (ageAtYr < pLo - 2) {
                        // Pre-peak rising: young players gain value
                        val *= 1 + (0.08 - decay * 0.3); // slight rise, diminished by position volatility
                    } else if (ageAtYr < pLo) {
                        // Approaching peak: small gain
                        val *= 1.03;
                    } else if (ageAtYr <= pHi) {
                        // In peak window: hold or slight decline
                        val *= (1 - decay * 0.15);
                    } else {
                        // Past peak: full decay
                        const yearsPast = ageAtYr - pHi;
                        const accel = 1 + yearsPast * 0.1; // accelerating decline
                        val *= (1 - decay * accel);
                    }
                }
            } else {
                // Historical: reverse — younger players had less value
                for (let yr = 1; yr <= Math.abs(delta); yr++) {
                    const ageAtYr = (baseAge || 25) - yr;
                    if (ageAtYr < pLo - 2) {
                        val *= (1 - 0.15); // was worth less when very young
                    } else if (ageAtYr <= pHi) {
                        val *= (1 + decay * 0.1); // was in window, similar value
                    } else {
                        val *= (1 + decay * 0.5); // was worth more when younger past peak
                    }
                }
            }
            return Math.max(0, Math.round(val));
        }

        // ── REACTIVE: when timeYear changes, refetch + recompute everything ──
        useEffect(() => {
            if (!basePlayersData || !Object.keys(basePlayersData).length) return;
            let cancelled = false;
            setTimeLoading(true);

            (async () => {

                    const newStats = await fetchSeasonStats(String(timeYear)).catch(() => ({}));

                    if (baseLI && !baseLI._baseScoresBackup && baseLI.playerScores) {

                        Object.entries(basePlayersData).forEach(([pid, p]) => {

                        // C. Write projected scores to LI.playerScores — THE source all modules read

                                });

                    // 5. Force analytics recompute
                    setAnalyticsData(null);

                    setTimeRecomputeTs(Date.now());

                } catch(e) { console.warn('Time context data load error:', e); }
                if (!cancelled) setTimeLoading(false);
            })();

            return () => { cancelled = true; };
        }, [timeYear, basePlayersData]);

        function computeKpiValue(kpiKey) {
            const LI = window.App?.LI || {};

                    return { value: total.toLocaleString(), sub: 'Total DHQ', color: 'var(--gold)', sparkData: allTotals };

                case 'value-rank': {
                    const vals = (currentLeague.rosters || []).map(r => (r.players || []).reduce((s, pid) => s + (scores[pid] || 0), 0)).sort((a,b) => b - a);
                    const myTotal = myPlayers.reduce((s, pid) => s + (scores[pid] || 0), 0);
                    const rank = vals.findIndex(v => v <= myTotal) + 1;
                    return { value: '#' + (rank || '?') + '/' + standings.length, sub: 'League rank', color: rank <= 3 ? '#2ECC71' : rank <= 6 ? 'var(--gold)' : '#E74C3C' };

                    const hs = ranked?.healthScore || 0;
                    const allHS = rankedTeams.map(t => t.healthScore || 0).sort((a,b) => a-b);
                    return { value: hs || '\u2014', sub: 'Score', color: hs >= 80 ? '#2ECC71' : hs >= 60 ? 'var(--gold)' : '#E74C3C', sparkData: allHS };
                }
                case 'starter-gap': {
                    const analytics = analyticsData || (typeof runLeagueAnalytics === 'function' ? runLeagueAnalytics() : null);
                    const gap = analytics?.roster?.gaps?.find(g => g.severity === 'high') || analytics?.roster?.gaps?.[0];

                    window.S.leagueUsers = currentLeague.users || [];

        async function switchYear(year) {
            if (year === activeYear) return;
            setLoading(true);
            setError(null);
            setActiveYear(year);
            try {
                const targetYear = parseInt(year);
                const currentYear = parseInt(activeYear);
                let targetLeagueId = null;

                if (targetYear < currentYear) {
                    // Going backward: walk previous_league_id chain
                    let leagueId = currentLeague.id;
                    for (let y = currentYear; y > targetYear && leagueId; y--) {
                        const leagueInfo = await fetchLeagueInfo(leagueId);
                        leagueId = leagueInfo?.previous_league_id || null;
                    }
                    targetLeagueId = leagueId;
                } else {
                    // Going forward: get user leagues for target year, then check which one chains back to current league
                    const userLeagues = await fetchUserLeagues(sleeperUserId, year);
                    for (const lg of userLeagues) {
                        // Walk this league's previous_league_id chain to see if it connects to our current league
                        let checkId = lg.previous_league_id;
                        let steps = targetYear - currentYear;
                        while (steps > 1 && checkId) {
                            const info = await fetchLeagueInfo(checkId);
                            checkId = info?.previous_league_id || null;
                            steps--;
                        }
                        if (checkId === currentLeague.id) {
                            targetLeagueId = lg.league_id;
                            break;
                        }
                    }
                    // Fallback: match by name if chain doesn't connect
                    if (!targetLeagueId) {
                        const nameMatch = userLeagues.find(l => l.name === currentLeague.name);
                        targetLeagueId = nameMatch ? nameMatch.league_id : (userLeagues[0] ? userLeagues[0].league_id : null);
                    }
                }

                if (!targetLeagueId) {
                    setError('No leagues found for ' + year);
                    setLoading(false);
                    return;
                }

                const [leagueInfo, rosters, users] = await Promise.all([
                    fetchLeagueInfo(targetLeagueId),
                    fetchLeagueRosters(targetLeagueId),
                    fetchLeagueUsers(targetLeagueId)
                ]);
                setViewingOwnerId(sleeperUserId);
                setCurrentLeague({
                    id: targetLeagueId,
                    name: leagueInfo.name,
                    season: year,
                    scoring_settings: leagueInfo.scoring_settings || {},
                    roster_positions: leagueInfo.roster_positions || [],
                    settings: leagueInfo.settings || {},
                    rosters,
                    users
                });
            } catch (err) {
                console.error('Failed to switch year:', err);
                setError('Failed to load ' + year + ' data');
                setLoading(false);
            }
        }

        function getPlayerName(playerId) {

        // Compute fantasy pts using the league's actual scoring_settings weights,
        // applied to raw stat fields — works for both offensive and IDP players.
        // Mirrors the Team Comps page's fantasyPointsFromScoring() approach:
        // always use scoring_settings when available so IDP defensive stats aren't
        // silently zeroed out by Sleeper's pre-calculated pts_half_ppr = 0.
        function calcRawPts(s) {
            if (!s) return null;
            const scoring = currentLeague?.scoring_settings;
            if (scoring) {
                let total = 0;
                for (const [field, weight] of Object.entries(scoring)) {
                    if (typeof weight !== 'number') continue;
                    if (s[field] != null) total += Number(s[field]) * weight;
                }
                return total;
            }
            // Fallback: Sleeper's pre-calculated totals (offensive players only)
            const pre = s.pts_half_ppr ?? s.pts_ppr ?? s.pts_std ?? null;
            return pre !== null ? Number(pre) : null;
        }

        function getPlayerStats(playerId) {
            const player = playersData[playerId];
            // Always show STATS_YEAR totals; fall back to current-season data for historical year views
            const s = stats2025Data[playerId] || statsData[playerId];
            const p = projectionsData[playerId];

            // Years of experience
            const yrs = player?.years_exp != null ? player.years_exp : '-';

            // Fantasy points — uses league scoring_settings for IDP players
            const rawPts = calcRawPts(s);
            const pts = rawPts !== null ? Number(rawPts).toFixed(1) : '-';

            // Games played
            const gp = s?.gp != null ? s.gp : '-';

            // Average points per game
            let avg = '-';
            if (rawPts !== null && s?.gp && s.gp > 0) {
                avg = (rawPts / s.gp).toFixed(1);
            }

            // Projected points — use Sleeper projections when available, otherwise 2025 season totals
            const rawProj = p ? (p.pts_half_ppr ?? p.pts_ppr ?? p.pts_std ?? null) : null;
            const rawPts2025 = calcRawPts(stats2025Data[playerId]);
            const proj = rawProj !== null ? Number(rawProj).toFixed(1) : (rawPts2025 !== null ? Number(rawPts2025).toFixed(1) : '-');

            return { yrs, pts, gp, avg, proj };
        }

        function getPositionColor(pos) {
            const colors = { QB: '#FF6B6B', RB: '#4ECDC4', WR: '#45B7D1', TE: '#F7DC6F', K: '#BB8FCE', DEF: '#85929E' };
            return colors[pos] || 'var(--silver)';
        }

        // Dashboard helpers
        function timeAgo(ts) {
            if (!ts) return '';
            // Sleeper API returns seconds; convert to ms. Guard against already-ms values.
            const tsMs = ts > 1e12 ? ts : ts * 1000;
            const diff = Date.now() - tsMs;
            if (diff < 0) return 'just now';
            const mins = Math.floor(diff / 60000);
            if (mins < 1) return 'just now';
            if (mins < 60) return mins + 'm ago';
            const hrs = Math.floor(mins / 60);
            if (hrs < 24) return hrs + 'h ago';
            const days = Math.floor(hrs / 24);
            if (days < 30) return days + 'd ago';
            return Math.floor(days / 30) + 'mo ago';
        }

        function getOwnerName(rosterId) {
            const roster = currentLeague.rosters?.find(r => r.roster_id === rosterId);

            const parts = [];

                parts.push(top.displayName + ' leads the power rankings with a ' + top.healthScore + ' health score and ' + top.wins + '-' + top.losses + ' record.');
                if (myRank && myRank !== 1) {
                    const me = rankedTeams[myRank - 1];
                    parts.push('You sit at #' + myRank + ' (' + me.wins + '-' + me.losses + ') with ' + (me.totalDHQ||0).toLocaleString() + ' total DHQ.');
                } else if (myRank === 1) {
                    parts.push('You hold the top spot in the league.');
                }
            }
            const recentTrade = transactions.find(t => t.type === 'trade');
            if (recentTrade) {
                const addPids = Object.keys(recentTrade.adds || {});
                const names = addPids.slice(0, 2).map(pid => getPlayerName(pid)).filter(Boolean).join(' and ');
                if (names) parts.push('Latest trade: ' + names + ' changed hands between ' + getOwnerName(recentTrade.roster_ids?.[0]) + ' and ' + getOwnerName(recentTrade.roster_ids?.[1]) + '.');
            }
            return parts.join(' ') || 'Welcome to your War Room. League intelligence is loading.';

        // ReconAI: send message
        async function sendReconMessage(text) {
          if (!text?.trim()) return;
          setReconInput('');
          const userMsg = { role: 'user', content: text.trim() };
          setReconMessages(prev => [...prev, userMsg, { role: 'assistant', content: '...' }]);
          try {
            let context = '';
            if (typeof dhqContext === 'function') context = dhqContext(true);
            const messages = [...reconMessages.slice(-4), userMsg].map((m, i, arr) => {
              if (m.role === 'user' && i === arr.length - 1) {
                return { role: 'user', content: context + '\n\n' + m.content };
              }
              if (m.role === 'assistant' && m.content.length > 400) {
                return { role: 'assistant', content: m.content.substring(0, 400) + '...' };
              }
              return m;
            });
            const reply = typeof dhqAI === 'function'
              ? await dhqAI('home-chat', null, null, { messages })
              : typeof callClaude === 'function'
                ? await callClaude(messages)
                : 'AI not available. Add an API key in Settings.';
            setReconMessages(prev => {
              const updated = [...prev];
              updated[updated.length - 1] = { role: 'assistant', content: reply };
              return updated;
            });
          } catch(e) {
            setReconMessages(prev => {
              const updated = [...prev];
              updated[updated.length - 1] = { role: 'assistant', content: 'Error: ' + e.message };
              return updated;
            });
          }
        }
