<!DOCTYPE html>

<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Fantasy War Room</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
    <link rel="apple-touch-icon" href="icon-192.png">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fantasy War Room">
    <meta name="theme-color" content="#D4AF37">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600;700&family=Rajdhani:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #B8941E;
            /* Page bg is pinned to --page-bg below. --black now represents the
               card elevation tone, so surfaces using `background: var(--black)`
               automatically contrast against the page backdrop. */
            --page-bg: #08080B;
            --black: #14141A;
            --off-black: #1F1F26;
            --charcoal: #2A2A2A;
            --silver: #D0D0D0;
            --white: #FFFFFF;
            --win-green: #2ECC71;
            --loss-red: #E74C3C;

            /* Spacing scale */
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 12px;
            --space-lg: 16px;
            --space-xl: 24px;

            /* Card system — aligned to Sharp-Terminal mockup rhythm.
               Anything reading these tokens gets the polished spacing for free.
               Bumped defaults to 16×18 / 14px gap for a touch more breathing room
               vs the first pass, which was reading a hair tight against the mock. */
            --card-pad: 16px 18px;
            --card-pad-sm: 10px 12px;  /* inner sub-cards / list rows */
            --card-pad-lg: 18px 22px;  /* primary hero cards */
            --card-gap: 14px;
            --card-radius: 10px;
            --card-radius-sm: 6px;
            --card-border: 1px solid rgba(212,175,55,0.2);

            /* Typography scale */
            --text-hero: 2rem;       /* 32px — page titles (Rajdhani 700) */
            --text-title: 1.125rem;  /* 18px — section headers (Rajdhani 600) */
            --text-heading: 1rem;    /* 16px — card titles (DM Sans 600) */
            --text-body: 0.9375rem;  /* 15px — body text (DM Sans 400) */
            --text-label: 0.75rem;   /* 12px — labels/micro (DM Sans 500) */
            --text-micro: 0.6875rem; /* 11px — micro UI (DM Sans 500) */

            /* Font stacks */
            --font-title: 'Rajdhani', sans-serif;
            --font-body: 'DM Sans', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;

            /* Row heights */
            --row-height: 32px;
            --row-compact: 24px;
            --row-relaxed: 40px;
        }

    .fwpm-career-row{display:grid;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);gap:3px;font-size:13px}
    .fwpm-career-row:last-child{border-bottom:none}
    .fwpm-career-hdr{font-size:13px;font-weight:700;color:#7d8291;text-transform:uppercase}

    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

        body {
        font-family: 'DM Sans', sans-serif;
        background: var(--page-bg);
        color: var(--white);
        overflow-x: hidden;
        overflow-y: auto;
        min-height: 100vh;
        position: relative;
        -webkit-overflow-scrolling: touch;
        font-size: 15px;
        line-height: 1.55;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        letter-spacing: -0.01em;
    }

    /* Subdued logo background */
    body::before {
        content: '';
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: clamp(400px, 60vw, 1000px);
        height: clamp(400px, 60vw, 1000px);
        background-image: url('icon-192.png');
        background-size: contain;
        background-position: center;
        background-repeat: no-repeat;
        opacity: 0.05;
        z-index: 0;
        pointer-events: none;
        filter: brightness(1.2);
    }

    .app-container {
        position: relative;
        z-index: 1;
        max-width: 100%;
        margin: 0 auto;
    }

    /* Header — compact brand bar */
    .header {
        background: linear-gradient(135deg, var(--black) 0%, var(--off-black) 100%);
        padding: 0.75rem 1.5rem;
        border-bottom: 2px solid var(--gold);
        box-shadow: 0 2px 12px rgba(212, 175, 55, 0.15);
        display: flex;
        align-items: center;
        gap: 1rem;
        position: relative;
    }

    .header-brand {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        flex: 1;
        justify-content: center;
    }

    .owner-logo-small {
        width: 48px;
        height: 48px;
        flex-shrink: 0;
        filter: drop-shadow(0 0 8px rgba(212, 175, 55, 0.4));
    }

    .header-text {
        text-align: center;
    }

    .owner-name {
        font-family: 'DM Sans', sans-serif;
        font-size: clamp(1.2rem, 3.5vw, 1.8rem);
        background: linear-gradient(135deg, var(--gold) 0%, var(--white) 50%, var(--gold) 100%);
        background-size: 200% auto;
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 0.08em;
        animation: shimmer 3s linear infinite;
        line-height: 1.1;
    }

    .header-subtitle {
        font-family: 'DM Sans', sans-serif;
        font-style: italic;
        font-size: 0.8rem;
        color: var(--silver);
        opacity: 0.7;
        margin-top: 2px;
    }

    @keyframes shimmer {
        0% { background-position: 0% center; }
        100% { background-position: 200% center; }
    }

    .settings-icon {
        position: absolute;
        top: 50%;
        right: 1rem;
        transform: translateY(-50%);
        width: 22px;
        height: 22px;
        cursor: pointer;
        opacity: 0.5;
        transition: all 0.3s ease;
    }

    .settings-icon:hover {
        opacity: 1;
        transform: translateY(-50%) rotate(90deg);
    }

    /* Session Strip */
    .session-strip {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 0.75rem;
        padding: 0.5rem 1.5rem;
        background: rgba(212, 175, 55, 0.04);
        border-bottom: 1px solid rgba(212, 175, 55, 0.1);
        font-size: 0.78rem;
        flex-wrap: wrap;
    }
    .session-strip-label {
        color: var(--silver);
        opacity: 0.7;
    }
    .session-strip-league {
        color: var(--white);
        font-weight: 700;
    }
    .session-strip-btn {
        padding: 4px 12px;
        font-family: 'DM Sans', sans-serif;
        font-size: 0.72rem;
        font-weight: 700;
        letter-spacing: 0.03em;
        border-radius: 4px;
        cursor: pointer;
        transition: all 0.15s;
        border: none;
    }
    .session-strip-btn.primary {
        background: var(--gold);
        color: var(--black);
    }
    .session-strip-btn.primary:hover { filter: brightness(1.1); }
    .session-strip-btn.secondary {
        background: transparent;
        color: var(--gold);
        border: 1px solid rgba(212,175,55,0.3);
    }
    .session-strip-btn.secondary:hover {
        border-color: var(--gold);
        background: rgba(212,175,55,0.08);
    }

    /* Hub Layout — two equal cards */
    .hub-layout {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.25rem;
        padding: 1.25rem;
        max-width: 1100px;
        margin: 0 auto;
    }

    @media (min-width: 768px) {
        .hub-layout {
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            padding: 2rem;
            align-items: start;
        }
    }

    /* Product Card — shared base for both pillars */
    .product-card {
        background: var(--black);
        border: 2px solid rgba(212, 175, 55, 0.15);
        border-radius: 14px;
        padding: 0;
        display: flex;
        flex-direction: column;
        transition: border-color 0.25s, box-shadow 0.25s;
        overflow: hidden;
        animation: hubFadeIn 0.5s ease both;
    }
    .product-card:nth-child(2) { animation-delay: 0.1s; }

    .product-card:hover {
        border-color: rgba(212, 175, 55, 0.35);
        box-shadow: 0 4px 24px rgba(212, 175, 55, 0.1);
    }
    .product-card.accent-scout {
        border-color: rgba(212, 175, 55, 0.2);
    }
    .product-card.accent-scout:hover {
        border-color: rgba(212, 175, 55, 0.45);
        box-shadow: 0 4px 24px rgba(212, 175, 55, 0.12);
    }

    @keyframes hubFadeIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .product-card-header {
        padding: 1.25rem 1.25rem 0.75rem;
        display: flex;
        align-items: center;
        gap: 0.75rem;
    }

    .product-card-icon {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
    }
    .product-card-icon.gold {
        background: linear-gradient(135deg, var(--gold), var(--dark-gold));
        box-shadow: 0 3px 12px rgba(212, 175, 55, 0.25);
    }
    .product-card-icon.scout {
        background: linear-gradient(135deg, var(--gold), var(--dark-gold));
        box-shadow: 0 3px 12px rgba(212, 175, 55, 0.25);
    }

    .product-card-title {
        font-family: 'DM Sans', sans-serif;
        font-size: 1.4rem;
        color: var(--white);
        letter-spacing: 0.06em;
        line-height: 1.1;
    }
    .product-card-subtitle {
        font-size: 0.78rem;
        color: var(--silver);
        opacity: 0.7;
        margin-top: 2px;
        line-height: 1.4;
    }

    .product-card-body {
        padding: 0 1.25rem 1.25rem;
        flex: 1;
        display: flex;
        flex-direction: column;
    }

    /* League selector shared between both cards */
    .hub-league-selector {
        margin-bottom: 1rem;
    }
    .hub-league-selector label {
        display: block;
        font-size: 0.68rem;
        font-family: 'DM Sans', sans-serif;
        font-weight: 700;
        color: var(--gold);
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-bottom: 0.35rem;
    }
    .hub-league-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        max-height: 220px;
        overflow-y: auto;
        overflow-x: hidden;
    }
    .hub-league-list::-webkit-scrollbar { width: 4px; }
    .hub-league-list::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); border-radius: 2px; }
    .hub-league-list::-webkit-scrollbar-thumb { background: rgba(212,175,55,0.3); border-radius: 2px; }
    .hub-league-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        background: rgba(255,255,255,0.02);
        border: 1px solid rgba(212,175,55,0.15);
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.15s;
    }
    .accent-scout .hub-league-item {
        border-color: rgba(212,175,55,0.15);
    }

    .hub-year-row {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        margin-bottom: 0.5rem;
    }
    .hub-year-select {
        background: var(--charcoal);
        border: 1px solid rgba(212,175,55,0.3);
        border-radius: 4px;
        color: var(--white);
        font-family: 'DM Sans', sans-serif;
        font-weight: 700;
        font-size: 0.72rem;
        padding: 3px 8px;
        cursor: pointer;
        outline: none;
    }
    .hub-year-label {
        font-size: 0.68rem;
        color: var(--silver);
        opacity: 0.6;
        font-family: 'DM Sans', sans-serif;
    }

    /* CTA buttons inside cards */
    .hub-cta {
        width: 100%;
        padding: 12px;
        font-family: 'DM Sans', sans-serif;
        font-size: 1.1rem;
        letter-spacing: 0.05em;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
        display: block;
        text-align: center;
    }
    .hub-cta.gold {
        background: var(--gold);
        color: var(--black);
    }
    .hub-cta.gold:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(212,175,55,0.25); }
    .hub-cta.scout {
        background: linear-gradient(135deg, var(--gold), var(--dark-gold));
        color: var(--black);
    }
    .hub-cta.scout:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(212,175,55,0.3); }
    .hub-cta.ghost {
        background: transparent;
        color: var(--gold);
        border: 1px solid rgba(212,175,55,0.3);
        font-size: 0.85rem;
        padding: 8px;
        font-family: 'DM Sans', sans-serif;
        font-weight: 600;
    }
    .hub-cta.ghost:hover { border-color: var(--gold); background: rgba(212,175,55,0.06); }
    .hub-cta.ghost-scout {
        background: transparent;
        color: var(--gold);
        border: 1px solid rgba(212,175,55,0.3);
        font-size: 0.85rem;
        padding: 8px;
        font-family: 'DM Sans', sans-serif;
        font-weight: 600;
    }
    .hub-cta.ghost-scout:hover { border-color: var(--gold); background: rgba(212,175,55,0.06); }

    .hub-cta-row {
        display: flex;
        gap: 0.5rem;
        margin-top: 0.5rem;
    }
    .hub-cta-row > * { flex: 1; }

    /* Connect card (pre-auth) */
    .hub-connect-card {
        text-align: center;
        padding: 1rem 0;
    }
    .hub-connect-card input {
        width: 100%;
        padding: 12px 16px;
        background: var(--off-black);
        border: 1px solid rgba(212,175,55,0.25);
        border-radius: 8px;
        color: var(--white);
        font-family: 'DM Sans', sans-serif;
        font-size: 0.9rem;
        text-align: center;
        margin-bottom: 8px;
        outline: none;
        transition: border-color 0.2s;
    }
    .hub-connect-card input:focus {
        border-color: var(--gold);
        box-shadow: 0 0 0 2px rgba(212,175,55,0.15);
    }
    .hub-connect-card input::placeholder { color: var(--silver); opacity: 0.4; }

    /* League list items (unchanged functionality) */
    .league-item {
        padding: 0.75rem;
        margin-bottom: 0.5rem;
        background: rgba(212, 175, 55, 0.05);
        border-left: 3px solid transparent;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .league-item:hover, .league-item.active {
        background: rgba(212, 175, 55, 0.15);
        border-left-color: var(--gold);
    }

    .league-item-name {
        font-size: 0.9rem;
        font-weight: 600;
        color: var(--white);
        margin-bottom: 0.25rem;
    }

    .league-item-record {
        font-size: 0.75rem;
        color: var(--silver);
    }



    @keyframes fadeInUp {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Key Events */
    .key-events {
        background: var(--black);
        border: 2px solid rgba(212, 175, 55, 0.2);
        border-radius: 12px;
        padding: 1.5rem;
        overflow-x: hidden;
        animation: fadeInUp 0.6s ease 0.4s both;
    }

    @media (min-width: 768px) {
        .key-events {
            max-height: 600px;
            display: flex;
            flex-direction: column;
        }
    }

    .key-events-scroll {
        flex: 1;
        overflow-y: auto;
        overflow-x: hidden;
        min-height: 0;
        touch-action: pan-y;
    }

    .key-events-scroll::-webkit-scrollbar {
        width: 6px;
    }

    .key-events-scroll::-webkit-scrollbar-track {
        background: rgba(212, 175, 55, 0.1);
        border-radius: 3px;
    }

    .key-events-scroll::-webkit-scrollbar-thumb {
        background: var(--gold);
        border-radius: 3px;
    }

    .key-events-title {
        font-family: 'DM Sans', sans-serif;
        font-size: 1.3rem;
        color: var(--gold);
        margin-bottom: 1rem;
        letter-spacing: 0.15em;
        flex-shrink: 0;
    }

    .event-item {
        background: rgba(212, 175, 55, 0.05);
        border-left: 3px solid var(--gold);
        padding: 1rem;
        margin-bottom: 0.75rem;
        border-radius: 6px;
        cursor: pointer;
        transition: all 0.3s ease;
    }

    .event-item:hover {
        background: rgba(212, 175, 55, 0.15);
        box-shadow: -4px 4px 12px rgba(212, 175, 55, 0.2);
    }

    .event-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 0.5rem;
    }

    .event-title {
        font-size: 1rem;
        font-weight: 600;
        color: var(--white);
    }

    .event-date {
        font-size: 0.85rem;
        color: var(--gold);
        font-weight: 600;
    }

    .event-league {
        font-size: 0.75rem;
        color: var(--silver);
        opacity: 0.8;
    }

    @keyframes dhqSpin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }

    /* Mobile hub refinements */
    @media (max-width: 767px) {
        .header { padding: 0.6rem 1rem; }
        .owner-logo-small { width: 36px; height: 36px; }
        .hub-layout { padding: 0.75rem; gap: 0.75rem; }
        .product-card-header { padding: 1rem 1rem 0.5rem; }
        .product-card-body { padding: 0 1rem 1rem; }
        .session-strip { padding: 0.4rem 1rem; gap: 0.5rem; font-size: 0.72rem; }
    }

    /* LeagueDetail 3-column responsive layout */
    @media (min-width: 768px) {
        .league-detail-grid { grid-template-columns: 220px 1fr 260px !important; }
        .league-detail-grid > div {
            max-height: calc(100vh - 200px);
            display: flex;
            flex-direction: column;
        }
        .league-detail-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            min-height: 0;
        }
        .league-detail-scroll::-webkit-scrollbar { width: 6px; }
        .league-detail-scroll::-webkit-scrollbar-track { background: rgba(212,175,55,0.1); border-radius: 3px; }
        .league-detail-scroll::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }
    }
    @media (min-width: 1200px) {
        .league-detail-grid { grid-template-columns: 260px 1fr 300px !important; }
    }

    /* ══════ TRADE CALCULATOR STYLES ══════ */
    .tc-team-grid { display: grid; grid-template-columns: 1fr; gap: 0.75rem; }
    @media(min-width:600px){ .tc-team-grid { grid-template-columns: 1fr 1fr; } }
    @media(min-width:900px){ .tc-team-grid { grid-template-columns: repeat(3,1fr); } }
    @media(min-width:1200px){ .tc-team-grid { grid-template-columns: repeat(4,1fr); } }

    .tc-team-card { background: var(--off-black); border: 1px solid rgba(212,175,55,0.2); border-radius: 8px; overflow: hidden; transition: border-color 0.2s; }
    .tc-team-card:hover { border-color: rgba(212,175,55,0.5); }
    .tc-team-card.tc-my-team { border-color: var(--gold); box-shadow: 0 0 12px rgba(212,175,55,0.15); }
    .tc-card-header { background: var(--charcoal); padding: 0.55rem 0.7rem; display: flex; align-items: center; justify-content: space-between; gap: 0.5rem; }
    .tc-card-body { padding: 0.6rem 0.7rem; display: flex; flex-direction: column; gap: 0.5rem; }

    .tc-pos-grid { display: flex; flex-direction: column; gap: 0.22rem; }
    .tc-pos-row { display: flex; align-items: center; gap: 0.4rem; }
    .tc-pos-label { font-size: 0.76rem; font-weight: 700; width: 20px; flex-shrink: 0; }
    .tc-pos-dots { display: flex; gap: 2px; flex: 1; flex-wrap: wrap; }
    .tc-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .tc-dot-filled { background: var(--win-green); }
    .tc-dot-depth { background: rgba(255,255,255,0.28); border: 1px solid rgba(255,255,255,0.35); }
    .tc-dot-empty { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); }
    .tc-dot-surplus { background: var(--gold); }
    .tc-dot-deficit { background: var(--loss-red); }
    .tc-pos-count { font-size: 0.74rem; width: 28px; text-align: right; flex-shrink: 0; }
    .tc-pos-status-icon { font-size: 0.8rem; width: 14px; flex-shrink: 0; }

    .tc-panic-row { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.2rem; }
    .tc-panic-dot { width: 9px; height: 9px; border-radius: 50%; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15); }
    .tc-panic-dot.tc-lit { background: var(--loss-red); border-color: var(--loss-red); box-shadow: 0 0 4px rgba(231,76,60,0.6); }

    .tc-chip-row { display: flex; flex-wrap: wrap; gap: 0.25rem; }
    .tc-chip { font-size: 0.72rem; font-weight: 700; letter-spacing: 0.05em; padding: 0.1rem 0.35rem; border-radius: 3px; text-transform: uppercase; }
    .tc-chip-strength { background: rgba(46,204,113,0.15); border: 1px solid rgba(46,204,113,0.4); color: #2ECC71; }
    .tc-chip-need { background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.4); color: #E74C3C; }
    .tc-chip-thin { background: rgba(240,165,0,0.15); border: 1px solid rgba(240,165,0,0.4); color: #F0A500; }
    .tc-chip-window { background: rgba(93,173,226,0.12); border: 1px solid rgba(93,173,226,0.3); color: #5DADE2; }

    .tc-score-row { display: flex; align-items: center; gap: 0.5rem; }

    .tc-summary-bar { display: flex; gap: 1rem; padding: 0.5rem 0.75rem; background: rgba(212,175,55,0.05); border: 1px solid rgba(212,175,55,0.1); border-radius: 6px; margin-bottom: 0.75rem; flex-wrap: wrap; }
    .tc-summary-stat { display: flex; flex-direction: column; align-items: center; }
    .tc-summary-val { font-family: 'DM Sans', sans-serif; font-size: 1.1rem; color: var(--gold); }
    .tc-summary-lbl { font-size: 0.72rem; color: var(--silver); opacity: 0.6; letter-spacing: 0.06em; text-transform: uppercase; }
    .tc-my-team-badge { font-size: 0.72rem; background: var(--gold); color: var(--black); padding: 0.08rem 0.3rem; border-radius: 2px; font-weight: 700; letter-spacing: 0.04em; flex-shrink: 0; }
    .tc-tier-badge { font-size: 0.74rem; font-weight: 700; letter-spacing: 0.08em; padding: 0.15rem 0.4rem; border-radius: 3px; flex-shrink: 0; border: 1px solid; text-transform: uppercase; }
    .tc-filter-bar { display: flex; align-items: center; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
    .tc-filter-select { background: var(--charcoal); border: 1px solid rgba(212,175,55,0.3); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.72rem; padding: 0.28rem 0.5rem; border-radius: 4px; cursor: pointer; }

    /* Trade Analyzer */
    .tc-ta-3col { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    @media(min-width:800px){ .tc-ta-3col { grid-template-columns: 1fr 1fr; gap: 1.25rem; } }
    @media(min-width:1150px){ .tc-ta-3col { grid-template-columns: 1fr 1fr 300px; gap: 1.25rem; } }
    .tc-ta-side { background: var(--off-black); border: 1px solid rgba(212,175,55,0.2); border-radius: 8px; padding: 0.75rem; display: flex; flex-direction: column; gap: 0.5rem; font-size: 0.82rem; }
    .tc-ta-side.tc-side-a { border-color: rgba(93,173,226,0.35); }
    .tc-ta-side.tc-side-b { border-color: rgba(231,76,60,0.35); }
    .tc-ta-player-row { background: var(--charcoal); border-radius: 5px; padding: 0.5rem 0.65rem; display: flex; align-items: center; gap: 0.5rem; }
    .tc-ta-remove { background: transparent; border: none; color: rgba(231,76,60,0.6); cursor: pointer; font-size: 0.75rem; flex-shrink: 0; padding: 0; }
    .tc-ta-remove:hover { color: var(--loss-red); }
    .tc-ta-val-bar-wrap { flex: 1; height: 4px; background: rgba(255,255,255,0.07); border-radius: 2px; overflow: hidden; }
    .tc-ta-val-bar-fill { height: 100%; border-radius: 2px; transition: width 0.4s ease; }
    .tc-ta-val-col { width: 80px; flex-shrink: 0; }
    .tc-ta-pos-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .tc-ta-total-row { display: flex; align-items: center; justify-content: space-between; padding: 0.45rem 0.55rem; border-radius: 5px; margin-top: 0.25rem; }
    .tc-ta-total-label { font-size: 0.72rem; color: var(--silver); opacity: 0.7; text-transform: uppercase; letter-spacing: 0.06em; }
    .tc-ta-total-val { font-family: 'DM Sans', sans-serif; font-size: 1.5rem; }
    .tc-ta-owner-select { background: var(--charcoal); border: 1px solid rgba(212,175,55,0.25); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.72rem; padding: 0.3rem 0.5rem; border-radius: 4px; cursor: pointer; width: 100%; }
    .tc-ta-roster-filter { width: 100%; background: var(--charcoal); border: 1px solid rgba(212,175,55,0.25); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.8rem; padding: 0.42rem 0.7rem; border-radius: 4px 4px 0 0; }
    .tc-ta-roster-filter:focus { outline: none; border-color: var(--gold); }
    .tc-ta-roster-filter::placeholder { color: rgba(255,255,255,0.2); }
    .tc-ta-roster-list-tall { max-height: 300px; overflow-y: auto; background: var(--charcoal); border: 1px solid rgba(212,175,55,0.2); border-top: none; border-radius: 0 0 5px 5px; }
    .tc-ta-pos-group-hdr { font-size: 0.8rem; font-weight: 700; color: var(--silver); opacity: 0.65; padding: 0.25rem 0.7rem; background: rgba(255,255,255,0.03); letter-spacing: 0.06em; text-transform: uppercase; }
    .tc-ta-roster-item { padding: 0.42rem 0.7rem; cursor: pointer; display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; border-bottom: 1px solid rgba(255,255,255,0.04); transition: background 0.1s; }
    .tc-ta-roster-item:hover:not(.tc-added) { background: rgba(212,175,55,0.08); }
    .tc-ta-roster-item.tc-added { opacity: 0.3; cursor: default; pointer-events: none; }
    .tc-ta-roster-empty { padding: 0.6rem; font-size: 0.8rem; color: var(--silver); opacity: 0.6; text-align: center; }
    .tc-ta-player-name { font-size: 0.8rem; }
    .tc-ta-player-meta { font-size: 0.7rem; color: var(--silver); opacity: 0.6; }
    .tc-ta-player-val { font-size: 0.72rem; font-weight: 700; color: var(--gold); flex-shrink: 0; }
    .tc-ta-verdict { background: var(--off-black); border: 1px solid rgba(212,175,55,0.2); border-radius: 8px; padding: 0.75rem; display: flex; flex-direction: column; gap: 0.55rem; margin-top: 0.5rem; }
    .tc-verdict-diff { font-family: 'DM Sans', sans-serif; font-size: 2.4rem; line-height: 1; }
    .tc-likelihood-bar-wrap { height: 10px; background: rgba(255,255,255,0.07); border-radius: 5px; overflow: hidden; }
    .tc-likelihood-bar-fill { height: 100%; border-radius: 5px; transition: width 0.5s ease; }

    .tc-scout-panel { background: var(--off-black); border: 1px solid rgba(212,175,55,0.2); border-radius: 8px; padding: 0.75rem; overflow-y: auto; max-height: 320px; display: flex; flex-direction: column; gap: 0.45rem; grid-column: 1 / -1; grid-row: 2; }
    @media(min-width:1150px){ .tc-scout-panel { grid-column: 3; grid-row: 1; max-height: 660px; } }
    .tc-scout-team-card { background: var(--charcoal); border: 1px solid rgba(255,255,255,0.07); border-radius: 6px; padding: 0.6rem 0.7rem; cursor: pointer; transition: border-color 0.15s, background 0.15s; display: flex; flex-direction: column; gap: 0.3rem; }
    .tc-scout-team-card:hover { border-color: rgba(212,175,55,0.4); background: rgba(212,175,55,0.04); }
    .tc-scout-team-card.tc-scout-selected { border-color: var(--gold); background: rgba(212,175,55,0.08); }

    .tc-tax-table { display: flex; flex-direction: column; gap: 0; border: 1px solid rgba(255,255,255,0.07); border-radius: 6px; overflow: hidden; }
    .tc-tax-table-row { display: flex; align-items: center; gap: 0.5rem; padding: 0.38rem 0.7rem; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.72rem; }
    .tc-tax-table-row:last-child { border-bottom: none; }
    .tc-tax-table-row.tc-bonus { background: rgba(46,204,113,0.05); }
    .tc-tax-table-row.tc-tax { background: rgba(231,76,60,0.05); }
    .tc-tax-table-row.tc-total { background: rgba(212,175,55,0.06); border-top: 1px solid rgba(212,175,55,0.2); font-weight: 700; }
    .tc-tax-name { flex: 1; font-weight: 600; font-size: 0.72rem; }
    .tc-tax-desc { font-size: 0.8rem; color: var(--silver); opacity: 0.655; flex: 2; }
    .tc-tax-val { font-weight: 700; font-size: 0.78rem; width: 40px; text-align: right; flex-shrink: 0; }

    .tc-posture-badge { font-size: 0.76rem; font-weight: 700; letter-spacing: 0.07em; padding: 0.18rem 0.45rem; border-radius: 3px; border: 1px solid; text-transform: uppercase; }

    /* DNA Grid */
    .tc-dna-grid { display: grid; grid-template-columns: 1fr; gap: 0.75rem; }
    @media(min-width:600px){ .tc-dna-grid { grid-template-columns: 1fr 1fr; } }
    @media(min-width:900px){ .tc-dna-grid { grid-template-columns: repeat(3,1fr); } }
    .tc-dna-card { background: var(--off-black); border: 1px solid rgba(212,175,55,0.15); border-radius: 8px; padding: 0.75rem; display: flex; flex-direction: column; gap: 0.5rem; }
    .tc-dna-card.tc-dna-set { border-color: rgba(212,175,55,0.4); }
    .tc-dna-select { width: 100%; background: var(--charcoal); border: 1px solid rgba(212,175,55,0.3); color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 0.72rem; padding: 0.28rem 0.45rem; border-radius: 4px; cursor: pointer; }
    .tc-dna-profile { background: rgba(212,175,55,0.06); border: 1px solid rgba(212,175,55,0.12); border-radius: 6px; padding: 0.5rem 0.6rem; }

    /* Featured team card */
    .tc-featured-wrap { display: grid; grid-template-columns: 1fr; gap: 1rem; background: var(--off-black); border: 2px solid var(--gold); border-radius: 10px; padding: 1rem; margin-bottom: 1.25rem; box-shadow: 0 0 24px rgba(212,175,55,0.1); }
    @media(min-width:750px){ .tc-featured-wrap { grid-template-columns: minmax(280px,340px) 1fr; } }
    .tc-commentary-card { background: rgba(212,175,55,0.04); border: 1px solid rgba(212,175,55,0.1); border-radius: 6px; padding: 0.65rem 0.8rem; }
    .tc-commentary-card-title { font-size: 0.78rem; font-weight: 700; color: var(--gold); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.3rem; }
    .tc-commentary-card-text { font-size: 0.7rem; color: var(--silver); line-height: 1.55; }

    /* Team detail expanded panel */
    .tc-team-detail-panel { display: grid; grid-template-columns: 1fr; gap: 1rem; background: var(--off-black); border: 1px solid rgba(212,175,55,0.35); border-radius: 8px; padding: 1rem; margin-bottom: 1rem; }
    @media(min-width:750px){ .tc-team-detail-panel { grid-template-columns: minmax(260px,310px) 1fr; } }

    /* Small phone overrides for trade analyzer */
    @media(max-width:799px){
        .tc-ta-3col > * { min-width: 0; }
        .tc-ta-side { overflow: hidden; padding: 0.45rem 0.4rem; gap: 0.3rem; font-size: 0.72rem; }
        .tc-ta-player-row { padding: 0.28rem 0.35rem; gap: 0.3rem; }
        .tc-ta-roster-item { padding: 0.25rem 0.35rem; font-size: 0.82rem; }
        .tc-ta-pos-group-hdr { font-size: 0.74rem; padding: 0.18rem 0.35rem; }
        .tc-ta-total-val { font-size: 1.15rem; }
        .tc-ta-val-col { width: 42px; }
        .tc-ta-val-bar-wrap { display: none; }
        .tc-ta-player-name { font-size: 0.7rem; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    }

    .tc-source-badge { font-size: 0.45rem; background: rgba(240,165,0,0.15); border: 1px solid rgba(240,165,0,0.35); color: #F0A500; padding: 0.05rem 0.25rem; border-radius: 2px; margin-left: 0.2rem; letter-spacing: 0.05em; }

    /* ── Loading Skeletons ───────────────────────────────── */
    @keyframes skeletonShimmer { 0%{background-position:-400px 0} 100%{background-position:400px 0} }
    .skel { background:linear-gradient(90deg,rgba(212,175,55,0.04) 25%,rgba(212,175,55,0.10) 50%,rgba(212,175,55,0.04) 75%);background-size:800px 100%;animation:skeletonShimmer 1.8s ease infinite;border-radius:6px }
    .skel-line { height:12px;margin-bottom:8px;border-radius:4px }
    .skel-block { height:80px;margin-bottom:12px }
    .skel-card { background:rgba(212,175,55,0.04);border:1px solid rgba(212,175,55,0.12);border-radius:10px;padding:16px;margin-bottom:12px }
    .skel-row { display:flex;gap:12px;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,0.03) }
    .skel-circle { width:32px;height:32px;border-radius:50%;flex-shrink:0 }

    /* ── Tooltips ─────────────────────────────────────────── */
    .wr-tip-icon { display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;background:rgba(212,175,55,0.12);color:var(--gold);font-size:13px;font-weight:700;cursor:pointer;margin-left:4px;transition:all .15s;flex-shrink:0;vertical-align:middle;line-height:1;border:1px solid rgba(212,175,55,0.25) }
    .wr-tip-icon:hover { background:var(--gold);color:var(--black) }
    .wr-tip-box { display:none;background:var(--off-black);border:1px solid rgba(212,175,55,0.25);border-radius:8px;padding:10px 12px;font-size:0.78rem;color:var(--silver);line-height:1.6;margin-top:6px;animation:wrTipIn .2s ease }
    .wr-tip-box.show { display:block }
    @keyframes wrTipIn { from{opacity:0;transform:translateY(-4px)} to{opacity:1;transform:translateY(0)} }
    .wr-tip-box strong { color:var(--white);font-weight:600 }

    /* ── Section Header (global) ─────────────────────────── */
    .wr-section-hdr { font-family:'Inter',sans-serif;font-size:1rem;color:var(--gold);letter-spacing:0.08em;margin-bottom:8px }

    /* ── Micro-animations ────────────────────────────────── */
    @keyframes wrFadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
    .wr-fade-in { animation:wrFadeIn 0.25s ease both }
    .wr-fade-in-delay { animation:wrFadeIn 0.3s ease 0.1s both }
    .wr-pulse { box-shadow:0 0 0 2px rgba(212,175,55,0.15) }

    /* ── Annotation callout ──────────────────────────────── */
    .wr-annotation { font-size:0.72rem;font-family:'Inter',sans-serif;font-weight:600;letter-spacing:0.02em;padding:3px 8px;border-radius:4px;border-left:2px solid var(--gold);background:rgba(212,175,55,0.06);color:var(--silver);line-height:1.4;margin-top:6px }

    /* ── Tactical glass cards ─────────────────────────────── */
    .wr-glass{background:rgba(10,10,15,0.7);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(212,175,55,0.12);transition:transform .2s,box-shadow .2s}
    .wr-glass:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.4),0 0 0 1px rgba(212,175,55,0.15)}

    /* ── AI scanline effect ───────────────────────────────── */
    .wr-scanline{position:relative;overflow:hidden}
    .wr-scanline::after{content:'';position:absolute;top:-100%;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,rgba(212,175,55,0.15),transparent);animation:wrScan 5s linear infinite}
    @keyframes wrScan{0%{top:-2px}100%{top:100%}}

    /* ── Accent classes (static, no animation) ──────────────── */
    .wr-pulse-gold{box-shadow:0 0 0 2px rgba(212,175,55,0.25)}
    .wr-pulse-red{box-shadow:0 0 0 2px rgba(231,76,60,0.25)}

    /* ── Corner brackets (targeting reticle) ──────────────── */
    .wr-brackets{position:relative;padding:12px 16px}
    .wr-brackets::before,.wr-brackets::after{content:'';position:absolute;width:12px;height:12px;border-color:#D4AF37;border-style:solid;border-width:0}
    .wr-brackets::before{top:0;left:0;border-top-width:2px;border-left-width:2px}
    .wr-brackets::after{top:0;right:0;border-top-width:2px;border-right-width:2px}
    .wr-brackets-bottom{position:relative}
    .wr-brackets-bottom::before,.wr-brackets-bottom::after{content:'';position:absolute;width:12px;height:12px;border-color:#D4AF37;border-style:solid;border-width:0}
    .wr-brackets-bottom::before{bottom:0;left:0;border-bottom-width:2px;border-left-width:2px}
    .wr-brackets-bottom::after{bottom:0;right:0;border-bottom-width:2px;border-right-width:2px}

    /* ── User row identity glow in tables ─────────────────── */
    .wr-my-row{background:rgba(212,175,55,0.06) !important;box-shadow:inset 0 0 0 1px rgba(212,175,55,0.2)}

    /* ── Rivalry threat levels ────────────────────────────── */
    .wr-nemesis{color:#E74C3C;font-weight:700;text-transform:uppercase;font-size:0.68rem;letter-spacing:0.06em}
    .wr-stalemate{color:#F0A500;font-weight:700;text-transform:uppercase;font-size:0.68rem;letter-spacing:0.06em}
    .wr-owned{color:#2ECC71;font-weight:700;text-transform:uppercase;font-size:0.68rem;letter-spacing:0.06em}

    /* ── Timeline vertical line ───────────────────────────── */
    .wr-timeline-line{border-left:2px solid rgba(212,175,55,0.3);padding-left:16px;margin-left:8px}
    .wr-timeline-node{width:10px;height:10px;border-radius:50%;background:#D4AF37;box-shadow:0 0 6px rgba(212,175,55,0.4);position:absolute;left:-6px;top:8px}

    /* Roster row action indicators */
    .wr-row-sell{background:rgba(231,76,60,0.03) !important;border-left:3px solid rgba(231,76,60,0.4)}
    .wr-row-sell-high{background:rgba(251,191,36,0.03) !important;border-left:3px solid rgba(251,191,36,0.4)}
    .wr-row-buy{background:rgba(46,204,113,0.03) !important;border-left:3px solid rgba(46,204,113,0.4)}
    .wr-row-core{background:rgba(212,175,55,0.03) !important;border-left:3px solid rgba(212,175,55,0.4)}
    .wr-row-sell:hover,.wr-row-sell-high:hover,.wr-row-buy:hover,.wr-row-core:hover{filter:brightness(1.3)}

    /* Player headshot status ring */
    .wr-ring{border-radius:50%;padding:2px}
    .wr-ring-QB{box-shadow:0 0 0 2px #E74C3C}
    .wr-ring-RB{box-shadow:0 0 0 2px #2ECC71}
    .wr-ring-WR{box-shadow:0 0 0 2px #3498DB}
    .wr-ring-TE{box-shadow:0 0 0 2px #F0A500}
    .wr-ring-K{box-shadow:0 0 0 2px #9B59B6}
    .wr-ring-DL{box-shadow:0 0 0 2px #E67E22}
    .wr-ring-LB{box-shadow:0 0 0 2px #1ABC9C}
    .wr-ring-DB{box-shadow:0 0 0 2px #E91E63}

    /* Mini trend sparkline bars */
    .wr-spark{display:flex;align-items:flex-end;gap:1px;height:16px}
    .wr-spark-bar{width:3px;border-radius:1px;transition:height .3s}

    /* Untouchable player shield */
    .wr-untouchable{position:relative}
    .wr-untouchable::after{content:'\uD83D\uDEE1';position:absolute;top:2px;right:2px;font-size:0.6rem;opacity:0.6}

    /* DHQ power gauge (segmented battery) */
    .wr-gauge{display:flex;gap:1px;height:6px}
    .wr-gauge-seg{flex:1;border-radius:1px;background:rgba(255,255,255,0.06)}
    .wr-gauge-seg.filled{background:var(--gold)}
    .wr-gauge-seg.filled-green{background:#2ECC71}
    .wr-gauge-seg.filled-red{background:#E74C3C}

    /* Delta styling */
    .wr-delta-pos{color:#D4AF37;font-weight:700}
    .wr-delta-pos::before{content:'\\2713 ';font-size:0.7rem}
    .wr-delta-neg{color:#E74C3C;font-weight:700}
    .wr-delta-neg::before{content:'\\0021 ';font-size:0.7rem}
</style>

<script>
// PWA Install Prompt
let _deferredPrompt = null;
window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  _deferredPrompt = e;
  // Don't show immediately — wait 30 seconds
  setTimeout(() => {
    const banner = document.getElementById('pwa-install');
    if (banner && _deferredPrompt) banner.style.display = 'block';
  }, 30000);
});

document.getElementById('pwa-install-btn')?.addEventListener('click', async () => {
  if (!_deferredPrompt) return;
  _deferredPrompt.prompt();
  const result = await _deferredPrompt.userChoice;
  _deferredPrompt = null;
  document.getElementById('pwa-install').style.display = 'none';
});

document.getElementById('pwa-install-dismiss')?.addEventListener('click', () => {
  document.getElementById('pwa-install').style.display = 'none';
  _deferredPrompt = null;
  localStorage.setItem('pwa_install_dismissed', Date.now());
});

// Don't show if recently dismissed
if (localStorage.getItem('pwa_install_dismissed')) {
  const dismissed = parseInt(localStorage.getItem('pwa_install_dismissed'));
  if (Date.now() - dismissed < 7 * 24 * 60 * 60 * 1000) _deferredPrompt = null; // 7 day cooldown
}

window.addEventListener('appinstalled', () => {
  document.getElementById('pwa-install').style.display = 'none';
  _deferredPrompt = null;
});
</script>
