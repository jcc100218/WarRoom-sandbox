                    const goodColor = '#2ECC71';
                    const warnColor = '#F0A500';
                    const badColor = '#E74C3C';
                    const sevIcon = (sev) => sev === 'high' || sev === 'critical' ? '\uD83D\uDD34' : sev === 'medium' ? '\u26A0\uFE0F' : '\u2705';
                    const sevColor = (sev) => sev === 'high' || sev === 'critical' ? badColor : sev === 'medium' ? warnColor : goodColor;
                    const pctFmt = (v) => Math.round((v || 0) * 100) + '%';
                    const numFmt = (v) => v != null ? (typeof v === 'number' ? v.toLocaleString() : v) : '\u2014';
                    const subTabs = [
                        { key: 'roster', label: 'Roster' },
                        { key: 'draft', label: 'Draft' },
                        { key: 'waivers', label: 'Waivers' },

                    const tableRowStyle = (i) => ({ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: '8px', padding: '6px 0', borderBottom: '1px solid rgba(255,255,255,0.06)', ...(i === 0 ? { fontWeight: 700, color: 'var(--gold)', fontSize: '0.8rem', textTransform: 'uppercase', letterSpacing: '0.05em' } : { color: 'var(--silver)' }) });

                            ))}
                        </div>

                        {!d ? (
                            <div style={{ ...aCardStyle, color: 'var(--silver)', textAlign: 'center', padding: '40px' }}>

                        <React.Fragment>

                        {/* ═══ ROSTER CONSTRUCTION ═══ */}

                            const m = r.myProfile;
                            const rows = [

                                        <div key={pos} style={{ marginBottom: '10px' }}>
                                            <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: '3px' }}>
                                                <span style={{ color: 'var(--silver)', fontSize: '0.85rem', fontFamily: 'Oswald, sans-serif' }}>{pos}</span>

                                                <div style={{ position: 'absolute', top: 0, left: 0, height: '9px', width: (wPct / maxPct * 100) + '%', background: 'var(--gold)', borderRadius: '4px 4px 0 0', opacity: 0.7 }} />
                                                <div style={{ position: 'absolute', bottom: 0, left: 0, height: '9px', width: (mPct / maxPct * 100) + '%', background: '#4ECDC4', borderRadius: '0 0 4px 4px', opacity: 0.7 }} />
                                            </div>
                                        </div>
                                        );
                                    })}

                                                <div style={{ color: sevColor(g.priority || g.severity), fontWeight: 700, fontSize: '0.85rem', fontFamily: 'Oswald, sans-serif' }}>

                        {/* ═══ DRAFT INTELLIGENCE ═══ */}
                        {analyticsTab === 'draft' && (() => {
                            const dr = d.draft;

                            const rounds = Object.keys(dr.winnerDraftProfile || {}).map(Number).sort((a, b) => a - b);
                            const S = window.S || window.App?.S;
                            const myRid = S?.myRosterId;
                            // Compute user's draft profile from draftOutcomes
                            const draftOutcomes = (window.App?.LI || {}).draftOutcomes || [];
                            const myDraftProfile = {};
                            rounds.forEach(rd => {
                                const myPicks = draftOutcomes.filter(dp => dp.round === rd && dp.roster_id === myRid);
                                if (!myPicks.length) return;
                                const posCounts = {};
                                myPicks.forEach(dp => { const pos = dp.pos || 'UNK'; posCounts[pos] = (posCounts[pos] || 0) + 1; });
                                myDraftProfile[rd] = {};
                                Object.entries(posCounts).forEach(([pos, cnt]) => { myDraftProfile[rd][pos] = +(cnt / myPicks.length).toFixed(2); });
                            });
                            // Compute a simple draft grade
                            let totalHitDiff = 0;
                            let hitRounds = 0;
                            rounds.forEach(rd => {
                                const hr = dr.winnerHitRate[rd];
                                if (!hr) return;
                                totalHitDiff += (hr.winners - hr.league);
                                hitRounds++;
                            });
                            const avgHitAdv = hitRounds > 0 ? totalHitDiff / hitRounds : 0;
                            const grades = ['A+', 'A', 'A-', 'B+', 'B', 'B-', 'C+', 'C', 'C-', 'D'];
                            const gradeIdx = Math.min(grades.length - 1, Math.max(0, Math.round(4 - avgHitAdv * 20)));

                            return (
                            <React.Fragment>
                                <div style={aCardStyle}>
                                    <div style={aHeaderStyle}>WINNING DRAFT FORMULA</div>
                                    {rounds.map(rd => {
                                        const wProf = dr.winnerDraftProfile[rd] || {};
                                        const myProf = myDraftProfile[rd] || {};
                                        const sorted = Object.entries(wProf).sort((a, b) => b[1] - a[1]);

                                        <div key={rd} style={{ marginBottom: '10px', ...aValStyle }}>

                                                <span style={{ color: 'var(--silver)' }}>Winners: {sorted.map(([pos, pct]) => pos + ' ' + pctFmt(pct)).join(' | ')}</span>
                                            </div>
                                            {Object.keys(myProf).length > 0 && (
                                                <div style={{ marginLeft: '70px', color: 'rgba(255,255,255,0.5)', fontSize: '0.8rem' }}>
                                                    You: {Object.entries(myProf).sort((a, b) => b[1] - a[1]).map(([pos, pct]) => pos + ' ' + pctFmt(pct)).join(' | ')}
                                                </div>
                                            )}
                                        </div>
                                        );
                                    })}
                                </div>

                                <div style={aCardStyle}>
                                    <div style={aHeaderStyle}>HIT RATES (WINNERS vs LEAGUE)</div>

                                        <div key={rd} style={{ display: 'flex', gap: '12px', marginBottom: '8px', alignItems: 'center', ...aValStyle }}>

                                            </div>
                                        ))}
                                    </div>
                                </div>

                            </React.Fragment>

                                <div style={aCardStyle}>
                                    <div style={aHeaderStyle}>WINNER TRADE PROFILE</div>
                                    <div style={{ display: 'grid', gridTemplateColumns: '1.2fr 1fr 1fr 1fr', gap: '8px', padding: '6px 0', fontWeight: 700, color: 'var(--gold)', fontSize: '0.8rem', textTransform: 'uppercase', letterSpacing: '0.05em', borderBottom: '1px solid rgba(255,255,255,0.06)' }}>
                                        <div>Metric</div><div>Winners</div><div>League</div><div>You</div>
                                    </div>
                                    {rows.map(([label, wVal, lVal, mVal], i) => (
                                        <div key={i} style={{ display: 'grid', gridTemplateColumns: '1.2fr 1fr 1fr 1fr', gap: '8px', padding: '6px 0', borderBottom: '1px solid rgba(255,255,255,0.04)', color: 'var(--silver)', ...aValStyle }}>
                                            <div>{label}</div>
                                            <div style={{ color: 'var(--gold)' }}>{wVal}</div>
                                            <div>{lVal}</div>
                                            <div>{mVal}</div>

                                    <div style={aHeaderStyle}>TRADE INSIGHTS</div>
                                    {alerts.map((a, i) => (

                                            <span style={{ fontSize: '1rem', flexShrink: 0 }}>{sevIcon(a.sev)}</span>

                                </div>

                        {/* ═══ PROJECTIONS ═══ */}
                        {analyticsTab === 'projections' && (() => {
                            const proj = d.projection;
                            const win = d.window;
                            if (!proj || !proj.length) return <div style={{ color: 'var(--silver)' }}>No projection data available.</div>;
                            const maxDHQ = Math.max(...proj.map(p => p.projectedDHQ), 1);
                            const tierColor = (tier) => tier === 'Contender' ? goodColor : tier === 'Playoff Team' ? warnColor : badColor;

                            // Aging cliff analysis
                            const S = window.S || window.App?.S;
                            const LI = window.App?.LI || {};
                            const playerScores = LI.playerScores || {};
                            const playerMeta = LI.playerMeta || {};
                            const peakWindows = window.App?.peakWindows || { QB: [24, 34], RB: [22, 27], WR: [22, 30], TE: [23, 30] };
                            const myRid = S?.myRosterId;
                            const myRosterObj = (S?.rosters || []).find(r => r.roster_id === myRid);
                            const myPlayers = myRosterObj?.players || [];
                            let totalDHQ = 0;
                            let atRiskDHQ = 0;
                            const atRiskPlayers = [];
                            myPlayers.forEach(pid => {
                                const dhq = playerScores[pid] || 0;
                                const meta = playerMeta[pid] || {};
                                totalDHQ += dhq;
                                if (!meta.age || !meta.pos) return;
                                const peakEnd = (peakWindows[meta.pos] || [23, 29])[1];
                                if (meta.age + 2 > peakEnd && dhq >= 2000) {
                                    atRiskDHQ += dhq;
                                    atRiskPlayers.push({ name: meta.name || pid, age: meta.age, dhq });
                                }
                            });
                            const atRiskPct = totalDHQ > 0 ? Math.round(atRiskDHQ / totalDHQ * 100) : 0;

                            <React.Fragment>
                                <div style={aCardStyle}>
                                    <div style={aHeaderStyle}>YOUR 5-YEAR OUTLOOK</div>
                                    {proj.map((p, i) => (
                                        <div key={i} style={{ display: 'flex', alignItems: 'center', gap: '12px', marginBottom: '8px' }}>
                                            <span style={{ color: 'var(--silver)', fontFamily: 'Oswald, sans-serif', minWidth: '40px', fontSize: '0.9rem' }}>{p.year}</span>
                                            <div style={{ flex: 1, position: 'relative', height: '24px', background: 'rgba(255,255,255,0.05)', borderRadius: '6px', overflow: 'hidden' }}>
                                                <div style={{ position: 'absolute', left: 0, top: 0, height: '100%', width: (p.projectedDHQ / maxDHQ * 100) + '%', background: tierColor(p.tier), borderRadius: '6px', opacity: 0.6, transition: 'width 0.5s ease' }} />
                                                <div style={{ position: 'absolute', left: '8px', top: '50%', transform: 'translateY(-50%)', fontSize: '0.75rem', fontFamily: 'Oswald, sans-serif', color: 'var(--white)', fontWeight: 700, whiteSpace: 'nowrap' }}>
                                                    {p.projectedDHQ.toLocaleString()} DHQ

                                            </div>
                                        </div>
                                    ))}
                                </div>
                                )}
                            </React.Fragment>

                        </React.Fragment>

                    }}>
                      <div style={{ fontSize: '0.65rem', color: 'var(--gold)', fontFamily: 'Oswald, sans-serif', textTransform: 'uppercase', letterSpacing: '0.12em', marginBottom: '8px' }}>THIS WEEK IN {currentLeague.name?.toUpperCase()}</div>
                      <div style={{ fontFamily: 'Crimson Text, serif', fontSize: '1.15rem', color: 'var(--white)', lineHeight: 1.6 }}>

                              <span style={{ fontSize: '0.72rem', color: 'var(--silver)' }}>{getOwnerName(txn.roster_ids?.[0])}</span>

                      {/* RIGHT: Power Rankings */}

                            <span style={{ fontFamily: 'Bebas Neue, cursive', fontSize: '1.3rem', color: i === 0 ? '#D4AF37' : i === 1 ? '#C0C0C0' : i === 2 ? '#CD7F32' : 'var(--silver)', minWidth: '24px', textAlign: 'center' }}>{i + 1}</span>

                            Generate Stories

                      ) : (
                        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: '12px' }}>

                    {/* 4. LEAGUE STANDINGS TABLE */}
                    <div style={{ background: 'var(--black)', border: '2px solid rgba(212,175,55,0.3)', borderRadius: '12px', padding: '16px' }}>

                      {(() => {
                        // Group by division if divisions exist
                        const divisions = {};
                        standings.forEach(t => {
                          const div = t.division || 0;
                          if (!divisions[div]) divisions[div] = [];
                          divisions[div].push(t);
                        });
                        const divKeys = Object.keys(divisions).sort((a,b) => a - b);
                        const hasDivisions = divKeys.length > 1;

                        return (
                          <div>
                            {divKeys.map(divKey => (
                              <div key={divKey} style={{ marginBottom: hasDivisions ? '16px' : '0' }}>
                                {hasDivisions && (
                                  <div style={{ fontFamily: 'Oswald, sans-serif', fontSize: '0.68rem', color: 'var(--gold)', textTransform: 'uppercase', letterSpacing: '0.08em', fontWeight: 700, marginBottom: '8px', paddingBottom: '4px', borderBottom: '1px solid rgba(212,175,55,0.2)' }}>

                                {/* Header */}
                                <div style={{ display: 'grid', gridTemplateColumns: '20px 1fr 48px 48px 56px 56px', gap: '4px', padding: '4px 8px', fontSize: '0.55rem', fontWeight: 700, color: 'var(--gold)', fontFamily: 'Oswald, sans-serif', textTransform: 'uppercase', letterSpacing: '0.04em', borderBottom: '1px solid rgba(212,175,55,0.15)' }}>
                                  <span>#</span><span>Team</span><span style={{textAlign:'right'}}>W-L</span><span style={{textAlign:'right'}}>PF</span><span style={{textAlign:'right'}}>DHQ</span><span style={{textAlign:'right'}}>Rank</span>
                                </div>
                                {/* Rows */}
                                {divisions[divKey].sort((a,b) => {
                                  if (b.wins !== a.wins) return b.wins - a.wins;
                                  if (a.losses !== b.losses) return a.losses - b.losses;
                                  return b.pointsFor - a.pointsFor;
                                }).map((team, idx) => {
                                  const isMe = team.userId === sleeperUserId;
                                  const roster = currentLeague.rosters?.find(r => r.owner_id === team.userId);
                                  const totalDHQ = roster?.players?.reduce((s, pid) => s + (window.App?.LI?.playerScores?.[pid] || 0), 0) || 0;
                                  const pf = team.pointsFor || 0;
                                  // Find overall rank
                                  const overallRank = standings.slice().sort((a,b) => b.wins !== a.wins ? b.wins - a.wins : b.pointsFor - a.pointsFor).findIndex(t => t.userId === team.userId) + 1;
                                  return (
                                    <div key={team.rosterId} style={{
                                      display: 'grid', gridTemplateColumns: '20px 1fr 48px 48px 56px 56px', gap: '4px',
                                      padding: '6px 8px', borderBottom: '1px solid rgba(255,255,255,0.04)',
                                      background: isMe ? 'rgba(212,175,55,0.08)' : 'transparent',
                                      fontSize: '0.75rem', alignItems: 'center'
                                    }}>
                                      <span style={{ fontFamily: 'Bebas Neue, cursive', fontSize: '0.9rem', color: idx === 0 ? '#D4AF37' : idx === 1 ? '#C0C0C0' : idx === 2 ? '#CD7F32' : 'var(--silver)' }}>{idx + 1}</span>
                                      <div style={{ overflow: 'hidden' }}>
                                        <div style={{ fontWeight: isMe ? 700 : 500, color: isMe ? 'var(--gold)' : 'var(--white)', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>
                                          {team.displayName}{isMe && <span style={{ fontSize: '0.55rem', color: 'var(--gold)', marginLeft: '4px' }}>YOU</span>}
                                        </div>
                                      </div>
                                      <span style={{ textAlign: 'right', fontFamily: 'Oswald, sans-serif', fontWeight: 600, color: 'var(--white)' }}>{team.wins}-{team.losses}</span>
                                      <span style={{ textAlign: 'right', fontSize: '0.68rem', color: 'var(--silver)' }}>{pf > 0 ? pf.toFixed(0) : '—'}</span>
                                      <span style={{ textAlign: 'right', fontSize: '0.68rem', fontFamily: 'Oswald, sans-serif', color: totalDHQ >= 80000 ? '#2ECC71' : totalDHQ >= 50000 ? 'var(--gold)' : 'var(--silver)' }}>{totalDHQ > 0 ? (totalDHQ / 1000).toFixed(0) + 'k' : '—'}</span>
                                      <span style={{ textAlign: 'right', fontSize: '0.68rem', color: overallRank <= 3 ? '#2ECC71' : overallRank <= 6 ? 'var(--gold)' : 'var(--silver)' }}>#{overallRank}</span>
                                    </div>
                                  );
                                })}
                              </div>
                            ))}
                          </div>
                        );
                      })()}
                    </div>

                </div>{/* end Athletic dashboard */}
                </React.Fragment>
                )}
                </div>{/* end marginLeft wrapper */}

            {/* ReconAI Panel — slides in from right */}
            <div style={{
              position: 'fixed', top: 0, right: reconPanelOpen ? 0 : '-340px',

              <div style={{
                padding: '14px 16px', borderBottom: '1px solid rgba(124,107,248,0.2)',
                display: 'flex', alignItems: 'center', gap: '8px',
                background: 'rgba(124,107,248,0.06)'
              }}>
                <div style={{
                  width: '28px', height: '28px', borderRadius: '8px',
                  background: 'linear-gradient(135deg, #7c6bf8, #5b4cc4)',
                  display: 'flex', alignItems: 'center', justifyContent: 'center'
                }}>
                  <svg viewBox="0 0 32 32" width="16" height="16" fill="none">
                    <circle cx="16" cy="16" r="6" stroke="#e0d4ff" strokeWidth="1.5"/>
                    <circle cx="16" cy="16" r="2" fill="#e0d4ff"/>
                  </svg>
                </div>
                <span style={{ fontWeight: 700, fontSize: '0.85rem', color: '#f0f0f3', letterSpacing: '-0.02em' }}>
                  Recon<span style={{ color: '#7c6bf8' }}>AI</span>
                </span>
                <span style={{ flex: 1 }}></span>
                <button onClick={() => setReconPanelOpen(false)} style={{
                  background: 'none', border: 'none', color: '#7d8291', cursor: 'pointer',
                  fontSize: '1.2rem', padding: '4px'
                }}>&#10005;</button>
              </div>

              {/* Context chips */}
              <div style={{ padding: '8px 12px', display: 'flex', gap: '6px', flexWrap: 'wrap', borderBottom: '1px solid rgba(255,255,255,0.06)' }}>
                {getReconChips().map((chip, i) => (
                  <button key={i} onClick={() => sendReconMessage(chip.prompt)}
                    style={{
                      padding: '4px 10px', fontSize: '0.65rem', borderRadius: '20px',

              {/* Messages */}

    // Main Dashboard
    function OwnerDashboard() {
        const [showSettings, setShowSettings] = useState(false);
        const [loading, setLoading] = useState(true);
        const [error, setError] = useState(null);
        const [sleeperUser, setSleeperUser] = useState(null);
        const [selectedYear, setSelectedYear] = useState('2026');
        const [sleeperLeagues, setSleeperLeagues] = useState([]);
        const [activeLeagueId, setActiveLeagueId] = useState(null);
        const [selectedLeague, setSelectedLeague] = useState(null);
        // Display name state
        const [customDisplayName, setCustomDisplayName] = useState(() => {
            return localStorage.getItem('od_display_name') || '';
        });

        // Cloud sync — load from Supabase on mount
        useEffect(() => {
            if (window.OD?.loadDisplayName) {
                window.OD.loadDisplayName().then(name => {
                    if (name) { setCustomDisplayName(name); localStorage.setItem('od_display_name', name); }
                }).catch(() => {});
            }
        }, []);
        const leagueMates = React.useMemo(() => {
            const seen = new Set();
            // seed with current user's id so we exclude ourselves
            if (sleeperUser?.user_id) seen.add(sleeperUser.user_id);
            const mates = [];
            sleeperLeagues.forEach(league => {
                (league.users || []).forEach(u => {
                    const uid = u.user_id;
                    if (uid && !seen.has(uid)) {
                        seen.add(uid);
                        mates.push(u);
                    }
                });
            });
            return mates.sort((a, b) => (a.display_name || a.username || '').localeCompare(b.display_name || b.username || ''));
        }, [sleeperLeagues, sleeperUser]);

        const AVAILABLE_YEARS = ['2023', '2024', '2025', '2026'];

        useEffect(() => {
            if (sleeperUsername) loadSleeperData();
        }, [selectedYear]);

        async function loadSleeperData() {
            setLoading(true);
            setError(null);

            try {
                const user = await fetchSleeperUser(sleeperUsername);
                setSleeperUser(user);

                const leagues = await fetchUserLeagues(user.user_id, selectedYear);

                const leaguesWithDetails = await Promise.all(
                    leagues.map(async (league) => {
                        try {
                            const [rosters, users] = await Promise.all([
                                fetchLeagueRosters(league.league_id),
                                fetchLeagueUsers(league.league_id)
                            ]);

                            const myRoster = rosters.find(r => r.owner_id === user.user_id);
                            
                            return {
                                id: league.league_id,
                                name: league.name,
                                wins: myRoster?.settings?.wins || 0,
                                losses: myRoster?.settings?.losses || 0,
                                ties: myRoster?.settings?.ties || 0,
                                season: selectedYear,
                                scoring_settings: league.scoring_settings || {},
                                roster_positions: league.roster_positions || [],
                                rosters,
                                users
                            };
                        } catch (e) {
                            console.error(`Failed to load league ${league.name}:`, e);
                            return null;
                        }
                    })
                );

                const validLeagues = leaguesWithDetails.filter(l => l !== null);
                setSleeperLeagues(validLeagues);
                setLoading(false);
            } catch (err) {
                console.error('Failed to load Sleeper data:', err);
                setError('Failed to load Sleeper data. Please refresh.');
                setLoading(false);
            }
        }

        // Show league detail if selected
        if (selectedLeague) {
            return <LeagueDetail
                league={selectedLeague}
                onBack={() => setSelectedLeague(null)}
                sleeperUserId={sleeperUser?.user_id}
            />;
        }

        return (
            <div className="app-container">
                <header className="header">
                    <div className="header-title">FANTASY FOOTBALL WAR ROOM</div>
                    <h1 className="owner-name">
                        <img src="icon-192.png" alt="OD Logo" className="owner-logo-small" />
                        {sleeperUser
                            ? (customDisplayName || sleeperUser.display_name || sleeperUser.username || sleeperUsername).toUpperCase() + ' FOOTBALL CLUB'
                            : sleeperUsername
                                ? 'LOADING...'
                                : (customDisplayName || newSession?.user?.displayName || newSession?.user?.email?.split('@')[0] || 'COMMANDER').toUpperCase() + ' FOOTBALL CLUB'}
                        <img src="icon-192.png" alt="OD Logo" className="owner-logo-small" />
                    </h1>
                    <div className="quote">
                        "If you're not first, you're last"
                        <div className="quote-author">— Ricky Bobby</div>
                    </div>
                    <svg 
                        className="settings-icon" 
                        viewBox="0 0 24 24" 
                        fill="none" 
                        stroke="currentColor" 
                        strokeWidth="2"
                        onClick={() => setShowSettings(true)}
                        style={{ cursor: 'pointer' }}
                    >
                        <circle cx="12" cy="12" r="3" stroke="var(--gold)"/>
                        <path d="M12 1v6m0 6v6m-5.2-7.8l-4.3-4.2m12.9 0l4.3 4.2M1 12h6m6 0h6m-7.8 5.2l-4.2 4.3m0-12.9l4.2 4.3" stroke="var(--gold)"/>
                    </svg>
                </header>

                <div className="main-layout">
                    {/* Leagues */}
                    <div className="center-column">
                        <div className="league-window">
                            <div className="league-window-header" style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', gap: '0.5rem' }}>
                                <div style={{ flexShrink: 0 }}>SLEEPER LEAGUES</div>
                                <select
                                    value={selectedYear}
                                    onChange={e => setSelectedYear(e.target.value)}
                                    style={{
                                        background: 'var(--charcoal)',
                                        border: '1px solid rgba(212,175,55,0.4)',
                                        borderRadius: '4px',
                                        color: 'var(--white)',
                                        fontFamily: 'Oswald, sans-serif',
                                        fontWeight: '700',
                                        fontSize: '0.72rem',
                                        padding: '0.18rem 0.45rem',
                                        cursor: 'pointer',
                                        outline: 'none',
                                        flexShrink: 0,
                                    }}
                                >
                                    {AVAILABLE_YEARS.map(year => (
                                        <option key={year} value={year}>{year}</option>
                                    ))}
                                </select>
                            </div>

                            <div className="league-window-scroll">
                                {!sleeperUsername ? (
                                    <div style={{ padding: '2rem', textAlign: 'center', color: 'var(--silver)', fontSize: '0.85rem' }}>
                                        <div style={{ marginBottom: '0.5rem', fontSize: '1.1rem' }}></div>
                                        No Sleeper account connected.<br />
                                        <span style={{ fontSize: '0.78rem', opacity: 0.7 }}>Sleeper integration coming soon for email accounts.</span>
                                    </div>
                                ) : loading ? (
                                    <div style={{ padding: '2rem', textAlign: 'center', color: 'var(--gold)' }}>
                                        Loading leagues...
                                    </div>
                                ) : error ? (
                                    <div style={{ padding: '1rem', textAlign: 'center', color: '#E74C3C', fontSize: '0.85rem' }}>
                                        {error}
                                    </div>
                                ) : sleeperLeagues.length === 0 ? (
                                    <div style={{ padding: '2rem', textAlign: 'center', color: 'var(--silver)', fontSize: '0.85rem' }}>
                                        No leagues found for {selectedYear}
                                    </div>
                                ) : (
                                    sleeperLeagues.map(league => (
                                        <div
                                            key={league.id}
                                            className={`league-item ${activeLeagueId === league.id ? 'active' : ''}`}
                                            onClick={() => {
                                                setActiveLeagueId(league.id);
                                                setSelectedLeague(league);
                                                            }}
                                        >
                                            <div className="league-item-name">
                                                {league.name}
                                            </div>
                                            <div className="league-item-record">
                                                {league.wins}-{league.losses}{league.ties > 0 ? `-${league.ties}` : ''}
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>
                    </div>

                    {/* ReconAI Launch Button */}
                    <div style={{ display: 'flex', flexDirection: 'column', gap: '8px', alignItems: 'center', paddingTop: '8px' }}>
                        <a href="https://jcc100218.github.io/ReconAI/" target="_blank" rel="noopener noreferrer" style={{
                            display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '8px',
                            padding: '16px 20px', borderRadius: '12px', textDecoration: 'none',
                            background: 'linear-gradient(135deg, rgba(124,107,248,0.15), rgba(124,107,248,0.05))',
                            border: '2px solid rgba(124,107,248,0.3)',
                            transition: 'all 0.2s', cursor: 'pointer'
                        }}
                        onMouseEnter={e => { e.currentTarget.style.borderColor = '#7c6bf8'; e.currentTarget.style.boxShadow = '0 4px 20px rgba(124,107,248,0.3)'; }}
                        onMouseLeave={e => { e.currentTarget.style.borderColor = 'rgba(124,107,248,0.3)'; e.currentTarget.style.boxShadow = 'none'; }}
                        >
                            <div style={{
                                width: '40px', height: '40px', borderRadius: '10px',
                                background: 'linear-gradient(135deg, #7c6bf8, #5b4cc4)',
                                display: 'flex', alignItems: 'center', justifyContent: 'center',
                                boxShadow: '0 4px 16px rgba(124,107,248,0.3)'
                            }}>
                                <svg viewBox="0 0 32 32" width="22" height="22" fill="none">
                                    <circle cx="16" cy="16" r="8" stroke="#e0d4ff" strokeWidth="1.5" strokeDasharray="3 2" opacity="0.6"/>
                                    <circle cx="16" cy="16" r="4" stroke="#e0d4ff" strokeWidth="1.5"/>
                                    <circle cx="16" cy="16" r="1.5" fill="#e0d4ff"/>
                                </svg>
                            </div>
                            <div style={{ textAlign: 'center' }}>
                                <div style={{ fontWeight: 700, fontSize: '0.82rem', color: '#f0f0f3', letterSpacing: '-0.02em' }}>
                                    Recon<span style={{ color: '#7c6bf8' }}>AI</span>
                                </div>
                                <div style={{ fontSize: '0.55rem', color: '#7d8291', marginTop: '2px' }}>AI Advisor</div>
                            </div>
                        </a>
                    </div>
                </div>

                {showSettings && (
                    <SettingsModal
                        onClose={() => setShowSettings(false)}
                        initDisplayName={customDisplayName}
                        onDisplayNameSave={(name) => {
                            setCustomDisplayName(name);
                            window.OD.saveDisplayName(name);
                        }}
                        leagueMates={leagueMates}
                    />
                )}

            </div>
        );
    }

    ReactDOM.render(<OwnerDashboard />, document.getElementById('root'));
</script>

<footer style="text-align:center;padding:16px;font-size:12px;color:#666;border-top:1px solid #1a1a1a;margin-top:32px;">&copy; 2026 skjjcruz. All rights reserved.</footer>
</body>
</html>
